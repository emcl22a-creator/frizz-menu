<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0B">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>Frizz · Inscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050506;
    --surface: rgba(255,255,255,0.03);
    --text: #F2F2F4;
    --text-2: rgba(255,255,255,0.65);
    --text-3: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.12);
    --blue: #0A84FF;
    --blue-bright: #2E9DFF;
    --blue-glow: rgba(10,132,255,0.5);
    --green: #4ADE80;
    --red: #FF6B5C;
    --red-soft: rgba(255,107,92,0.14);
    --r: 14px;
    --r-md: 18px;
    --r-lg: 22px;
    --r-pill: 100px;
  }

  html, body {
    color: var(--text);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 700;
    letter-spacing: -0.014em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  html {
    background:
      radial-gradient(ellipse 60% 50% at 10% 5%, rgba(10,132,255,0.30), transparent 50%),
      radial-gradient(ellipse 50% 40% at 90% 15%, rgba(91,143,249,0.20), transparent 50%),
      radial-gradient(ellipse 45% 40% at 95% 60%, rgba(46,157,255,0.18), transparent 50%),
      #050506 !important;
    background-attachment: fixed !important;
  }
  body { background: transparent !important; }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(ellipse 50% 35% at 30% 30%, rgba(10,132,255,0.10), transparent 50%),
      radial-gradient(ellipse 50% 35% at 70% 50%, rgba(46,157,255,0.08), transparent 50%);
    animation: auroraDrift 24s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes auroraDrift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(3%, 2%) scale(1.06); }
    100% { transform: translate(-2%, 3%) scale(1.04); }
  }

  .page {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 22px;
    position: relative;
    z-index: 1;
  }

  .logo-link {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    margin-bottom: 32px;
    transition: transform 0.2s ease;
  }
  .logo-link:hover { transform: scale(1.04); }
  .logo {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    letter-spacing: -0.020em;
    font-size: 32px;
    color: var(--text);
    display: inline-flex;
    align-items: baseline;
    gap: 2px;
    line-height: 1;
  }
  .logo .spark {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    color: var(--blue);
    font-weight: 700;
    font-size: 26px;
    margin-left: 1px;
    animation: sparkPulse 3.5s ease-in-out infinite;
    display: inline-block;
    text-shadow: 0 0 12px rgba(10,132,255,0.5);
  }
  @keyframes sparkPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }

  .form-card {
    width: 100%;
    max-width: 440px;
    padding: 32px 28px;
    background: rgba(20, 20, 26, 0.45);
    backdrop-filter: saturate(180%) blur(40px);
    -webkit-backdrop-filter: saturate(180%) blur(40px);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 30px 80px -20px rgba(0,0,0,0.7);
  }

  .form-section-num {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 13px;
    color: var(--blue);
    margin-bottom: 8px;
    letter-spacing: -0.005em;
  }
  .form-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.030em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
  }
  .form-title em {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: -0.014em;
  }
  .form-sub {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: -0.010em;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .field-group { margin-bottom: 14px; }
  .field-label {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--text-2);
    margin-bottom: 6px;
    display: block;
    letter-spacing: -0.005em;
  }

  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--r);
    font-size: 14.5px;
    font-weight: 700;
    font-family: 'Inter Tight', inherit;
    letter-spacing: -0.012em;
    transition: all 0.15s ease;
    outline: none;
  }
  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.20);
  }
  input::placeholder { color: var(--text-3); font-weight: 600; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 18px;
    border-radius: var(--r);
    font-size: 14px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    border: 0;
    font-family: inherit;
    letter-spacing: -0.012em;
    transition: all 0.15s ease;
    width: 100%;
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.20),
      0 4px 14px -4px var(--blue-glow);
  }
  .btn-primary:hover {
    background: var(--blue-bright);
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.24),
      0 8px 22px -4px var(--blue-glow);
  }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .btn svg { width: 14px; height: 14px; stroke-width: 2.4; }

  .form-footer {
    margin-top: 18px;
    text-align: center;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-3);
  }
  .form-footer a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 800;
  }
  .form-footer a:hover { text-decoration: underline; }

  .trial-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.30);
    border-radius: var(--r-pill);
    font-size: 11.5px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: 0.005em;
    margin-bottom: 14px;
  }
  .trial-badge svg { width: 11px; height: 11px; stroke-width: 2.4; }

  .error-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--red-soft);
    border: 1px solid rgba(255,107,92,0.30);
    border-radius: var(--r);
    font-size: 12.5px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: -0.005em;
    display: none;
  }
  .error-msg.show { display: block; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.30);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page">

  <a href="index.html" class="logo-link">
    <span class="logo">Frizz<span class="spark">✦</span></span>
  </a>

  <div class="form-card">

    <div class="trial-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      14 jours d'essai · Sans carte bancaire
    </div>

    <div class="form-section-num">— Créer un compte</div>
    <h1 class="form-title">Bienvenue chez <em>Frizz</em>.</h1>
    <p class="form-sub">Créez votre compte et configurez votre premier restaurant en moins de 2 minutes.</p>

    <form id="signup-form" autocomplete="on">

      <div class="field-group">
        <label class="field-label" for="signup-resto-nom">Nom du restaurant</label>
        <input type="text" id="signup-resto-nom" name="resto-nom" placeholder="ex. Chez Nico" required autocomplete="organization">
      </div>

      <div class="field-group">
        <label class="field-label" for="signup-email">Votre email</label>
        <input type="email" id="signup-email" name="email" placeholder="vous@restaurant.com" required autocomplete="email">
      </div>

      <div class="field-group">
        <label class="field-label" for="signup-password">Mot de passe</label>
        <input type="password" id="signup-password" name="password" placeholder="Minimum 8 caractères" required minlength="8" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top: 18px;">
        Créer mon compte
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="error-msg" id="error-msg"></div>

    </form>

    <div class="form-footer">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>

  </div>

</div>
<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Helper : génère un slug à partir du nom du restaurant
function slugify(text) {
  return text
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // accents
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .substring(0, 60);
}

// Helper : génère un UUID v4 côté client
function generateUUID() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

// Helper : affiche une erreur dans la zone error-msg
function showError(message) {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.textContent = message;
  el.classList.add('show');
}
function hideError() {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.classList.remove('show');
}

// Trouve un slug unique en ajoutant -2, -3, etc. si nécessaire
async function findUniqueSlug(baseSlug) {
  let slug = baseSlug;
  let counter = 1;
  while (true) {
    const { data: existing } = await supa.from('restaurants')
      .select('id').eq('slug', slug).maybeSingle();
    if (!existing) return slug;
    counter++;
    slug = `${baseSlug}-${counter}`;
    if (counter > 50) return `${baseSlug}-${Date.now()}`;
  }
}

// ════════════════════════════════════════════════════════════════
// SUBMIT FORM — Création compte + restaurant
// ════════════════════════════════════════════════════════════════

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const nomResto = document.getElementById('signup-resto-nom').value.trim();
  const email = document.getElementById('signup-email').value.trim().toLowerCase();
  const password = document.getElementById('signup-password').value;

  if (!nomResto) { showError('Le nom du restaurant est obligatoire'); return; }
  if (!email) { showError('L\'email est obligatoire'); return; }
  if (!password || password.length < 8) { showError('Le mot de passe doit faire au moins 8 caractères'); return; }

  const submitBtn = document.getElementById('submit-btn');
  const oldHtml = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> Création du compte…';

  try {
    // 1️⃣  CRÉER L'UTILISATEUR via Supabase Auth
    const { data: authData, error: authError } = await supa.auth.signUp({
      email,
      password,
      options: {
        data: { resto_nom: nomResto }
      }
    });

    if (authError) {
      // Erreurs courantes : email déjà pris, mot de passe trop faible
      if (authError.message && authError.message.toLowerCase().includes('already')) {
        throw new Error('Cet email est déjà utilisé. Connectez-vous plutôt.');
      }
      throw authError;
    }

    if (!authData.user) {
      throw new Error('Erreur lors de la création du compte');
    }

    // 2️⃣  GÉNÉRER UN SLUG UNIQUE
    const baseSlug = slugify(nomResto) || `resto-${Date.now()}`;
    const slug = await findUniqueSlug(baseSlug);

    // 3️⃣  CRÉER LE RESTAURANT (avec essai 14 jours auto-démarré)
    const newRestoId = generateUUID();
    const fullPayload = {
      id: newRestoId,
      nom: nomResto,
      slug,
      email,
      user_id: authData.user.id,
      trial_started_at: new Date().toISOString(),  // ← démarre l'essai MAINTENANT
      fiscal_country: 'CH',
      currency: 'CHF',
      ouvert: true
    };

    // Champs optionnels qu'on retire si la base les refuse
    const optionalCols = ['fiscal_country', 'currency', 'ouvert', 'user_id', 'owner_id', 'trial_started_at'];
    let payload = { ...fullPayload };
    let lastError = null;
    let createdResto = null;

    for (let attempt = 0; attempt < 12; attempt++) {
      // Garantir que les champs requis restent là
      if (!payload.id) payload.id = newRestoId;
      if (!payload.email) payload.email = email;

      const { data, error } = await supa.from('restaurants').insert(payload).select().single();

      if (!error) {
        createdResto = data;
        break;
      }

      lastError = error;
      console.error(`createResto tentative ${attempt + 1}:`, error);

      const errMsg = (error.message || '').toLowerCase();
      const errCode = error.code || '';

      // RLS bloque la création
      if (errMsg.includes('row-level security') || errCode === '42501') {
        throw new Error('Permissions insuffisantes (RLS). Contactez le support.');
      }

      // user_id rejeté → tente owner_id
      if (errMsg.includes('user_id') && payload.user_id !== undefined) {
        payload.owner_id = payload.user_id;
        delete payload.user_id;
        continue;
      }
      if (errMsg.includes('owner_id') && payload.owner_id !== undefined) {
        delete payload.owner_id;
        continue;
      }

      // Colonne mentionnée dans l'erreur → on la retire
      const colMatch = errMsg.match(/column ['"]?(\w+)['"]?|could not find the ['"]?(\w+)['"]? column/i);
      let colToRemove = colMatch ? (colMatch[1] || colMatch[2]) : null;
      if (!colToRemove) colToRemove = optionalCols.find(c => payload[c] !== undefined);

      // Ne JAMAIS retirer id, nom, slug, email
      const protectedCols = ['id', 'nom', 'slug', 'email'];
      if (colToRemove && payload[colToRemove] !== undefined && !protectedCols.includes(colToRemove)) {
        console.warn(`Retrait colonne "${colToRemove}"`);
        delete payload[colToRemove];
        continue;
      }

      break;
    }

    if (!createdResto) {
      throw new Error(lastError?.message || 'Impossible de créer le restaurant');
    }

    // 4️⃣  REDIRECTION VERS L'ADMIN
    submitBtn.innerHTML = '<div class="spinner"></div> Redirection…';
    setTimeout(() => {
      window.location.href = 'menu-admin.html';
    }, 600);

  } catch (err) {
    console.error('Signup error:', err);
    showError(err.message || 'Une erreur est survenue');
    submitBtn.disabled = false;
    submitBtn.innerHTML = oldHtml;
  }
});

// Si déjà connecté, redirige vers admin
(async function checkAlreadyLogged() {
  try {
    const { data: { session } } = await supa.auth.getSession();
    if (session) {
      window.location.href = 'menu-admin.html';
    }
  } catch (e) {
    // Pas connecté, c'est normal sur cette page
  }
})();
</script>

</body>
</html>
