<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Menu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #050506;
    --text: #F2F2F4;
    --text-2: rgba(255,255,255,0.65);
    --text-3: rgba(255,255,255,0.45);
    --text-4: rgba(255,255,255,0.25);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --blue: #0A84FF;
    --blue-strong: #2E9DFF;
    --blue-soft: rgba(10,132,255,0.14);
    --green: #30D158;
    --red: #FF6B5C;
    --orange: #FF9F0A;
  }

  html, body {
    color: var(--text);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 700;
    letter-spacing: -0.014em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Aurora bleue subtile sur fond noir */
  html {
    background:
      radial-gradient(ellipse 70% 50% at 10% 5%, rgba(10,132,255,0.30), transparent 50%),
      radial-gradient(ellipse 50% 40% at 90% 15%, rgba(91,143,249,0.20), transparent 50%),
      radial-gradient(ellipse 45% 40% at 95% 50%, rgba(46,157,255,0.18), transparent 50%),
      #050506;
    background-attachment: fixed;
  }
  body { background: transparent; }

  /* ─────────── LOADING SCREEN ─────────── */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.3s ease;
  }
  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-logo {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: -0.020em;
    color: var(--text);
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
  }
  .loading-logo .spark {
    color: var(--blue);
    text-shadow: 0 0 12px rgba(10,132,255,0.6);
    font-size: 32px;
    animation: sparkPulse 3.5s ease-in-out infinite;
  }
  @keyframes sparkPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }

  /* ─────────── ERROR SCREEN ─────────── */
  .error-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 22px;
    text-align: center;
  }
  .error-icon {
    width: 70px;
    height: 70px;
    border-radius: 100px;
    background: rgba(255,107,92,0.12);
    border: 1px solid rgba(255,107,92,0.30);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--red);
    margin-bottom: 22px;
  }
  .error-title {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.020em;
    margin-bottom: 8px;
  }
  .error-msg {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-3);
    line-height: 1.5;
    max-width: 320px;
  }

  /* ─────────── APP CONTAINER ─────────── */
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding-bottom: 110px;
    min-height: 100vh;
    display: none;
  }

  /* ─────────── HEADER ─────────── */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(5, 5, 6, 0.82);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
  }
  .header-inner {
    padding: 18px 22px 14px;
    text-align: center;
  }
  .resto-name {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.018em;
    color: var(--text);
    line-height: 1.05;
    margin-bottom: 4px;
  }
  .resto-name .spark {
    color: var(--blue);
    text-shadow: 0 0 10px rgba(10,132,255,0.5);
  }
  .resto-table {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  /* ─────────── HERO (avec table) ─────────── */
  /* Pas de hero, juste le header centré */

  /* ─────────── CONTENT ─────────── */
  .content {
    padding: 22px 22px 0;
  }

  /* ─────────── PLATS ─────────── */
  .plat-list {
    display: flex;
    flex-direction: column;
  }
  .plat-row {
    display: grid;
    grid-template-columns: 1fr 70px;
    gap: 14px;
    padding: 16px 0;
    align-items: center;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: opacity 0.18s ease;
  }
  .plat-row:hover { opacity: 0.7; }
  .plat-row:last-child { border-bottom: 0; }
  .plat-row.unavailable { opacity: 0.4; }
  .plat-row.unavailable .plat-name {
    text-decoration: line-through;
    text-decoration-color: rgba(255,107,92,0.5);
  }

  .plat-info {
    min-width: 0;
  }
  .plat-name {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.014em;
    margin-bottom: 4px;
    line-height: 1.25;
  }
  .plat-desc {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-3);
    line-height: 1.45;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .plat-price {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--blue);
    letter-spacing: -0.005em;
  }
  .plat-img {
    width: 70px;
    height: 70px;
    border-radius: 100px;
    background: linear-gradient(135deg, #2a2a30, #1a1a20);
    background-size: cover;
    background-position: center;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.06),
      0 4px 14px -6px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .plat-img-empty {
    width: 70px;
    height: 70px;
    border-radius: 100px;
    background: linear-gradient(135deg, #2a2a30, #1a1a20);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-4);
    flex-shrink: 0;
  }
  .plat-img-empty svg { width: 26px; height: 26px; }

  /* État vide */
  .empty-state {
    text-align: center;
    padding: 60px 22px;
    color: var(--text-3);
  }
  .empty-state-icon {
    font-size: 42px;
    margin-bottom: 14px;
    opacity: 0.4;
  }
  .empty-state-text {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 14px;
  }

  /* ─────────── CART BAR ─────────── */
  .cart-bar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 18px;
    width: calc(100% - 32px);
    max-width: 480px;
    background: var(--blue);
    border-radius: 100px;
    padding: 13px 20px;
    border: 0;
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      0 16px 40px -10px rgba(10,132,255,0.55);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 60;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    transform-origin: center bottom;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(80px);
  }
  .cart-bar.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .cart-bar:hover {
    background: var(--blue-strong);
    transform: translateX(-50%) translateY(-2px);
  }
  .cart-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cart-count {
    background: rgba(255,255,255,0.25);
    padding: 3px 10px;
    border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: #fff;
  }
  .cart-label {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 13.5px;
    letter-spacing: -0.012em;
  }
  .cart-total {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.005em;
  }

  /* ─────────── MODAL OVERLAY ─────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    background: rgba(20, 20, 26, 0.92);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-top-left-radius: 28px;
    border-top-right-radius: 28px;
    border: 1px solid var(--border-strong);
    border-bottom: 0;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: 24px;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; padding: 22px; }
    .modal { border-radius: 28px; border-bottom: 1px solid var(--border-strong); max-height: 80vh; }
  }
  .modal-overlay.show .modal {
    transform: translateY(0);
  }

  /* ─────────── MODAL FICHE PLAT ─────────── */
  .modal-photo {
    width: 100%;
    aspect-ratio: 16/10;
    background: linear-gradient(135deg, #2a2a30, #1a1a20);
    background-size: cover;
    background-position: center;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }
  .modal-photo-empty {
    width: 100%;
    aspect-ratio: 16/10;
    background: linear-gradient(135deg, #2a2a30, #1a1a20);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-4);
  }
  .modal-photo-empty svg { width: 60px; height: 60px; }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 100px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(20px);
    border: 0;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 2;
  }
  .modal-content {
    padding: 22px 22px 0;
  }
  .modal-name {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.020em;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .modal-desc {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .modal-price {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    color: var(--blue);
    margin-bottom: 22px;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .qty-stepper {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 6px;
  }
  .qty-btn {
    width: 36px;
    height: 36px;
    border-radius: 100px;
    background: transparent;
    border: 0;
    color: var(--text);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-btn:hover { background: rgba(255,255,255,0.08); }
  .qty-num {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--text);
    min-width: 22px;
    text-align: center;
  }
  .add-btn {
    flex: 1;
    background: var(--blue);
    color: #fff;
    border: 0;
    border-radius: 100px;
    padding: 14px 22px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: -0.012em;
    cursor: pointer;
    box-shadow: 0 6px 18px -4px rgba(10,132,255,0.5);
    transition: all 0.18s ease;
  }
  .add-btn:hover {
    background: var(--blue-strong);
    transform: translateY(-1px);
  }
  .modal-note-input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 18px;
    outline: 0;
    transition: border-color 0.18s ease;
  }
  .modal-note-input:focus {
    border-color: var(--blue);
    background: rgba(10,132,255,0.06);
  }
  .modal-note-label {
    display: block;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 6px;
    padding-left: 4px;
  }

  /* ─────────── MODAL PANIER ─────────── */
  .cart-modal-header {
    padding: 22px 22px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-modal-title {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.020em;
  }
  .cart-modal-list {
    padding: 0 22px;
  }
  .cart-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .cart-item:last-child { border-bottom: 0; }
  .cart-item-name {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -0.012em;
  }
  .cart-item-meta {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text-3);
  }
  .cart-item-price {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-2);
    margin-right: 10px;
  }
  .cart-item-remove {
    width: 28px;
    height: 28px;
    border-radius: 100px;
    background: rgba(255,107,92,0.14);
    border: 1px solid rgba(255,107,92,0.28);
    color: var(--red);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    font-weight: 700;
    font-family: inherit;
  }
  .cart-modal-footer {
    padding: 18px 22px 0;
    border-top: 1px solid var(--border);
    margin-top: 14px;
  }
  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .cart-total-label {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-2);
  }
  .cart-total-amount {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 24px;
    color: var(--blue);
  }
  .checkout-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: 0;
    border-radius: 100px;
    padding: 16px 22px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 14.5px;
    letter-spacing: -0.012em;
    cursor: pointer;
    box-shadow: 0 8px 22px -4px rgba(10,132,255,0.5);
    transition: all 0.18s ease;
  }
  .checkout-btn:hover {
    background: var(--blue-strong);
    transform: translateY(-1px);
  }
  .checkout-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* ─────────── TOAST ─────────── */
  .toast-wrap {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: rgba(20, 20, 26, 0.92);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-strong);
    border-radius: 100px;
    padding: 10px 16px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 12.5px;
    color: var(--text);
    box-shadow: 0 12px 30px -8px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.success {
    border-color: rgba(48,209,88,0.30);
    color: var(--green);
  }
  .toast.error {
    border-color: rgba(255,107,92,0.30);
    color: var(--red);
  }

  /* ─────────── ORDERS BANNER (commandes en cours) ─────────── */
  .orders-banner {
    margin: 14px 22px 0;
    padding: 12px 16px;
    background: rgba(10,132,255,0.10);
    border: 1px solid rgba(10,132,255,0.25);
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .orders-banner-icon {
    width: 36px;
    height: 36px;
    border-radius: 100px;
    background: var(--blue);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .orders-banner-text {
    flex: 1;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }
  .orders-banner-text strong {
    color: var(--blue);
    font-weight: 900;
  }

  /* ─────────── SAFE AREAS (iPhone notch / home bar) ─────────── */
  @supports (padding: max(0px)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .cart-bar {
      bottom: max(18px, env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-logo">Frizz<span class="spark">✦</span></div>
</div>

<!-- Error screen -->
<div class="error-screen" id="error" style="display:none;">
  <div class="error-icon">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h1 class="error-title" id="error-title">Erreur</h1>
  <p class="error-msg" id="error-msg">Une erreur est survenue.</p>
</div>

<!-- App principale -->
<div id="app">

  <!-- Header centré : "Chez Nico" + "TABLE 7" -->
  <header class="header">
    <div class="header-inner">
      <div class="resto-name" id="resto-name">—</div>
      <div class="resto-table" id="resto-table">—</div>
    </div>
  </header>

  <!-- Banner commandes en cours -->
  <div class="orders-banner" id="orders-banner" style="display:none;">
    <div class="orders-banner-icon">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="orders-banner-text" id="orders-banner-text">
      Votre commande arrive bientôt.
    </div>
  </div>

  <!-- Liste des plats -->
  <main class="content">
    <div class="plat-list" id="plat-list"></div>
  </main>

</div>

<!-- Cart bar flottante -->
<button class="cart-bar" id="cart-bar" onclick="openCartModal()">
  <div class="cart-bar-left">
    <span class="cart-count" id="cart-count">0</span>
    <span class="cart-label">Voir le panier</span>
  </div>
  <span class="cart-total" id="cart-total">0.00</span>
</button>

<!-- Modal fiche plat -->
<div class="modal-overlay" id="modal-plat">
  <div class="modal" id="modal-plat-content">
    <!-- Contenu injecté dynamiquement -->
  </div>
</div>

<!-- Modal panier -->
<div class="modal-overlay" id="modal-cart">
  <div class="modal">
    <div class="cart-modal-header">
      <div class="cart-modal-title">Notre commande</div>
      <button class="modal-close" onclick="closeCartModal()" style="position:relative; top:auto; right:auto;">×</button>
    </div>
    <div class="cart-modal-list" id="cart-modal-list">
      <!-- items injectés -->
    </div>
    <div class="cart-modal-footer">
      <div class="cart-total-row">
        <div class="cart-total-label">Total</div>
        <div class="cart-total-amount" id="cart-modal-total">0.00</div>
      </div>
      <button class="checkout-btn" id="checkout-btn" onclick="submitOrder()">
        Envoyer la commande
      </button>
    </div>
  </div>
</div>

<!-- Toast wrap -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ═════════════════════════════════════════════════════════════════
// CONFIG SUPABASE
// ═════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═════════════════════════════════════════════════════════════════
// PARAMÈTRES URL
// ═════════════════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const RESTO_SLUG = params.get('resto') || '';
const TABLE_NUM = params.get('table') || '';
const URL_MODE = params.get('mode') || ''; // 'preview' | 'takeaway' | ''
const TABLE_LABEL = params.get('label') || '';

// ═════════════════════════════════════════════════════════════════
// STATE GLOBAL
// ═════════════════════════════════════════════════════════════════
const state = {
  resto: null,
  table: null,
  menu: [],          // tous les plats
  cart: [],          // [{id, nom, prix, qte, note, image_url}]
  orders: [],        // commandes en cours
  previewMode: false,
  pollInterval: null
};

// ═════════════════════════════════════════════════════════════════
// HELPERS
// ═════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function formatPrice(p) {
  const n = parseFloat(p);
  if (isNaN(n)) return '0.00';
  return n.toFixed(2);
}
function getCurrency() {
  return state.resto?.currency || 'CHF';
}
function showToast(msg, type = '') {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2400);
}
function showError(title, msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent = msg;
}

// ═════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════
async function init() {
  try {
    // 1) Charger le restaurant
    if (!RESTO_SLUG) {
      showError('Lien invalide', 'Cette page doit être ouverte via un QR code de restaurant.');
      return;
    }

    const { data: resto, error: restoErr } = await supa
      .from('restaurants').select('*').eq('slug', RESTO_SLUG).maybeSingle();

    if (restoErr) throw new Error('Restaurant : ' + restoErr.message);
    if (!resto) {
      showError('Restaurant introuvable', 'Ce restaurant n\'existe pas.');
      return;
    }
    state.resto = resto;

    // 2) Détecter le mode (preview / sur place / à emporter)
    if (URL_MODE === 'preview') {
      state.previewMode = true;
    } else if (URL_MODE === 'takeaway') {
      // mode "à emporter" — pas de table requise
    } else if (!TABLE_NUM) {
      showError('Table introuvable', 'Cette page doit être ouverte en scannant un QR code de table.');
      return;
    }

    // 3) Vérifier que le restaurant est actif (skip en preview)
    if (!state.previewMode && resto.statut === 'inactif') {
      showError('Service indisponible', 'Ce restaurant n\'est pas accessible pour le moment.');
      return;
    }

    // 4) Vérifier que le restaurant est ouvert (skip en preview)
    if (!state.previewMode && resto.ouvert === false) {
      showError('Restaurant fermé', 'Le restaurant n\'accepte pas de commandes pour le moment.');
      return;
    }

    // 5) Charger la table (si présente)
    if (TABLE_NUM && !state.previewMode) {
      const { data: table } = await supa
        .from('tables').select('*')
        .eq('restaurant_id', resto.id)
        .eq('numero', TABLE_NUM)
        .maybeSingle();
      state.table = table;
    }

    // 6) Charger les plats
    const { data: menu, error: menuErr } = await supa
      .from('menu').select('*')
      .eq('restaurant_id', resto.id)
      .order('created_at', { ascending: true });

    if (menuErr) throw new Error('Menu : ' + menuErr.message);
    state.menu = (menu || []).filter(p => p.disponible !== false);

    // 7) Render
    renderHeader();
    renderMenu();
    loadCart();

    // 8) Charger les commandes en cours (si pas preview)
    if (!state.previewMode && state.table) {
      await loadOrders();
      // Polling toutes les 5s
      state.pollInterval = setInterval(loadOrders, 5000);
    }

    // 9) Hide loading
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').style.display = 'block';

  } catch (err) {
    console.error('Init error:', err);
    showError('Erreur de chargement', err.message || 'Une erreur est survenue.');
  }
}

// ═════════════════════════════════════════════════════════════════
// RENDER HEADER
// ═════════════════════════════════════════════════════════════════
function renderHeader() {
  // Nom du resto en gros italique avec ✦ bleu
  const nom = state.resto?.nom || 'Restaurant';
  document.getElementById('resto-name').innerHTML =
    escapeHtml(nom).replace(/\s+/g, '<span class="spark">✦</span>');

  // Si nom n'a pas d'espace, ajouter spark à la fin
  if (!nom.includes(' ')) {
    document.getElementById('resto-name').innerHTML =
      escapeHtml(nom) + '<span class="spark">✦</span>';
  }

  // Sous-titre : table ou mode
  let subtitle = '';
  if (state.previewMode) {
    subtitle = '— Aperçu';
  } else if (URL_MODE === 'takeaway') {
    subtitle = '— À emporter' + (TABLE_LABEL ? ' · ' + TABLE_LABEL : '');
  } else if (state.table) {
    const label = state.table.label || ('Table ' + state.table.numero);
    subtitle = '— ' + label;
  } else if (TABLE_NUM) {
    subtitle = '— Table ' + TABLE_NUM;
  }
  document.getElementById('resto-table').textContent = subtitle;
}

// ═════════════════════════════════════════════════════════════════
// RENDER MENU (liste de plats sans catégories)
// ═════════════════════════════════════════════════════════════════
function renderMenu() {
  const container = document.getElementById('plat-list');

  if (state.menu.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🍽️</div>
        <div class="empty-state-text">La carte arrive bientôt.</div>
      </div>
    `;
    return;
  }

  container.innerHTML = state.menu.map(p => renderPlatRow(p)).join('');
}

function renderPlatRow(p) {
  const img = p.image_url
    ? `<div class="plat-img" style="background-image: url('${escapeHtml(p.image_url)}')"></div>`
    : `<div class="plat-img-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

  return `
    <div class="plat-row" onclick="openPlatModal('${p.id}')">
      <div class="plat-info">
        <div class="plat-name">${escapeHtml(p.nom)}</div>
        ${p.description ? `<div class="plat-desc">${escapeHtml(p.description)}</div>` : ''}
        <div class="plat-price">${formatPrice(p.prix)} ${getCurrency() === 'EUR' ? '€' : 'CHF'}</div>
      </div>
      ${img}
    </div>
  `;
}

// ═════════════════════════════════════════════════════════════════
// MODAL FICHE PLAT
// ═════════════════════════════════════════════════════════════════
let currentPlat = null;
let currentQty = 1;
let currentNote = '';

function openPlatModal(platId) {
  const p = state.menu.find(x => x.id === platId);
  if (!p) return;
  currentPlat = p;
  currentQty = 1;
  currentNote = '';

  const overlay = document.getElementById('modal-plat');
  const content = document.getElementById('modal-plat-content');

  const photo = p.image_url
    ? `<div class="modal-photo" style="background-image: url('${escapeHtml(p.image_url)}')"></div>`
    : `<div class="modal-photo-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

  content.innerHTML = `
    <button class="modal-close" onclick="closePlatModal()">×</button>
    ${photo}
    <div class="modal-content">
      <h2 class="modal-name">${escapeHtml(p.nom)}</h2>
      ${p.description ? `<p class="modal-desc">${escapeHtml(p.description)}</p>` : ''}
      <div class="modal-price">${formatPrice(p.prix)} ${getCurrency() === 'EUR' ? '€' : 'CHF'}</div>

      <label class="modal-note-label">Une note pour le chef ? (facultatif)</label>
      <input type="text" id="modal-note" class="modal-note-input" placeholder="ex. sans oignons, bien cuit…" maxlength="120">

      <div class="modal-actions">
        <div class="qty-stepper">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qty-num">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="add-btn" onclick="addToCart()">Ajouter <span id="add-btn-price">${formatPrice(p.prix)}</span></button>
      </div>
    </div>
  `;

  overlay.classList.add('show');
}

function closePlatModal() {
  document.getElementById('modal-plat').classList.remove('show');
  currentPlat = null;
}

function changeQty(delta) {
  currentQty = Math.max(1, Math.min(99, currentQty + delta));
  document.getElementById('qty-num').textContent = currentQty;
  document.getElementById('add-btn-price').textContent = formatPrice(currentPlat.prix * currentQty);
}

function addToCart() {
  if (!currentPlat) return;
  const noteEl = document.getElementById('modal-note');
  const note = noteEl ? noteEl.value.trim() : '';

  state.cart.push({
    id: currentPlat.id,
    nom: currentPlat.nom,
    prix: parseFloat(currentPlat.prix),
    qte: currentQty,
    note: note || null,
    image_url: currentPlat.image_url || null
  });

  saveCart();
  updateCartBar();
  closePlatModal();
  showToast('Ajouté au panier', 'success');
}

// Ferme la modale en cliquant en dehors
document.getElementById('modal-plat').addEventListener('click', e => {
  if (e.target.id === 'modal-plat') closePlatModal();
});

// ═════════════════════════════════════════════════════════════════
// PANIER
// ═════════════════════════════════════════════════════════════════
function cartKey() {
  return 'frizz_cart_' + RESTO_SLUG + '_' + (TABLE_NUM || 'preview');
}
function loadCart() {
  if (state.previewMode) return; // Pas de cart persisté en preview
  try {
    const raw = localStorage.getItem(cartKey());
    if (raw) state.cart = JSON.parse(raw);
  } catch (e) {
    state.cart = [];
  }
  updateCartBar();
}
function saveCart() {
  if (state.previewMode) return;
  try {
    localStorage.setItem(cartKey(), JSON.stringify(state.cart));
  } catch (e) {}
}
function updateCartBar() {
  const bar = document.getElementById('cart-bar');
  const count = state.cart.reduce((s, it) => s + (it.qte || 1), 0);
  const total = state.cart.reduce((s, it) => s + (it.prix * (it.qte || 1)), 0);

  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total').textContent =
    formatPrice(total) + ' ' + (getCurrency() === 'EUR' ? '€' : 'CHF');

  if (count > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function openCartModal() {
  if (state.cart.length === 0) {
    showToast('Votre panier est vide');
    return;
  }
  renderCartModal();
  document.getElementById('modal-cart').classList.add('show');
}
function closeCartModal() {
  document.getElementById('modal-cart').classList.remove('show');
}

function renderCartModal() {
  const list = document.getElementById('cart-modal-list');
  list.innerHTML = state.cart.map((it, i) => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${escapeHtml(it.nom)}</div>
        <div class="cart-item-meta">×${it.qte || 1}${it.note ? ' · ' + escapeHtml(it.note) : ''}</div>
      </div>
      <div style="display: flex; align-items: center;">
        <span class="cart-item-price">${formatPrice(it.prix * (it.qte || 1))}</span>
        <button class="cart-item-remove" onclick="removeFromCart(${i})">×</button>
      </div>
    </div>
  `).join('');

  const total = state.cart.reduce((s, it) => s + (it.prix * (it.qte || 1)), 0);
  document.getElementById('cart-modal-total').textContent =
    formatPrice(total) + ' ' + (getCurrency() === 'EUR' ? '€' : 'CHF');
}

function removeFromCart(idx) {
  state.cart.splice(idx, 1);
  saveCart();
  updateCartBar();
  if (state.cart.length === 0) {
    closeCartModal();
  } else {
    renderCartModal();
  }
}

// Ferme la modale panier en cliquant en dehors
document.getElementById('modal-cart').addEventListener('click', e => {
  if (e.target.id === 'modal-cart') closeCartModal();
});

// ═════════════════════════════════════════════════════════════════
// ENVOYER LA COMMANDE
// ═════════════════════════════════════════════════════════════════
async function submitOrder() {
  if (state.cart.length === 0) return;

  if (state.previewMode) {
    showToast('Mode aperçu : commande non envoyée', 'success');
    state.cart = [];
    updateCartBar();
    closeCartModal();
    return;
  }

  if (!state.resto) {
    showToast('Erreur : restaurant non chargé', 'error');
    return;
  }

  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.textContent = 'Envoi…';

  try {
    const total = state.cart.reduce((s, it) => s + (it.prix * (it.qte || 1)), 0);

    const orderData = {
      restaurant_id: state.resto.id,
      table_id: state.table?.id || null,
      table_numero: state.table?.numero || TABLE_NUM || null,
      items: state.cart.map(it => ({
        plat_id: it.id,
        nom: it.nom,
        prix: it.prix,
        qte: it.qte || 1,
        note: it.note || null
      })),
      total: total,
      statut: 'en_attente',
      heure: new Date().toISOString(),
      type_commande: URL_MODE === 'takeaway' ? 'a_emporter' : 'sur_place'
    };

    // Insertion avec retry intelligent (on retire les colonnes qui n'existent pas)
    const optionalCols = ['table_id', 'table_numero', 'type_commande'];
    let payload = { ...orderData };
    let inserted = false;

    for (let attempt = 0; attempt < 6; attempt++) {
      const { error } = await supa.from('commandes').insert(payload);
      if (!error) {
        inserted = true;
        break;
      }
      console.error('Submit tentative ' + (attempt + 1) + ':', error);

      // Retire la colonne mentionnée dans l'erreur
      const errMsg = (error.message || '').toLowerCase();
      const colMatch = errMsg.match(/column ['"]?(\w+)['"]?|could not find ['"]?(\w+)['"]?/i);
      let col = colMatch ? (colMatch[1] || colMatch[2]) : null;
      if (!col) col = optionalCols.find(c => payload[c] !== undefined);
      if (col && payload[col] !== undefined && col !== 'restaurant_id' && col !== 'items' && col !== 'total') {
        delete payload[col];
        continue;
      }
      break;
    }

    if (!inserted) {
      throw new Error('Impossible d\'envoyer la commande');
    }

    state.cart = [];
    saveCart();
    updateCartBar();
    closeCartModal();
    showToast('Commande envoyée !', 'success');

    // Recharger les commandes
    await loadOrders();
  } catch (err) {
    console.error('submitOrder:', err);
    showToast('Erreur : ' + (err.message || 'envoi impossible'), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Envoyer la commande';
  }
}

// ═════════════════════════════════════════════════════════════════
// COMMANDES EN COURS (polling)
// ═════════════════════════════════════════════════════════════════
async function loadOrders() {
  if (!state.resto || !state.table) return;
  try {
    const since = new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString(); // 4h
    const { data, error } = await supa
      .from('commandes').select('*')
      .eq('restaurant_id', state.resto.id)
      .eq('table_id', state.table.id)
      .gte('heure', since)
      .order('heure', { ascending: false });

    if (error) return;
    state.orders = (data || []).filter(o => o.statut !== 'servie' && o.statut !== 'annulee');
    updateOrdersBanner();
  } catch (e) {
    console.warn('loadOrders:', e);
  }
}

function updateOrdersBanner() {
  const banner = document.getElementById('orders-banner');
  const text = document.getElementById('orders-banner-text');
  if (state.orders.length === 0) {
    banner.style.display = 'none';
    return;
  }

  const en_attente = state.orders.filter(o => o.statut === 'en_attente').length;
  const en_cours = state.orders.filter(o => o.statut === 'en_cours').length;
  const prete = state.orders.filter(o => o.statut === 'prete').length;

  let msg = '';
  if (prete > 0) {
    msg = `<strong>Votre commande est prête !</strong> Le serveur arrive.`;
  } else if (en_cours > 0) {
    msg = `<strong>En préparation</strong> · le chef cuisine.`;
  } else if (en_attente > 0) {
    msg = `<strong>Commande reçue</strong> · vous serez prévenu.`;
  }

  text.innerHTML = msg;
  banner.style.display = msg ? 'flex' : 'none';
}

// ═════════════════════════════════════════════════════════════════
// LANCEMENT
// ═════════════════════════════════════════════════════════════════
init();

// Cleanup polling à la fermeture de la page
window.addEventListener('beforeunload', () => {
  if (state.pollInterval) clearInterval(state.pollInterval);
});
</script>
</body>
</html>
