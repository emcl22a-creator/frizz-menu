<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light">
<title>Créer un compte · Frizz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F2F2F7;
    --bg-secondary: #FFFFFF;
    --label: #000000;
    --label-secondary: rgba(60, 60, 67, 0.60);
    --label-tertiary: rgba(60, 60, 67, 0.30);
    --separator: rgba(60, 60, 67, 0.18);
    --blue: #007AFF;
    --red: #FF3B30;
    --green: #34C759;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.4;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    color-scheme: light;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -150px; right: -120px;
    width: 520px; height: 520px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.09) 35%, transparent 65%);
    filter: blur(60px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb1 18s ease-in-out infinite;
  }
  body::after {
    content: ''; position: fixed; bottom: -180px; left: -150px;
    width: 480px; height: 480px;
    background: radial-gradient(circle at 70% 70%, rgba(0, 100, 200, 0.16) 0%, rgba(0, 100, 200, 0.07) 35%, transparent 65%);
    filter: blur(70px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb2 22s ease-in-out infinite;
  }
  html::before {
    content: ''; position: fixed; top: 30%; left: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(100, 210, 255, 0.14) 0%, rgba(100, 210, 255, 0.06) 40%, transparent 70%);
    filter: blur(80px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb3 26s ease-in-out infinite;
  }
  @keyframes floatOrb1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-30px,40px) scale(1.08);} }
  @keyframes floatOrb2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(40px,-30px) scale(1.10);} }
  @keyframes floatOrb3 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,30px) scale(1.12);} }
  @media (prefers-reduced-motion: reduce) { body::before, body::after, html::before { animation: none; } }

  button, a { font-family: inherit; cursor: pointer; text-decoration: none; }
  button { border: none; background: none; color: inherit; padding: 0; }
  input { font-family: inherit; color: inherit; }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 24px max(32px, env(safe-area-inset-bottom));
    max-width: 460px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    font-size: 17px;
    font-weight: 400;
    padding: 8px 0;
    width: fit-content;
    transition: opacity 0.15s;
  }
  .back-btn:hover { opacity: 0.7; }
  .back-btn svg { width: 12px; height: 12px; stroke-width: 3; }

  .header {
    margin: 24px 0 24px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  .logo-mini {
    width: 56px; height: 56px;
    border-radius: 14px;
    margin-bottom: 20px;
    filter: drop-shadow(0 6px 18px rgba(10, 132, 255, 0.40));
  }
  .title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.030em;
    line-height: 1.1;
    margin-bottom: 8px;
    color: var(--label);
  }
  .subtitle {
    font-size: 16px;
    color: var(--label-secondary);
    letter-spacing: -0.012em;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

  form { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s backwards; }

  .form-group {
    background: rgba(255, 255, 255, 0.90);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.50) inset,
      0 4px 12px rgba(0, 0, 0, 0.04),
      0 1px 3px rgba(0, 0, 0, 0.06);
    position: relative;
  }
  .form-group::before { display: none; }
  .input-row { display: flex; align-items: center; padding: 0 16px; }
  .input-row:not(:last-child) { border-bottom: 0.5px solid rgba(60, 60, 67, 0.12); }
  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 16px 0;
    font-size: 17px;
    color: var(--label);
    outline: none;
    letter-spacing: -0.022em;
  }
  .input-row input::placeholder { color: var(--label-tertiary); }

  .helper {
    font-size: 13px;
    color: var(--label-tertiary);
    padding: 6px 4px 18px;
    letter-spacing: -0.005em;
  }

  .submit-btn {
    width: 100%;
    background: #007AFF;
    color: white;
    padding: 16px 22px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.018em;
    box-shadow: 0 8px 24px rgba(0, 122, 255, 0.30), 0 2px 6px rgba(0, 0, 0, 0.04);
    transition: transform 0.18s cubic-bezier(0.32, 0.72, 0.42, 1), box-shadow 0.18s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .submit-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 12px 32px rgba(0, 122, 255, 0.40), 0 2px 6px rgba(0, 0, 0, 0.04);
  }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.7; cursor: wait; }
  .submit-btn.loading .btn-spinner { display: inline-block; }
  .btn-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.30);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255, 69, 58, 0.10);
    border: 0.5px solid rgba(255, 69, 58, 0.30);
    color: #FF6961;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 14px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .error-msg.show { display: block; }

  .benefits {
    margin: 18px 0 22px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.90);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 12px;
    box-shadow:
      0 1px 0 0 rgba(255, 255, 255, 0.50) inset,
      0 4px 12px rgba(0, 0, 0, 0.04);
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s backwards;
  }
  .benefit-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--label);
    padding: 4px 0;
    letter-spacing: -0.012em;
  }
  .benefit-row svg { width: 14px; height: 14px; color: var(--green); flex-shrink: 0; }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 15px;
    color: var(--label-secondary);
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s backwards;
  }
  .footer a { color: var(--blue); font-weight: 600; }
  .footer a:hover { opacity: 0.7; }

  /* Country selector */
  .country-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 12px;
    background: rgba(255, 255, 255, 0.90);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    border-radius: 14px;
    color: var(--label);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.32, 0.72, 0.42, 1);
    text-align: left;
  }
  .country-btn:hover {
    border-color: rgba(0, 122, 255, 0.40);
    transform: translateY(-1px);
  }
  .country-btn.country-active {
    border-color: var(--blue);
    background: rgba(0, 122, 255, 0.08);
    box-shadow:
      0 0 0 1px var(--blue),
      0 0 16px rgba(0, 122, 255, 0.20);
  }
</style>
</head>
<body>
<div class="container">
  <a href="landing.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>

  <div class="header">
    <img class="logo-mini" src="https://i.ibb.co/Lz5BgN5k/Enhancer-Ultra-HD-d517c052-0910-4699-bdf1-050fe0c862cd-Photoroom.png" alt="Frizz" style="width:120px;height:120px;display:block;margin:0 auto 20px;"/>
    <h1 class="title">Créer mon compte</h1>
    <p class="subtitle">Frizz décroche à votre place. 24h/24.</p>
  </div>

  <div class="benefits">
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Frizz décroche 24h/24, 7j/7
    </div>
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Prend vos réservations automatiquement
    </div>
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Installation en 5 minutes
    </div>
  </div>

  <form id="signupForm" novalidate>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Sélecteur pays -->
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 13px; color: var(--label-secondary); margin-bottom: 8px; letter-spacing: -0.005em; padding-left: 4px;">Votre restaurant est en :</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button type="button" id="countryFR" onclick="selectCountry('FR')" class="country-btn country-active">
          <span style="font-size: 24px;">🇫🇷</span>
          <div style="font-weight: 600; font-size: 15px;">France</div>
        </button>
        <button type="button" id="countryCH" onclick="selectCountry('CH')" class="country-btn">
          <span style="font-size: 24px;">🇨🇭</span>
          <div style="font-weight: 600; font-size: 15px;">Suisse</div>
        </button>
      </div>
    </div>

    <div class="form-group">
      <div class="input-row">
        <input type="text" id="salonNom" placeholder="Nom du restaurant" autocomplete="organization" required>
      </div>
      <div class="input-row">
        <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      </div>
      <div class="input-row">
        <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" autocomplete="new-password" required minlength="6">
      </div>
    </div>

    <div class="helper">En continuant, vous acceptez nos conditions.</div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-spinner"></span>
      <span class="btn-text">Créer mon compte</span>
    </button>
  </form>

  <div class="footer">
    Déjà un compte ? <a href="login.html">Se connecter</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('signupForm');
const errorEl = document.getElementById('errorMsg');
const btn = document.getElementById('submitBtn');
const btnText = btn.querySelector('.btn-text');

// Pays sélectionné par défaut
let selectedCountry = 'FR';

function selectCountry(country) {
  selectedCountry = country;
  document.getElementById('countryFR').classList.toggle('country-active', country === 'FR');
  document.getElementById('countryCH').classList.toggle('country-active', country === 'CH');
}
window.selectCountry = selectCountry;

function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
function hideError() { errorEl.classList.remove('show'); }
function setLoading(loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  btnText.textContent = loading ? 'Création en cours…' : 'Créer mon compte';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const salonNom = document.getElementById('salonNom').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!salonNom || !email || !password) { showError('Tous les champs sont obligatoires'); return; }
  if (password.length < 6) { showError('Le mot de passe doit faire au moins 6 caractères'); return; }

  setLoading(true);
  try {
    const { data: authData, error: authError } = await supa.auth.signUp({ email, password });
    if (authError) throw authError;
    if (!authData.user) throw new Error('Erreur lors de la création du compte');

    const { error: salonError } = await supa
      .from('frizz_ai_salons')
      .insert({
        user_id: authData.user.id,
        nom: salonNom,
        pays: selectedCountry,
        actif: true,
        subscription_status: 'inactive',
        trial_end: null,
      });
    if (salonError) throw salonError;

    window.location.href = 'setup.html';
  } catch (err) {
    setLoading(false);
    let msg = err.message || 'Une erreur est survenue';
    if (msg.includes('already registered') || msg.includes('already been registered')) {
      msg = 'Cet email a déjà un compte. Connectez-vous à la place.';
    } else if (msg.includes('invalid email') || msg.includes('Invalid email')) {
      msg = "Cet email n'est pas valide";
    } else if (msg.includes('Password should be')) {
      msg = 'Le mot de passe doit faire au moins 6 caractères';
    }
    showError(msg);
  }
});

supa.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: salon } = await supa
    .from('frizz_ai_salons')
    .select('onboarded')
    .eq('user_id', session.user.id)
    .limit(1).single();
  if (salon && salon.onboarded === false) {
    window.location.href = 'setup.html';
  } else {
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
