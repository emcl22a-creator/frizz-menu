<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>Mode Service — Frizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #141416;
    --label: #F5F5F7;
    --label-2: rgba(245,245,247,0.62);
    --label-3: rgba(245,245,247,0.42);
    --fill-1: rgba(255,255,255,0.06);
    --fill-2: rgba(255,255,255,0.04);
    --sep: rgba(255,255,255,0.08);
    --sep-strong: rgba(255,255,255,0.14);
    --sep-opaque: #232325;
    --blue: #0A84FF;
    --blue-soft: rgba(10,132,255,0.16);
    --green: #30D158;
    --green-soft: rgba(48,209,88,0.16);
    --orange: #FF9F0A;
    --red: #FF453A;
    --pill: 100px;
    --r-sm: 12px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-xl: 28px;
    --ease: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  *::selection { background: var(--blue); color: #fff; }
  html, body {
    background: var(--bg);
    color: var(--label);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 500;
    letter-spacing: -0.011em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
  input, textarea {
    font-family: inherit;
    font-size: 16px;
    background: var(--fill-2);
    color: var(--label);
    border: 1px solid var(--sep-opaque);
    border-radius: var(--r-sm);
    padding: 14px 16px;
    width: 100%;
    transition: all 0.2s var(--ease);
  }
  input:focus { outline: none; border-color: var(--blue); }

  /* ========== HEADER ========== */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border-bottom: 1px solid var(--sep);
  }
  .header-inner {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }
  .brand-logo {
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.045em;
    color: var(--blue);
    text-shadow: 0 0 16px rgba(10,132,255,0.5);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .brand-logo .spark {
    font-size: 22px;
    filter: drop-shadow(0 0 10px rgba(10,132,255,0.95));
  }
  .brand-info { line-height: 1.2; }
  .brand-name { font-size: 14px; font-weight: 700; color: var(--label); }
  .brand-sub {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .brand-sub::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .clock {
    background: var(--fill-2);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--label);
    font-variant-numeric: tabular-nums;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--fill-2);
    border: 1px solid var(--sep);
    color: var(--label-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s var(--ease);
  }
  .icon-btn:hover { background: var(--fill-1); color: var(--label); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ========== MAIN LAYOUT ========== */
  main { padding: 20px 18px 100px; max-width: 1200px; margin: 0 auto; }

  /* ========== SCREENS ========== */
  .screen { display: none; animation: screen-in 0.35s var(--ease); }
  .screen.active { display: block; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== HERO BANNER ========== */
  .hero {
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.05;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .hero p {
    font-size: 14.5px;
    color: var(--label-2);
    line-height: 1.4;
  }

  /* ========== TABLES GRID ========== */
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .table-card {
    background: var(--bg-elev);
    border: 1px solid var(--sep);
    border-radius: var(--r-md);
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    position: relative;
    overflow: hidden;
    text-align: left;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .table-card:hover {
    border-color: var(--sep-strong);
    transform: translateY(-2px);
  }
  .table-card.has-orders {
    background: linear-gradient(135deg, rgba(255,159,10,0.12) 0%, rgba(255,159,10,0.04) 100%);
    border-color: rgba(255,159,10,0.4);
  }
  .table-card.has-ready {
    background: linear-gradient(135deg, rgba(48,209,88,0.14) 0%, rgba(48,209,88,0.04) 100%);
    border-color: rgba(48,209,88,0.5);
    box-shadow: 0 0 24px rgba(48,209,88,0.18);
  }
  .table-card-num {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--label);
    line-height: 1;
  }
  .table-card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--label-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }
  .table-card-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--label-2);
  }
  .table-card.has-orders .table-card-status { color: var(--orange); }
  .table-card.has-ready .table-card-status { color: var(--green); }
  .table-card-status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
  }
  .table-card.has-orders .dot,
  .table-card.has-ready .dot {
    animation: pulse 2s ease-in-out infinite;
  }
  .table-card-amount {
    font-size: 13px;
    font-weight: 800;
    color: var(--label);
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }

  /* ========== TABLE DETAIL VIEW ========== */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px 9px 11px;
    background: var(--fill-2);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    color: var(--label);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s var(--ease);
    margin-bottom: 18px;
  }
  .back-btn:hover { background: var(--fill-1); }
  .back-btn svg { width: 14px; height: 14px; }

  .table-header-card {
    background: var(--bg-elev);
    border: 1px solid var(--sep);
    border-radius: var(--r-lg);
    padding: 22px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .table-header-card::before {
    content: '';
    position: absolute;
    top: -40%; right: -10%;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(10,132,255,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .table-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.04em;
    margin-bottom: 4px;
  }
  .table-meta {
    font-size: 13px;
    color: var(--label-2);
    font-weight: 600;
  }

  .table-orders {
    margin-top: 18px;
  }
  .table-orders-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--label-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .order-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13.5px;
    font-weight: 600;
    border-bottom: 1px solid var(--sep);
  }
  .order-line:last-child { border-bottom: 0; }
  .order-line-info { flex: 1; min-width: 0; }
  .order-line-name { color: var(--label); }
  .order-line-meta {
    font-size: 11.5px;
    color: var(--label-3);
    font-weight: 500;
    margin-top: 1px;
  }
  .order-line-statut {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: var(--pill);
    font-size: 10.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .order-line-statut.en_attente { background: rgba(255,69,58,0.16); color: var(--red); }
  .order-line-statut.en_cours { background: rgba(255,159,10,0.16); color: var(--orange); }
  .order-line-statut.prete { background: var(--green-soft); color: var(--green); }

  .table-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 4px;
    font-size: 17px;
    font-weight: 800;
    color: var(--label);
    border-top: 2px solid var(--sep);
    margin-top: 8px;
  }
  .table-total-row .total-amount {
    font-size: 22px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
  }

  /* Action buttons row */
  .table-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .action-btn {
    padding: 14px 16px;
    border-radius: var(--r-md);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    letter-spacing: -0.015em;
    border: 0;
  }
  .action-btn-primary {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 6px 18px rgba(10,132,255,0.4);
  }
  .action-btn-primary:hover { transform: translateY(-1px); }
  .action-btn-success {
    background: var(--green);
    color: #fff;
    box-shadow: 0 6px 18px rgba(48,209,88,0.4);
  }
  .action-btn-success:hover { transform: translateY(-1px); }
  .action-btn-secondary {
    background: var(--fill-2);
    border: 1px solid var(--sep);
    color: var(--label);
  }
  .action-btn-secondary:hover { background: var(--fill-1); border-color: var(--sep-strong); }
  .action-btn svg { width: 16px; height: 16px; }
  .action-btn.full { grid-column: 1 / -1; }

  /* ========== MENU ORDER VIEW (ajout plats) ========== */
  .cat-bar {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 18px;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    padding: 9px 16px;
    background: var(--fill-2);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    color: var(--label-2);
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s var(--ease);
  }
  .cat-chip.active {
    background: #fff;
    color: #000;
    border-color: #fff;
  }
  .plats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .plat-card {
    background: var(--bg-elev);
    border: 1px solid var(--sep);
    border-radius: var(--r-md);
    cursor: pointer;
    transition: all 0.2s var(--ease);
    text-align: left;
    position: relative;
    overflow: hidden;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .plat-card:hover {
    border-color: var(--sep-strong);
    transform: translateY(-2px);
  }
  .plat-card:active {
    transform: scale(0.98);
  }
  .plat-card.indispo { opacity: 0.4; pointer-events: none; }

  .plat-card-photo {
    width: 100%;
    aspect-ratio: 16 / 11;
    background-color: var(--fill-1);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    flex-shrink: 0;
  }
  /* Placeholder quand pas de photo */
  .plat-card-photo.no-photo {
    background:
      linear-gradient(135deg, rgba(10,132,255,0.08) 0%, rgba(10,132,255,0.02) 100%),
      var(--fill-1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label-3);
  }
  .plat-card-photo.no-photo svg { width: 32px; height: 32px; opacity: 0.5; }
  /* Overlay subtil pour lisibilité du bouton + */
  .plat-card-photo::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle at top right, rgba(0,0,0,0.4) 0%, transparent 70%);
    pointer-events: none;
  }

  .plat-card-body {
    padding: 12px 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .plat-card-name {
    font-size: 14.5px;
    font-weight: 800;
    color: var(--label);
    line-height: 1.2;
    letter-spacing: -0.018em;
    /* Tronquer si trop long (2 lignes max) */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .plat-card-cat {
    font-size: 10px;
    color: var(--label-3);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .plat-card-price {
    font-size: 16px;
    font-weight: 900;
    color: var(--label);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.025em;
    margin-top: auto;
    padding-top: 6px;
  }
  .plat-card-add {
    position: absolute;
    top: 10px; right: 10px;
    width: 32px; height: 32px;
    background: var(--blue);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
    box-shadow: 0 4px 14px rgba(10,132,255,0.55), 0 0 0 2px rgba(0,0,0,0.2);
    z-index: 2;
  }
  .plat-card:hover .plat-card-add {
    transform: scale(1.08);
    box-shadow: 0 6px 18px rgba(10,132,255,0.7), 0 0 0 2px rgba(0,0,0,0.2);
  }
  .plat-card-add svg {
    width: 18px;
    height: 18px;
    stroke-width: 3;
  }

  /* ========== ORDER CART (panier en bas) ========== */
  .order-cart {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 16px;
    right: 16px;
    max-width: 720px;
    margin: 0 auto;
    background: linear-gradient(135deg, var(--blue) 0%, #0071e3 100%);
    color: #fff;
    border-radius: 18px;
    padding: 14px 18px;
    z-index: 50;
    display: none;
    align-items: center;
    gap: 14px;
    box-shadow: 0 16px 48px -12px rgba(10,132,255,0.6), 0 0 28px rgba(10,132,255,0.4);
    animation: cart-in 0.45s var(--ease-spring) both;
  }
  @keyframes cart-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .order-cart.show { display: flex; }
  .order-cart-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .order-cart-icon svg { width: 18px; height: 18px; }
  .order-cart-info { flex: 1; min-width: 0; }
  .order-cart-label { font-size: 11.5px; font-weight: 700; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.06em; }
  .order-cart-total { font-size: 17px; font-weight: 900; letter-spacing: -0.022em; font-variant-numeric: tabular-nums; }
  .order-cart-btn {
    background: #fff;
    color: var(--blue);
    border-radius: var(--pill);
    padding: 10px 18px;
    font-size: 13.5px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s var(--ease);
  }
  .order-cart-btn:hover { transform: scale(1.03); }

  /* ========== PAYMENT MODAL (mockup) ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(20px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 18px;
    overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 100%;
    max-width: 460px;
    background: var(--bg-elev);
    border: 1px solid var(--sep);
    border-radius: var(--r-xl);
    padding: 26px 24px 22px;
    margin: auto;
    animation: modal-in 0.4s var(--ease-spring) both;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-align: center;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 14px;
    color: var(--label-2);
    text-align: center;
    margin-bottom: 22px;
  }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    bottom: calc(38px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(140px);
    background: rgba(22,22,24,0.95);
    backdrop-filter: blur(28px);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    padding: 12px 22px;
    font-size: 13.5px;
    font-weight: 700;
    z-index: 250;
    transition: transform 0.4s var(--ease-spring);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  body.has-cart .toast { bottom: calc(110px + env(safe-area-inset-bottom)); }

  /* ========== EMPTY STATES ========== */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--label-3);
  }
  .empty-icon {
    width: 64px; height: 64px;
    background: var(--fill-2);
    border-radius: 18px;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label-3);
  }
  .empty-icon svg { width: 28px; height: 28px; }
  .empty-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--label);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .empty p { font-size: 13.5px; line-height: 1.5; max-width: 320px; margin: 0 auto; }

  /* ========== LOADING ========== */
  .center-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 1000;
    transition: opacity 0.3s;
  }
  .center-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-logo {
    font-weight: 900;
    font-size: 42px;
    color: var(--blue);
    text-shadow: 0 0 30px rgba(10,132,255,0.6);
    letter-spacing: -0.045em;
    animation: pulse 1.6s ease-in-out infinite;

  /* Section title */
  .section-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--label-3);

  @media (max-width: 480px) {
    .hero h1 { font-size: 26px; }
    .tables-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .plats-grid { grid-template-columns: repeat(2, 1fr); }
    .clock { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="center-screen" id="loading">
  <div class="loading-logo">Frizz<span class="spark">✦</span></div>
</div>

<!-- App -->
<div id="app" style="display:none;">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">Frizz<span class="spark">✦</span></div>
        <div class="brand-info">
          <div class="brand-name" id="resto-name">—</div>
          <div class="brand-sub">Mode Service</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="sound-toggle" onclick="toggleSound()" title="Activer/désactiver les notifications sonores" style="background: var(--blue-soft, rgba(10,132,255,0.14)); color: var(--blue, #0A84FF); border: 1px solid rgba(10,132,255,0.28); border-radius: 100px; padding: 8px 14px; cursor: pointer; font-size: 12.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 7px; letter-spacing: -0.012em; transition: all 0.2s;">
          <svg id="sound-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px; height:14px;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg id="sound-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px; height:14px; display:none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
          <span id="sound-label">Son ON</span>
        </button>
        <div class="clock" id="clock">--:--</div>
      </div>
    </div>
  </header>

  <main>

    <!-- ========= ÉCRAN 1 : Liste des tables ========= -->
    <section class="screen active" id="screen-tables">
      <div class="hero">
        <h1>Tes tables</h1>
        <p>Sélectionne une table pour voir ses commandes ou prendre une nouvelle commande.</p>
      </div>
      <div class="tables-grid" id="tables-grid"></div>
    </section>

    <!-- ========= ÉCRAN 2 : Détail d'une table ========= -->
    <section class="screen" id="screen-table-detail">
      <button class="back-btn" onclick="showScreen('tables')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Retour aux tables
      </button>

      <div class="table-header-card">
        <div class="table-title" id="td-table-name">Table —</div>
        <div class="table-meta" id="td-table-meta">—</div>

        <div class="table-orders" id="td-orders">
          <!-- rempli dynamiquement -->
        </div>

        <div class="table-actions">
          <button class="action-btn action-btn-secondary full" onclick="showScreen('order')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Ajouter des plats
          </button>
          <button class="action-btn action-btn-success full" id="td-pay-btn" onclick="togglePaiementTable()" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="td-pay-icon"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="td-pay-label">Marquer payée</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ========= ÉCRAN 3 : Prise de commande (sélection plats) ========= -->
    <section class="screen" id="screen-order">
      <button class="back-btn" onclick="showScreen('table-detail')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Retour à la table
      </button>

      <div class="hero">
        <h1 id="order-title">Nouvelle commande</h1>
        <p id="order-sub">Touche un plat pour l'ajouter au panier.</p>
      </div>

      <div class="cat-bar" id="cat-bar"></div>
      <div class="plats-grid" id="plats-grid"></div>
    </section>

  </main>

  <!-- ========= MODAL NOTIFICATION : PLAT PRÊT ========= -->
  <div id="ready-notif-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; animation: notif-fade-in 0.3s ease;">
    <div id="ready-notif-card" style="background: linear-gradient(135deg, #FFFFFF 0%, #F8FAFF 100%); border: 2px solid #0A84FF; border-radius: 28px; padding: 36px 32px; max-width: 480px; width: 100%; box-shadow: 0 30px 80px rgba(10,132,255,0.4), 0 0 0 8px rgba(10,132,255,0.15); position: relative; animation: notif-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;">

      <!-- Pastille pulsante en haut -->
      <div style="position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: #0A84FF; color: #fff; padding: 8px 18px; border-radius: 100px; font-size: 11px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; box-shadow: 0 6px 20px rgba(10,132,255,0.5); display: flex; align-items: center; gap: 8px;">
        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #30D158; box-shadow: 0 0 12px #30D158; animation: pulse-dot 1.4s ease-in-out infinite;"></span>
        Plat prêt
      </div>

      <!-- Numéro de table en grand -->
      <div style="text-align: center; margin-top: 16px; margin-bottom: 22px;">
        <div style="font-size: 13px; color: #6E6E73; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;">Servir maintenant</div>
        <div id="ready-notif-table" style="font-size: 72px; font-weight: 800; color: #0A84FF; letter-spacing: -0.04em; line-height: 1; font-feature-settings: 'tnum';">Table —</div>
      </div>

      <!-- Liste des plats -->
      <div style="background: rgba(10,132,255,0.06); border: 1px solid rgba(10,132,255,0.18); border-radius: 16px; padding: 16px 18px; margin-bottom: 24px; max-height: 240px; overflow-y: auto;">
        <div style="font-size: 11px; color: #6E6E73; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;">À servir</div>
        <div id="ready-notif-items" style="display: flex; flex-direction: column; gap: 8px; font-family: -apple-system, sans-serif;"></div>
      </div>

      <!-- Personne qui a commandé -->
      <div id="ready-notif-personne" style="font-size: 13px; color: #6E6E73; text-align: center; margin-bottom: 22px; font-weight: 500;"></div>

      <!-- Bouton confirmation -->
      <button onclick="confirmReadyNotification()" style="width: 100%; background: #0A84FF; color: #fff; border: 0; padding: 18px; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 24px rgba(10,132,255,0.4); transition: all 0.2s; letter-spacing: -0.01em;">
        ✓ Servi à la table
      </button>

      <!-- Compteur si plusieurs notifs en attente -->
      <div id="ready-notif-queue" style="display: none; text-align: center; margin-top: 14px; font-size: 12.5px; color: #6E6E73; font-weight: 600;"></div>
    </div>
  </div>

  <!-- Audio pour notification sonore (généré via Web Audio API, voir JS) -->

  <style>
  @keyframes notif-fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes notif-pop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  </style>

  <!-- Order cart (en bas, visible en mode commande) -->
  <div class="order-cart" id="order-cart" onclick="sendCart()">
    <div class="order-cart-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
    </div>
    <div class="order-cart-info">
      <div class="order-cart-label"><span id="cart-count">0</span> plats</div>
      <div class="order-cart-total" id="cart-total">0.00€</div>
    </div>
    <button class="order-cart-btn">Envoyer en cuisine →</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="dot"></span>
    <span id="toast-text"></span>
  </div>

  </div>

<script>
// ============================================================================
// SUPABASE
// ============================================================================
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

// ============================================================================
// STATE
// ============================================================================
const state = {
  user: null,
  resto: null,
  tables: [],
  orders: [],          // toutes les commandes actives (en_attente / en_cours / prete / servie non payees)
  plats: [],
  menus: [],
  // Vue actuelle
  selectedTableId: null,
  // Panier de prise de commande
  cart: [],            // [{id, nom, prix, qte}]
  activeCat: null,
  // Pourboire
  tipPct: 0,
  // Polling
  pollInterval: null,
  // Notifications "plat prêt"
  notifiedOrderIds: new Set(),  // IDs déjà notifiés (pour éviter de re-notifier après confirmation)
  pendingNotifications: [],     // queue des commandes prêtes à montrer
  currentNotification: null,    // notif actuellement affichée dans la modal
  soundEnabled: true            // toggle son
};

const params = new URLSearchParams(location.search);
const RESTO_SLUG_PARAM = params.get('resto') || '';

// ============================================================================
// UTILS
// ============================================================================
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(v) { return (parseFloat(v)||0).toFixed(2) + '€'; }
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function tickClock() {
  const d = new Date();
  document.getElementById('clock').textContent = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
setInterval(tickClock, 30000);

// ============================================================================
// AUTH + INIT
// ============================================================================
async function init() {
  try {
    // 1) Auth
    const { data: { session } } = await supa.auth.getSession();
    if (!session) {
      // Pas connecté → redirige vers login
      location.href = 'login.html?redirect=serveur.html' + (RESTO_SLUG_PARAM ? '?resto=' + RESTO_SLUG_PARAM : '');
      return;
    }
    state.user = session.user;

    // 2) Charger le restaurant lié à ce compte
    let restoQuery = supa.from('restaurants').select('*');
    if (RESTO_SLUG_PARAM) {
      restoQuery = restoQuery.eq('slug', RESTO_SLUG_PARAM);
    } else {
      restoQuery = restoQuery.eq('user_id', session.user.id);
    }
    const { data: restos, error: restoErr } = await restoQuery.limit(1);
    if (restoErr) throw restoErr;
    if (!restos || restos.length === 0) {
      throw new Error('Aucun restaurant trouvé pour ce compte. Connecte-toi avec le compte propriétaire du restaurant.');
    }
    state.resto = restos[0];
    document.getElementById('resto-name').textContent = state.resto.nom || 'Restaurant';
    document.title = (state.resto.nom || 'Restaurant') + ' — Mode Service';

    // 3) Charger tables, plats, menus en parallèle
    const [tablesRes, platsRes, menusRes] = await Promise.all([
      supa.from('tables').select('*').eq('restaurant_id', state.resto.id).order('nom', { ascending: true }),
      supa.from('menu').select('*').eq('restaurant_id', state.resto.id).order('categorie').order('nom'),
      supa.from('menus').select('*').eq('restaurant_id', state.resto.id).order('ordre')
    ]);
    if (tablesRes.error) throw tablesRes.error;
    if (platsRes.error) throw platsRes.error;
    state.tables = tablesRes.data || [];
    state.plats = platsRes.data || [];
    state.menus = menusRes.data || [];

    // 4) Charger commandes actives
    await loadOrders();

    // 5) Affichage
    tickClock();
    renderTables();

    // Restaurer la préférence "son ON/OFF" depuis localStorage
    try {
      const stored = localStorage.getItem('frizz_serveur_sound');
      if (stored === '0') {
        // L'utilisateur avait désactivé → on désactive (sans rejouer le ding)
        state.soundEnabled = true;  // pour que toggleSound() bascule à false
        toggleSound();
      }
    } catch(e) {}

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').style.display = 'block';

    // 6) Polling commandes toutes les 5s
    state.pollInterval = setInterval(loadOrders, 5000);

  } catch (err) {
    console.error('init:', err);
    document.getElementById('loading').innerHTML = `<div style="text-align:center; padding:30px;"><div style="font-size:18px; font-weight:800; margin-bottom:8px;">Erreur</div><div style="font-size:13px; color:var(--label-2); max-width:300px; margin:0 auto;">${escapeHtml(err.message || 'Impossible de charger la page')}</div><a href="login.html" style="display:inline-block; margin-top:18px; padding:10px 18px; background:var(--blue); color:#fff; border-radius:100px; font-weight:700; text-decoration:none;">Se reconnecter</a></div>`;
  }
}

async function loadOrders() {
  if (!state.resto) return;
  // On charge les commandes des dernières 24h (toutes statuts sauf annulee)
  const yesterday = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data, error } = await supa.from('commandes')
    .select('*')
    .eq('restaurant_id', state.resto.id)
    .in('statut', ['en_attente','en_cours','prete','servie'])
    .gte('heure', yesterday)
    .order('heure', { ascending: true });
  if (!error) {
    const oldOrders = state.orders;
    state.orders = data || [];

    // ⚠ Détection des nouvelles commandes en statut "prete"
    // Une commande est notifiée si :
    //   - Elle est maintenant en statut 'prete'
    //   - Elle n'a pas déjà été notifiée (notifiedOrderIds)
    // Lors du tout premier chargement (oldOrders.length === 0), on ne notifie pas
    // (pour éviter de spammer le serveur qui ouvre l'app au milieu d'un service)
    if (oldOrders.length > 0) {
      const newReady = state.orders.filter(o =>
        o.statut === 'prete' && !state.notifiedOrderIds.has(o.id)
      );
      if (newReady.length > 0) {
        newReady.forEach(o => {
          state.notifiedOrderIds.add(o.id);
          state.pendingNotifications.push(o);
        });
        showNextNotification();
      }
    } else {
      // Premier chargement : on marque toutes les commandes prêtes comme déjà notifiées
      // pour ne notifier QUE les nouvelles à partir de maintenant
      state.orders.filter(o => o.statut === 'prete').forEach(o => {
        state.notifiedOrderIds.add(o.id);
      });
    }

    // Refresh la vue active
    if (document.getElementById('screen-tables').classList.contains('active')) {
      renderTables();
    } else if (document.getElementById('screen-table-detail').classList.contains('active')) {
      renderTableDetail();
    }
  }
}

async function logout() {
  if (!confirm('Se déconnecter du mode serveur ?')) return;
  await supa.auth.signOut();
  location.href = 'login.html';
}

// ============================================================================
// SCREENS
// ============================================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'tables') {
    state.selectedTableId = null;
    renderTables();
  } else if (name === 'table-detail') {
    renderTableDetail();
  } else if (name === 'order') {
    renderOrderScreen();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================================
// VIEW : LISTE DES TABLES
// ============================================================================
function renderTables() {
  const wrap = document.getElementById('tables-grid');
  if (!wrap) return;
  if (state.tables.length === 0) {
    wrap.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div class="empty-title">Aucune table</div>
      <p>Va dans le dashboard admin pour créer tes tables.</p>
    </div>`;
    return;
  }

  wrap.innerHTML = state.tables.map(t => {
    // ⚠ Important : on ne compte QUE les commandes ACTIVES (non payées)
    // pour déterminer si la table est occupée ou libre
    const activeOrders = state.orders.filter(o => o.table_id === t.id && o.statut !== 'payee');
    const total = activeOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
    const hasReady = activeOrders.some(o => o.statut === 'prete');
    const hasOrders = activeOrders.length > 0;
    const cls = hasReady ? 'has-ready' : (hasOrders ? 'has-orders' : '');
    const status = hasReady ? '🛎 Prête à servir' :
                   hasOrders ? `${activeOrders.length} commande${activeOrders.length>1?'s':''}` :
                   'Libre';
    return `
      <button class="table-card ${cls}" onclick="openTable('${escapeHtml(t.id)}')">
        <div>
          <div class="table-card-num">${escapeHtml(t.nom || '?')}</div>
          <div class="table-card-label">Table</div>
        </div>
        <div>
          <div class="table-card-status">
            <span class="dot"></span>
            <span>${status}</span>
          </div>
          ${hasOrders ? `<div class="table-card-amount">${fmtMoney(total)}</div>` : ''}
        </div>
      </button>`;
  }).join('');
}

function openTable(tableId) {
  state.selectedTableId = tableId;
  showScreen('table-detail');
}

// ============================================================================
// VIEW : DÉTAIL TABLE
// ============================================================================
function renderTableDetail() {
  const t = state.tables.find(x => x.id === state.selectedTableId);
  if (!t) { showScreen('tables'); return; }
  document.getElementById('td-table-name').textContent = 'Table ' + (t.nom || '?');

  // ⚠ On ne montre QUE les commandes actives (non payées) de CETTE table
  const activeOrders = state.orders.filter(o => o.table_id === t.id && o.statut !== 'payee');

  const meta = activeOrders.length === 0 ?
    'Aucune commande en cours' :
    `${activeOrders.length} commande${activeOrders.length>1?'s':''}`;
  document.getElementById('td-table-meta').textContent = meta;

  const ordersBox = document.getElementById('td-orders');
  if (activeOrders.length === 0) {
    ordersBox.innerHTML = `<div style="padding: 20px 0; text-align:center; color: var(--label-3); font-size: 13.5px; font-weight: 600;">Table libre · Aucune commande en cours</div>`;
    document.getElementById('td-pay-btn').style.display = 'none';
    return;
  }

  // Aplatir les items des commandes
  const allItems = [];
  let total = 0;
  activeOrders.forEach(o => {
    const items = Array.isArray(o.items) ? o.items : [];
    items.forEach(it => {
      allItems.push({
        ...it,
        statut: o.statut,
        order_id: o.id,
        personne_nom: o.personne_nom
      });
    });
    total += parseFloat(o.total) || 0;
  });

  const statutLabels = { en_attente: 'En attente', en_cours: 'En cuisine', prete: 'Prête', servie: 'Servie' };

  ordersBox.innerHTML = `
    <div class="table-orders-title">Commandes (${activeOrders.length})</div>
    ${allItems.map(it => `
      <div class="order-line">
        <div class="order-line-info">
          <div class="order-line-name">${escapeHtml(it.qte || 1)}× ${escapeHtml(it.nom || '?')}</div>
          <div class="order-line-meta">${escapeHtml(it.personne_nom || '')} · ${fmtMoney(it.prix * (it.qte || 1))}</div>
        </div>
        <span class="order-line-statut ${it.statut}">${statutLabels[it.statut] || it.statut}</span>
      </div>
    `).join('')}
    <div class="table-total-row">
      <span>Total addition</span>
      <span class="total-amount">${fmtMoney(total)}</span>
    </div>
  `;

  // Bouton "Marquer payée · X€" toujours visible quand il y a des commandes actives
  const btn = document.getElementById('td-pay-btn');
  const label = document.getElementById('td-pay-label');
  btn.style.display = 'inline-flex';
  btn.classList.remove('action-btn-secondary');
  btn.classList.add('action-btn-success');
  label.textContent = `Marquer payée · ${fmtMoney(total)}`;
}

// ============================================================================
// VIEW : PRISE DE COMMANDE
// ============================================================================
function renderOrderScreen() {
  const t = state.tables.find(x => x.id === state.selectedTableId);
  if (!t) { showScreen('tables'); return; }
  document.getElementById('order-title').textContent = 'Table ' + (t.nom || '?');
  document.getElementById('order-sub').textContent = 'Touche un plat pour l\'ajouter à la commande.';

  // Filtrer plats : ceux du menu actif uniquement
  const activeMenu = state.menus.find(m => m.actif);
  let plats = state.plats.filter(p => p.disponible !== false);
  if (activeMenu) {
    plats = plats.filter(p => Array.isArray(p.menu_ids) && p.menu_ids.includes(activeMenu.id));
  }

  // Catégories ordonnées
  const ORDER = ['entrée','entrées','entree','entrees','plat','plats','dessert','desserts','boisson','boissons'];
  const cats = [...new Set(plats.map(p => p.categorie || 'Autres'))];
  cats.sort((a, b) => {
    const ia = ORDER.findIndex(o => (a||'').toLowerCase().startsWith(o));
    const ib = ORDER.findIndex(o => (b||'').toLowerCase().startsWith(o));
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  if (!state.activeCat || !cats.includes(state.activeCat)) state.activeCat = cats[0] || null;

  // Render cat-bar
  const catBar = document.getElementById('cat-bar');
  catBar.innerHTML = ['Tous', ...cats].map(c => `
    <button class="cat-chip ${(state.activeCat === c || (c === 'Tous' && state.activeCat === null)) ? 'active' : ''}" onclick="setOrderCat('${c === 'Tous' ? '' : escapeHtml(c)}')">${escapeHtml(c)}</button>
  `).join('');

  // Render plats
  const wrap = document.getElementById('plats-grid');
  const filtered = state.activeCat ? plats.filter(p => p.categorie === state.activeCat) : plats;
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg></div>
      <div class="empty-title">Aucun plat dans cette catégorie</div>
    </div>`;
    return;
  }

  wrap.innerHTML = filtered.map(p => {
    const hasPhoto = p.photo_url && p.photo_url.trim();
    const photoStyle = hasPhoto ? `style="background-image: url('${escapeHtml(p.photo_url).replace(/'/g, "\\'")}')"` : '';
    return `
    <button class="plat-card" onclick="addToCart('${escapeHtml(p.id)}')">
      <div class="plat-card-photo ${hasPhoto ? '' : 'no-photo'}" ${photoStyle}>
        ${hasPhoto ? '' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>'}
      </div>
      <div class="plat-card-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <div class="plat-card-body">
        <div class="plat-card-cat">${escapeHtml(p.categorie || '')}</div>
        <div class="plat-card-name">${escapeHtml(p.nom)}</div>
        <div class="plat-card-price">${fmtMoney(p.prix)}</div>
      </div>
    </button>`;
  }).join('');
}

function setOrderCat(cat) {
  state.activeCat = cat || null;
  renderOrderScreen();
}

function addToCart(platId) {
  const p = state.plats.find(x => x.id === platId);
  if (!p) return;
  const existing = state.cart.find(c => c.id === platId);
  if (existing) existing.qte += 1;
  else state.cart.push({ id: p.id, nom: p.nom, prix: p.prix, qte: 1 });
  renderCart();
  showToast(p.nom + ' ajouté');
}

function renderCart() {
  const total = state.cart.reduce((s, c) => s + c.prix * c.qte, 0);
  const count = state.cart.reduce((s, c) => s + c.qte, 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total').textContent = fmtMoney(total);
  const cartEl = document.getElementById('order-cart');
  cartEl.classList.toggle('show', count > 0);
  document.body.classList.toggle('has-cart', count > 0);
}

async function sendCart() {
  if (state.cart.length === 0) return;
  const t = state.tables.find(x => x.id === state.selectedTableId);
  if (!t) return;
  const total = state.cart.reduce((s, c) => s + c.prix * c.qte, 0);

  try {
    const orderId = 'cmd_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const { error } = await supa.from('commandes').insert({
      id: orderId,
      restaurant_id: state.resto.id,
      table_id: t.id,
      session_id: 'serveur_' + state.user.id.substring(0,8),
      personne_id: 'serveur',
      personne_nom: 'Serveur',
      items: state.cart.map(c => ({ id: c.id, nom: c.nom, prix: c.prix, qte: c.qte })),
      total: total,
      statut: 'en_attente',
      heure: new Date().toISOString()
    });
    if (error) throw error;
    showToast('Commande envoyée en cuisine ✓');
    state.cart = [];
    renderCart();
    await loadOrders();
    showScreen('table-detail');
  } catch (err) {
    showToast('Erreur : ' + err.message);
    console.error(err);
  }
}

// ============================================================================
// MARQUAGE PAYÉ / NON PAYÉ
// ============================================================================
// ============================================================================
// NOTIFICATIONS "PLAT PRÊT" (modal bloquante + son)
// ============================================================================

// Génère un son d'alerte court via Web Audio API (pas besoin de fichier audio externe)
let _audioCtx = null;
function playNotificationSound() {
  if (!state.soundEnabled) return;
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = _audioCtx;
    // Si le contexte est suspendu (autoplay policy), on tente de le reprendre
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
    const now = ctx.currentTime;
    // Joue 2 notes courtes (do-mi) pour faire un "ding" agréable
    [
      { freq: 880, start: 0, duration: 0.18 },     // La5
      { freq: 1175, start: 0.12, duration: 0.22 }  // Ré6
    ].forEach(note => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = note.freq;
      gain.gain.setValueAtTime(0, now + note.start);
      gain.gain.linearRampToValueAtTime(0.32, now + note.start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + note.start + note.duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + note.start);
      osc.stop(now + note.start + note.duration);
    });
  } catch (err) {
    console.warn('Audio non disponible:', err);
  }
}

// Toggle on/off le son
function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  const iconOn = document.getElementById('sound-icon-on');
  const iconOff = document.getElementById('sound-icon-off');
  const label = document.getElementById('sound-label');
  const btn = document.getElementById('sound-toggle');
  if (state.soundEnabled) {
    iconOn.style.display = '';
    iconOff.style.display = 'none';
    label.textContent = 'Son ON';
    btn.style.background = 'rgba(10,132,255,0.14)';
    btn.style.color = '#0A84FF';
    btn.style.borderColor = 'rgba(10,132,255,0.28)';
    // Initialise le contexte audio (geste utilisateur requis pour autoplay)
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      playNotificationSound();  // petit "ding" de confirmation
    } catch(e) {}
  } else {
    iconOn.style.display = 'none';
    iconOff.style.display = '';
    label.textContent = 'Son OFF';
    btn.style.background = 'rgba(0,0,0,0.06)';
    btn.style.color = '#6E6E73';
    btn.style.borderColor = 'rgba(0,0,0,0.10)';
  }
  // Persiste le choix en localStorage pour la prochaine session
  try { localStorage.setItem('frizz_serveur_sound', state.soundEnabled ? '1' : '0'); } catch(e) {}
}

// Affiche la prochaine notification dans la queue (s'il y en a)
function showNextNotification() {
  // Si une modal est déjà affichée, on ne fait rien (l'user doit confirmer d'abord)
  if (state.currentNotification) return;
  if (state.pendingNotifications.length === 0) return;

  const order = state.pendingNotifications.shift();
  state.currentNotification = order;

  // Trouver le nom de la table
  const table = state.tables.find(t => t.id === order.table_id);
  const tableName = table ? (table.nom || '?') : '?';

  // Remplir la modal
  document.getElementById('ready-notif-table').textContent = 'Table ' + tableName;

  // Liste des plats
  const items = Array.isArray(order.items) ? order.items : [];
  const itemsHtml = items.map(it => {
    const qte = it.qte || 1;
    const nom = it.nom || '?';
    const note = it.note ? `<div style="font-size:12px; color:#6E6E73; font-style:italic; margin-top:2px;">↳ ${escapeHtml(it.note)}</div>` : '';
    return `<div style="display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-bottom:1px solid rgba(10,132,255,0.10);">
      <span style="font-weight:800; color:#0A84FF; min-width:24px; font-feature-settings:'tnum';">${qte}×</span>
      <div style="flex:1; min-width:0;">
        <div style="font-weight:700; color:#1D1D1F; letter-spacing:-0.01em;">${escapeHtml(nom)}</div>
        ${note}
      </div>
    </div>`;
  }).join('');
  document.getElementById('ready-notif-items').innerHTML = itemsHtml;

  // Personne (si présente)
  const personne = order.personne_nom ? `Commandé par ${escapeHtml(order.personne_nom)}` : '';
  document.getElementById('ready-notif-personne').textContent = personne;

  // Compteur queue
  const queueEl = document.getElementById('ready-notif-queue');
  if (state.pendingNotifications.length > 0) {
    queueEl.style.display = 'block';
    queueEl.textContent = `+ ${state.pendingNotifications.length} autre${state.pendingNotifications.length > 1 ? 's' : ''} en attente`;
  } else {
    queueEl.style.display = 'none';
  }

  // Afficher la modal
  document.getElementById('ready-notif-overlay').style.display = 'flex';

  // Jouer le son
  playNotificationSound();

  // Vibration mobile (bonus)
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
  }
}

// Le serveur confirme avoir servi le plat → passe la commande en statut "servie"
async function confirmReadyNotification() {
  const order = state.currentNotification;
  if (!order) return;

  // Optimistic UI : on ferme tout de suite pour pas bloquer le serveur
  document.getElementById('ready-notif-overlay').style.display = 'none';
  state.currentNotification = null;

  try {
    const { error } = await supa.from('commandes')
      .update({ statut: 'servie' })
      .eq('id', order.id);
    if (error) throw error;
    showToast('Servi à la table ✓');
    await loadOrders();
  } catch (err) {
    console.error('confirm notif error:', err);
    showToast('Erreur : ' + (err.message || 'mise à jour impossible'));
  }

  // Afficher la prochaine notif après 400ms (laisse respirer)
  setTimeout(() => showNextNotification(), 400);
}

async function togglePaiementTable() {
  const t = state.tables.find(x => x.id === state.selectedTableId);
  if (!t) {
    showToast('Aucune table sélectionnée');
    return;
  }
  // ⚠ On ne prend QUE les commandes actives (non payées) de cette table précise
  const activeOrders = state.orders.filter(o => o.table_id === t.id && o.statut !== 'payee');

  if (activeOrders.length === 0) {
    showToast('Aucune commande à régler sur cette table');
    return;
  }

  console.log(`[Paiement] Table ${t.nom} (id=${t.id}) → ${activeOrders.length} commandes actives à marquer payées`);

  try {
    // 1) Marquer toutes les commandes actives de CETTE table comme payées
    const ids = activeOrders.map(o => o.id);
    const { error: errCmd } = await supa.from('commandes')
      .update({ statut: 'payee' })
      .in('id', ids);
    if (errCmd) throw errCmd;

    // 2) Libérer la session de la table : la table redevient "libre"
    // (le prochain client qui scanne le QR aura une nouvelle session)
    const { error: errTable } = await supa.from('tables')
      .update({ session_id: null })
      .eq('id', t.id);
    if (errTable) {
      // Pas critique : on log mais on continue
      console.warn('Impossible de libérer la session de la table :', errTable);
    }

    await loadOrders();
    showToast(`✓ Table ${t.nom} libérée`);
    // Retour automatique à la liste des tables
    setTimeout(() => showScreen('tables'), 500);
  } catch (err) {
    console.error('togglePaiementTable error:', err);
    showToast('Erreur : ' + (err.message || 'paiement impossible'));
  }
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('show');
}

// Fermer en cliquant en dehors
document.addEventListener('click', e => {
  document.querySelectorAll('.modal-overlay.show').forEach(o => {
    if (e.target === o) o.classList.remove('show');
  });
});

init();
