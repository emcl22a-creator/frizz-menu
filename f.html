<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carte de fidélité</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='Source Serif 4, serif' font-style='italic' font-weight='700' fill='%23B8593A'%3E✦%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-main: #F5EFE6;
  --bg-card: #FFFFFF;
  --bg-warm: #ECE3D5;
  --text-primary: #2A1810;
  --text-secondary: #6B5544;
  --text-tertiary: #A89180;
  --accent: #B8593A;
  --accent-hover: #9C4830;
  --accent-light: rgba(184, 89, 58, 0.1);
  --border: rgba(42, 24, 16, 0.08);
  --border-strong: rgba(42, 24, 16, 0.15);
  --success: #2D8456;
}

html, body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  line-height: 1.55;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.045 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 32px 24px 60px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.bou-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.bou-eyebrow::before {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--text-tertiary);
}

/* === ÉCRAN DE LOGIN === */
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px;
  box-shadow: 0 14px 30px -16px rgba(42, 24, 16, 0.18);
}
.login-emoji {
  font-size: 56px;
  text-align: center;
  margin-bottom: 6px;
}
.login-titre {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 30px;
  text-align: center;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.login-recompense {
  text-align: center;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.input-group {
  margin-bottom: 14px;
}
.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.input-group input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}
.input-group input:focus {
  border-color: var(--accent);
  background: #fff;
}
.input-group input::placeholder { color: var(--text-tertiary); }

.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  border-radius: 100px;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
  margin-top: 8px;
  transition: background 0.2s ease, transform 0.1s ease;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: wait; }

/* === ÉCRAN DE CARTE === */
.carte-hero {
  background: linear-gradient(135deg, #FFF8EE, #ECE3D5);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 14px 30px -16px rgba(42, 24, 16, 0.18);
}
.carte-hero-emoji {
  font-size: 52px;
  margin-bottom: 6px;
}
.carte-hero-titre {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.carte-hero-bou {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 24px;
}

.carte-hero-progress {
  margin-bottom: 16px;
}
.carte-hero-progress-num {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 56px;
  color: var(--accent);
  letter-spacing: -2px;
  line-height: 1;
}
.carte-hero-progress-num span.divider {
  color: var(--text-tertiary);
  font-weight: 400;
}
.carte-hero-progress-num span.objectif {
  color: var(--text-tertiary);
  font-weight: 400;
}
.carte-hero-progress-label {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}

.tampons-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin: 22px 0 8px;
}
.tampon-cell {
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(184, 89, 58, 0.08);
  border: 2px dashed rgba(184, 89, 58, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: rgba(184, 89, 58, 0.3);
  transition: all 0.3s ease;
}
.tampon-cell.filled {
  background: var(--accent);
  border: 2px solid var(--accent);
  border-style: solid;
  color: #fff;
  font-size: 26px;
  box-shadow: 0 4px 10px -2px rgba(184, 89, 58, 0.4);
  animation: tampon-stamp 0.4s ease;
}
@keyframes tampon-stamp {
  0% { transform: scale(0.5) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.carte-recompense-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.carte-recompense-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent-light);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.carte-recompense-icon .material-icons-round { font-size: 22px; }
.carte-recompense-text {
  flex: 1;
  min-width: 0;
}
.carte-recompense-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 2px;
}
.carte-recompense-label {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 16px;
  color: var(--text-primary);
}

/* État "carte complète" */
.carte-hero.complete {
  background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
}
.carte-hero.complete .carte-hero-progress-num {
  color: var(--success);
}
.carte-complete-banner {
  background: var(--success);
  color: #fff;
  border-radius: 18px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 10px 24px -8px rgba(45, 132, 86, 0.45);
}
.carte-complete-banner .material-icons-round { font-size: 32px; }
.carte-complete-banner-text {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.2px;
}
.carte-complete-banner-sub {
  font-size: 12px;
  font-style: normal;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  margin-top: 2px;
  opacity: 0.95;
}

/* Bouton se déconnecter */
.btn-logout {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin: 0 auto;
  padding: 8px 16px;
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.btn-logout:hover { color: var(--accent); }
.btn-logout .material-icons-round { font-size: 14px; }

/* Footer Frizz */
.footer {
  text-align: center;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.footer-text {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.4px;
}
.logo-mini {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  color: var(--accent);
  font-size: 13px;
  letter-spacing: -0.3px;
}
.logo-mini-sparkle {
  margin-left: 1px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 20px;
  background: var(--text-primary);
  color: #fff;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.3);
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
  z-index: 1000;
  max-width: 90vw;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.toast.error { background: #C62828; }
.toast.success { background: var(--success); }

/* Erreur écran complet */
.error-screen {
  text-align: center;
  padding: 80px 20px;
}
.error-icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.error-title {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 24px;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.error-desc {
  font-size: 14px;
  color: var(--text-secondary);
}
</style>

</head>
<body>

<div id="app" class="app"></div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showToast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

function cleanTel(tel) {
  return (tel || '').replace(/[^0-9+]/g, '');
}

let boulangerie = null;

function renderError(title, desc) {
  $('app').innerHTML = `
    <div class="error-screen">
      <div class="error-icon">😕</div>
      <div class="error-title">${escapeHtml(title)}</div>
      <div class="error-desc">${escapeHtml(desc)}</div>
    </div>
  `;
}

function renderLogin() {
  const savedTel = localStorage.getItem('frizz-fidelite-tel-' + boulangerie.id) || '';
  const objectif = boulangerie.fidelite_objectif || 10;
  const recompense = boulangerie.fidelite_recompense || 'récompense';

  $('app').innerHTML = `
    <div class="bou-eyebrow">${escapeHtml((boulangerie.nom || 'Boulangerie').toUpperCase())}</div>

    <div class="login-card">
      <div class="login-emoji">${escapeHtml(boulangerie.fidelite_emoji || '🥖')}</div>
      <div class="login-titre">${escapeHtml(boulangerie.fidelite_titre || 'Carte de fidélité')}</div>
      <div class="login-recompense">${objectif} achats = ${escapeHtml(recompense)}</div>

      <div class="input-group">
        <label for="login-tel">Votre téléphone</label>
        <input type="tel" id="login-tel" placeholder="06 12 34 56 78" value="${escapeHtml(savedTel)}" autocomplete="tel">
      </div>
      <div class="input-group" id="nom-group" style="display: ${savedTel ? 'none' : 'block'};">
        <label for="login-nom">Votre prénom</label>
        <input type="text" id="login-nom" placeholder="Marie" autocomplete="given-name">
      </div>

      <button type="button" class="btn-primary" id="btn-login">
        <span class="material-icons-round">arrow_forward</span>
        Voir ma carte
      </button>
    </div>

    <div class="footer">
      <div class="footer-text">
        Propulsé par <span class="logo-mini">Frizz<span class="logo-mini-sparkle">✦</span></span>
      </div>
    </div>
  `;

  $('btn-login').addEventListener('click', handleLogin);
  $('login-tel').addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') handleLogin();
  });

  // Si tel pré-rempli, on peut directement se logger sans demander le nom
  $('login-tel').addEventListener('input', () => {
    const tel = $('login-tel').value;
    // Si le tel pré-rempli est modifié, on demande à nouveau le nom
    if (tel !== savedTel) {
      $('nom-group').style.display = 'block';
    }
  });
}

async function handleLogin() {
  const telRaw = $('login-tel').value.trim();
  const tel = cleanTel(telRaw);
  const nomEl = $('login-nom');
  const nom = nomEl ? nomEl.value.trim() : '';

  if (!tel || tel.length < 8) {
    showToast('Numéro de téléphone invalide', 'error');
    return;
  }

  const btn = $('btn-login');
  btn.disabled = true;

  // Cherche carte existante
  const { data: existing, error: searchError } = await supabase
    .from('cartes_fidelite')
    .select('*')
    .eq('boulangerie_id', boulangerie.id)
    .eq('telephone', tel)
    .maybeSingle();

  if (searchError) {
    console.error(searchError);
    showToast('Erreur de connexion', 'error');
    btn.disabled = false;
    return;
  }

  let carte = existing;
  if (!carte) {
    // Création
    if (!nom) {
      showToast('Indiquez votre prénom', 'error');
      btn.disabled = false;
      $('nom-group').style.display = 'block';
      if (nomEl) nomEl.focus();
      return;
    }
    const { data: created, error: createError } = await supabase
      .from('cartes_fidelite')
      .insert([{
        boulangerie_id: boulangerie.id,
        telephone: tel,
        nom_client: nom,
        tampons: 0
      }])
      .select()
      .single();

    if (createError) {
      console.error(createError);
      showToast('Erreur : ' + createError.message, 'error');
      btn.disabled = false;
      return;
    }
    carte = created;
  }

  localStorage.setItem('frizz-fidelite-tel-' + boulangerie.id, telRaw);
  localStorage.setItem('frizz-fidelite-nom-' + boulangerie.id, carte.nom_client || nom);

  renderCarte(carte);
}

function renderCarte(carte) {
  const objectif = boulangerie.fidelite_objectif || 10;
  const tampons = Math.min(carte.tampons, objectif);
  const isComplete = carte.tampons >= objectif;
  const emoji = boulangerie.fidelite_emoji || '🥖';
  const titre = boulangerie.fidelite_titre || 'Carte de fidélité';
  const recompense = boulangerie.fidelite_recompense || 'récompense';
  const bouNom = (boulangerie.nom || 'Boulangerie').toUpperCase();

  // Construit la grille de tampons
  const cells = [];
  for (let i = 0; i < objectif; i++) {
    if (i < tampons) {
      cells.push(`<div class="tampon-cell filled" style="animation-delay:${i * 30}ms;">${emoji}</div>`);
    } else {
      cells.push(`<div class="tampon-cell">${i + 1}</div>`);
    }
  }

  // Adaptation grille selon objectif
  let cols = 5;
  if (objectif <= 6) cols = 3;
  else if (objectif <= 8) cols = 4;
  else if (objectif <= 12) cols = 5;
  else cols = 6;

  const restant = Math.max(0, objectif - carte.tampons);
  const labelRestant = restant === 0
    ? '🎉 Carte pleine !'
    : restant === 1
    ? 'Encore 1 achat et c\'est offert !'
    : `Encore ${restant} achats avant la récompense`;

  $('app').innerHTML = `
    <div class="bou-eyebrow">${escapeHtml(bouNom)}</div>

    <div class="carte-hero ${isComplete ? 'complete' : ''}">
      <div class="carte-hero-emoji">${escapeHtml(emoji)}</div>
      <div class="carte-hero-titre">${escapeHtml(titre)}</div>
      <div class="carte-hero-bou">Bonjour ${escapeHtml(carte.nom_client || '')}</div>

      <div class="carte-hero-progress">
        <div class="carte-hero-progress-num">${tampons}<span class="divider">/</span><span class="objectif">${objectif}</span></div>
        <div class="carte-hero-progress-label">${escapeHtml(labelRestant)}</div>
      </div>

      <div class="tampons-grid" style="grid-template-columns: repeat(${cols}, 1fr);">
        ${cells.join('')}
      </div>
    </div>

    ${isComplete ? `
      <div class="carte-complete-banner">
        <span class="material-icons-round">redeem</span>
        <div>
          <div class="carte-complete-banner-text">${escapeHtml(recompense)}</div>
          <div class="carte-complete-banner-sub">Présentez cette carte à votre prochain passage</div>
        </div>
      </div>
    ` : `
      <div class="carte-recompense-card">
        <div class="carte-recompense-icon"><span class="material-icons-round">redeem</span></div>
        <div class="carte-recompense-text">
          <div class="carte-recompense-eyebrow">Récompense</div>
          <div class="carte-recompense-label">${escapeHtml(recompense)}</div>
        </div>
      </div>
    `}

    <button type="button" class="btn-logout" id="btn-logout">
      <span class="material-icons-round">logout</span>
      Ce n'est pas moi
    </button>

    <div class="footer">
      <div class="footer-text">
        Propulsé par <span class="logo-mini">Frizz<span class="logo-mini-sparkle">✦</span></span>
      </div>
    </div>
  `;

  $('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('frizz-fidelite-tel-' + boulangerie.id);
    localStorage.removeItem('frizz-fidelite-nom-' + boulangerie.id);
    renderLogin();
  });
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const bouId = params.get('b');

  if (!bouId) {
    renderError('QR invalide', 'Ce lien ne contient pas l\'identifiant de la boulangerie.');
    return;
  }

  const { data: bou, error } = await supabase
    .from('boulangeries')
    .select('id, nom, fidelite_active, fidelite_objectif, fidelite_recompense, fidelite_titre, fidelite_emoji')
    .eq('id', bouId)
    .maybeSingle();

  if (error) {
    console.error(error);
    renderError('Erreur', 'Impossible de charger la carte.');
    return;
  }

  if (!bou) {
    renderError('Boulangerie introuvable', 'Cette carte de fidélité n\'existe pas.');
    return;
  }

  if (!bou.fidelite_active) {
    renderError('Carte inactive', 'Cette boulangerie n\'a pas encore activé son programme de fidélité.');
    return;
  }

  boulangerie = bou;
  document.title = `${bou.fidelite_emoji || '🥖'} ${bou.fidelite_titre || 'Carte de fidélité'}`;

  // Auto-login si tel sauvegardé
  const savedTel = localStorage.getItem('frizz-fidelite-tel-' + bou.id);
  if (savedTel) {
    const tel = cleanTel(savedTel);
    const { data: carte } = await supabase
      .from('cartes_fidelite')
      .select('*')
      .eq('boulangerie_id', bou.id)
      .eq('telephone', tel)
      .maybeSingle();

    if (carte) {
      renderCarte(carte);

      // Refresh toutes les 4s pour voir les nouveaux tampons en quasi-temps réel
      // (le client peut laisser la page ouverte sur la table en attendant)
      setInterval(async () => {
        const { data: refreshed } = await supabase
          .from('cartes_fidelite')
          .select('*')
          .eq('id', carte.id)
          .maybeSingle();
        if (refreshed && (refreshed.tampons !== carte.tampons || refreshed.recompenses_utilisees !== carte.recompenses_utilisees)) {
          if (refreshed.tampons > carte.tampons) {
            showToast('🎉 +' + (refreshed.tampons - carte.tampons) + ' tampon !');
          }
          carte.tampons = refreshed.tampons;
          carte.recompenses_utilisees = refreshed.recompenses_utilisees;
          renderCarte(refreshed);
        }
      }, 4000);
      return;
    }
  }

  renderLogin();
}

init();
</script>

</body>
