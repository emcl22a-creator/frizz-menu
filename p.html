<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Procédure</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='Source Serif 4, serif' font-style='italic' font-weight='700' fill='%23B8593A'%3E✦%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-main: #F5EFE6;
  --bg-card: #FFFFFF;
  --bg-warm: #ECE3D5;
  --text-primary: #2A1810;
  --text-secondary: #6B5544;
  --text-tertiary: #A89180;
  --accent: #B8593A;
  --accent-hover: #9C4830;
  --accent-light: rgba(184, 89, 58, 0.1);
  --border: rgba(42, 24, 16, 0.08);
  --border-strong: rgba(42, 24, 16, 0.15);
}

html, body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  line-height: 1.55;
  overflow-x: hidden;
}

/* Texture papier subtile */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.045 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* ============ HERO MEDIA ============ */
.media-hero {
  width: 100%;
  position: relative;
  background: var(--bg-warm);
  overflow: hidden;
}
.media-hero img,
.media-hero video,
.media-hero iframe {
  width: 100%;
  display: block;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border: none;
}
.media-hero iframe { aspect-ratio: 16 / 9; }
.media-hero-empty {
  aspect-ratio: 4 / 3;
  background: linear-gradient(135deg, var(--bg-warm) 0%, #D9CCB7 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
}
.media-hero-empty .material-icons-round {
  font-size: 64px;
  opacity: 0.4;
}

@media (min-width: 720px) {
  .media-hero { border-radius: 0 0 32px 32px; }
}

/* ============ HEADER (titre + meta) ============ */
.header-section {
  position: relative;
  padding: 0 24px;
  margin-top: -28px;
}

.emoji-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  background: var(--bg-card);
  border-radius: 18px;
  font-size: 36px;
  box-shadow: 0 8px 24px -8px rgba(42, 24, 16, 0.25);
  margin-bottom: 18px;
  position: relative;
  z-index: 2;
}

.eyebrow-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px 6px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--text-primary);
}
.pill.accent {
  background: var(--accent-light);
  border-color: rgba(184, 89, 58, 0.2);
  color: var(--accent);
}
.pill .material-icons-round {
  font-size: 14px;
  color: var(--accent);
}
.pill.accent .material-icons-round { color: var(--accent); }

.titre {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 38px;
  line-height: 1.02;
  letter-spacing: -1.4px;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.titre em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}

/* ============ INGRÉDIENTS (page publique) ============ */
.ingredients-section {
  padding: 40px 24px 0;
}

.portions-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-top: 18px;
  margin-bottom: 22px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 6px 18px -10px rgba(42, 24, 16, 0.15);
}

.portions-selector-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.portions-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--accent-light);
  border: 1px solid rgba(184, 89, 58, 0.25);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.15s ease, transform 0.1s ease;
}
.portions-btn:hover {
  background: rgba(184, 89, 58, 0.18);
}
.portions-btn:active {
  transform: scale(0.92);
}
.portions-btn .material-icons-round { font-size: 18px; }

#portions-input {
  width: 60px;
  padding: 10px 8px;
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border-strong);
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 24px;
  color: var(--text-primary);
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
#portions-input::-webkit-outer-spin-button,
#portions-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
#portions-input:focus {
  border-color: var(--accent);
}

.portions-selector-unit {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}

.ingredients-list-public {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: opacity 0.18s ease;
}

.ingredient-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.ingredient-line:last-child {
  border-bottom: none;
}

.ingredient-line-nom {
  font-size: 15px;
  color: var(--text-primary);
  font-weight: 500;
  flex: 1;
  min-width: 0;
}

.ingredient-line-qte {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  flex-shrink: 0;
}
.ingredient-line-qte strong {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
}
.ingredient-line-unite {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

@media (max-width: 380px) {
  .portions-selector {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .portions-selector-controls {
    justify-content: center;
  }
  .portions-selector-unit {
    text-align: center;
  }
}

/* ============ ÉTAPES ============ */
.etapes-section {
  padding: 40px 24px 0;
}
.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.section-eyebrow::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--text-tertiary);
}
.section-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.8px;
  margin-bottom: 24px;
}
.section-title em { font-style: italic; font-weight: 400; color: var(--accent); }

.etape {
  display: flex;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
}
.etape:last-of-type { border-bottom: none; }

.etape-num {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 17px;
  box-shadow: 0 4px 14px -4px rgba(184, 89, 58, 0.5);
}

.etape-content {
  flex: 1;
  min-width: 0;
  padding-top: 4px;
}
.etape-titre {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 19px;
  line-height: 1.25;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.etape-desc {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-secondary);
  white-space: pre-line;
}

.etape-media-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 14px;
}
.etape-media-grid.single {
  grid-template-columns: 1fr;
}
.etape-media-cell {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.04);
  border: 1px solid rgba(42, 24, 16, 0.08);
  aspect-ratio: 4 / 3;
}
.etape-media-cell img,
.etape-media-cell video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.etape-media-grid.single .etape-media-cell {
  aspect-ratio: 16 / 10;
}
@media (max-width: 480px) {
  .etape-media-grid {
    grid-template-columns: 1fr;
  }
  .etape-media-cell {
    aspect-ratio: 16 / 10;
  }
}

.empty-etapes {
  padding: 30px 0;
  text-align: center;
  color: var(--text-tertiary);
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-size: 16px;
}

/* ============ FOOTER ============ */
.footer {
  margin-top: 60px;
  padding: 30px 24px 20px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.footer-text {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.3px;
}
.logo-mini {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  color: var(--text-secondary);
}
.logo-mini-sparkle { color: var(--accent); }

/* ============ STATES ============ */
.state-screen {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 40px 24px;
  text-align: center;
}
.state-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  background: rgba(184, 89, 58, 0.15);
  color: var(--accent);
}
.state-icon .material-icons-round { font-size: 44px; }
.state-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.state-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 28px;
  margin-bottom: 12px;
  letter-spacing: -1px;
  color: var(--text-primary);
}
.state-desc {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 360px;
  line-height: 1.6;
}
.spinner {
  width: 38px;
  height: 38px;
  border: 3px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-bottom: 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Material icons fallback */
.material-icons-round {
  font-family: 'Material Icons Round';
  font-weight: normal;
  font-style: normal;
  display: inline-block;
  line-height: 1;
  text-transform: none;
  letter-spacing: normal;
  word-wrap: normal;
  white-space: nowrap;
  direction: ltr;
  -webkit-font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
}
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

<div id="app">
  <div class="state-screen">
    <div class="spinner"></div>
    <div class="state-desc">Chargement…</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

const CAT_LABELS = {
  production: 'Production',
  vente: 'Vente',
  hygiene: 'Hygiène',
  caisse: 'Caisse',
  securite: 'Sécurité',
  maintenance: 'Maintenance'
};

function fmtQuantite(q) {
  // Affiche un nombre joli : 1000 → 1000, 1.5 → 1,5, 0.333 → 0,33
  if (q === 0) return '0';
  if (Number.isInteger(q)) return String(q);
  const rounded = Math.round(q * 100) / 100;
  return rounded.toString().replace('.', ',');
}

let currentIngredients = [];
let basePortions = 1;
let currentPortions = 1;

function renderIngredientsSection(p) {
  const ingredients = Array.isArray(p.ingredients) ? p.ingredients : [];
  if (ingredients.length === 0) return '';

  basePortions = Math.max(1, parseInt(p.portions_base, 10) || 1);
  currentPortions = basePortions;
  currentIngredients = ingredients;
  const label = p.portions_label || 'pièces';

  return `
    <div class="ingredients-section">
      <div class="section-eyebrow">Ingrédients</div>
      <h2 class="section-title">Pour <em>${basePortions}</em> ${escapeHtml(label)}.</h2>

      <div class="portions-selector">
        <div class="portions-selector-controls">
          <button type="button" class="portions-btn" id="btn-portions-minus" aria-label="Moins">
            <span class="material-icons-round">remove</span>
          </button>
          <input type="number" id="portions-input" value="${basePortions}" min="1" step="1">
          <button type="button" class="portions-btn" id="btn-portions-plus" aria-label="Plus">
            <span class="material-icons-round">add</span>
          </button>
        </div>
        <span class="portions-selector-unit">${escapeHtml(label)}</span>
      </div>

      <div class="ingredients-list-public" id="ingredients-list-public">
        ${renderIngredientsRows(ingredients, basePortions, basePortions)}
      </div>
    </div>
  `;
}

function renderIngredientsRows(ingredients, basePortions, currentPortions) {
  const ratio = currentPortions / basePortions;
  return ingredients.map(ing => {
    const q = (ing.quantite || 0) * ratio;
    return `
      <div class="ingredient-line">
        <span class="ingredient-line-nom">${escapeHtml(ing.nom)}</span>
        <span class="ingredient-line-qte">
          <strong>${fmtQuantite(q)}</strong>
          <span class="ingredient-line-unite">${escapeHtml(ing.unite || '')}</span>
        </span>
      </div>
    `;
  }).join('');
}

function attachPortionsHandlers() {
  const input = document.getElementById('portions-input');
  if (!input) return;

  const updateList = (newVal) => {
    const v = Math.max(1, parseInt(newVal, 10) || 1);
    currentPortions = v;
    if (input.value !== String(v)) input.value = v;
    const list = document.getElementById('ingredients-list-public');
    if (list) {
      list.innerHTML = renderIngredientsRows(currentIngredients, basePortions, currentPortions);
    }
  };

  document.getElementById('btn-portions-minus').addEventListener('click', () => {
    updateList(currentPortions - 1);
  });
  document.getElementById('btn-portions-plus').addEventListener('click', () => {
    updateList(currentPortions + 1);
  });
  input.addEventListener('input', (ev) => updateList(ev.target.value));
}

function fmtDuree(m) {
  if (!m || m <= 0) return null;
  const h = Math.floor(m / 60);
  const min = m % 60;
  if (h > 0 && min > 0) return `${h}h ${min}min`;
  if (h > 0) return `${h}h`;
  return `${min}min`;
}

function mediaEmbedHtml(url) {
  if (!url) return `
    <div class="media-hero-empty">
      <span class="material-icons-round">restaurant_menu</span>
    </div>
  `;
  if (/\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url)) {
    return `<img src="${escapeHtml(url)}" alt="Photo de la procédure">`;
  }
  if (/\.(mp4|webm|mov|m4v)(\?|$)/i.test(url)) {
    return `<video src="${escapeHtml(url)}" controls playsinline preload="metadata"></video>`;
  }
  // YouTube / Vimeo legacy
  try {
    const u = new URL(url);
    let ytId = null;
    if (u.hostname.includes('youtube.com')) ytId = u.searchParams.get('v');
    else if (u.hostname === 'youtu.be') ytId = u.pathname.slice(1);
    if (ytId) return `<iframe src="https://www.youtube.com/embed/${escapeHtml(ytId)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    if (u.hostname.includes('vimeo.com')) {
      const vId = u.pathname.split('/').filter(Boolean)[0];
      if (vId && /^\d+$/.test(vId)) return `<iframe src="https://player.vimeo.com/video/${escapeHtml(vId)}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
    }
  } catch (e) { /* ignore */ }
  return `<div class="media-hero-empty"><span class="material-icons-round">restaurant_menu</span></div>`;
}

function renderError(title, desc) {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon"><span class="material-icons-round">error_outline</span></div>
      <div class="state-eyebrow">— Oups</div>
      <h1 class="state-title">${title}</h1>
      <p class="state-desc">${desc}</p>
    </div>
  `;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('s');

  if (!slug) {
    renderError('Lien invalide', 'Aucune procédure spécifiée.');
    return;
  }

  const { data: p, error } = await supabase
    .from('procedures')
    .select('titre, emoji, categorie, duree_minutes, etapes, video_url, ingredients, portions_base, portions_label')
    .eq('slug', slug)
    .maybeSingle();

  if (error) {
    console.error(error);
    renderError('Erreur', 'Impossible de charger la procédure.');
    return;
  }

  if (!p) {
    renderError('Procédure introuvable', 'Cette procédure n\'existe pas ou n\'est plus disponible.');
    return;
  }

  document.title = `${p.emoji || ''} ${p.titre}`.trim();

  const mediaHtml = mediaEmbedHtml(p.video_url);
  const etapes = Array.isArray(p.etapes) ? p.etapes : [];
  const dureeStr = fmtDuree(p.duree_minutes);
  const catLabel = CAT_LABELS[p.categorie] || null;

  const pills = [];
  if (catLabel) pills.push(`
    <span class="pill accent">
      <span class="material-icons-round">label</span>
      ${escapeHtml(catLabel)}
    </span>
  `);
  if (dureeStr) pills.push(`
    <span class="pill">
      <span class="material-icons-round">schedule</span>
      ${escapeHtml(dureeStr)}
    </span>
  `);

  function renderStepMedia(media) {
    if (!Array.isArray(media) || media.length === 0) return '';
    const cells = media.map(m => {
      if (m.type === 'video') {
        return `<div class="etape-media-cell">
          <video src="${escapeHtml(m.url)}" controls playsinline preload="metadata"></video>
        </div>`;
      }
      return `<div class="etape-media-cell">
        <img src="${escapeHtml(m.url)}" alt="" loading="lazy">
      </div>`;
    }).join('');
    return `<div class="etape-media-grid ${media.length === 1 ? 'single' : ''}">${cells}</div>`;
  }

  const etapesHtml = etapes.length === 0
    ? `<div class="empty-etapes">Aucune étape renseignée.</div>`
    : etapes.map((e, i) => {
        // Migration ascendante : ancien format media_url/media_type → tableau
        let mediaArr = Array.isArray(e.media) ? e.media : [];
        if (mediaArr.length === 0 && e.media_url) {
          mediaArr = [{ url: e.media_url, type: e.media_type || 'image' }];
        }
        return `
        <div class="etape">
          <div class="etape-num">${i + 1}</div>
          <div class="etape-content">
            <div class="etape-titre">${escapeHtml(e.titre || `Étape ${i + 1}`)}</div>
            ${e.description ? `<div class="etape-desc">${escapeHtml(e.description)}</div>` : ''}
            ${renderStepMedia(mediaArr)}
          </div>
        </div>
      `;
      }).join('');

  document.getElementById('app').innerHTML = `
    <div class="wrapper">
      <div class="media-hero">
        ${mediaHtml}
      </div>

      <div class="header-section">
        <div class="emoji-badge">${escapeHtml(p.emoji || '📋')}</div>
        ${pills.length ? `<div class="eyebrow-pills">${pills.join('')}</div>` : ''}
        <h1 class="titre">${escapeHtml(p.titre)}</h1>
      </div>

      ${renderIngredientsSection(p)}

      <div class="etapes-section">
        <div class="section-eyebrow">Procédure</div>
        <h2 class="section-title">Les <em>étapes</em>.</h2>
        ${etapesHtml}
      </div>

      <div class="footer">
        <div class="footer-text">
          Propulsé par <span class="logo-mini">Frizz<span class="logo-mini-sparkle">✦</span></span>
        </div>
      </div>
    </div>
  `;

  attachPortionsHandlers();
}

init();
</script>

</body>
</html>
