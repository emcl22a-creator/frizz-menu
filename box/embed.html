<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #0A0A0A; --gray-700: #4B5563; --gray-500: #6B7280;
    --gray-300: #D1D5DB; --gray-200: #E5E7EB; --gray-100: #F3F4F6;
    --gray-50: #FAFAFA; --white: #FFFFFF;
    --orange: #EA580C; --orange-soft: #F97316;
    --orange-light: #FED7AA; --orange-bg: #FFF7ED;
    --green: #10B981; --green-bg: #DCFCE7;
    --red: #EF4444; --red-bg: #FEE2E2;
  }
  body {
    font-family: 'Inter Tight', sans-serif;
    color: var(--black); background: transparent;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
    padding: 16px;
  }
  .serif { font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 400; }

  .frizz-embed {
    max-width: 100%;
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--gray-100);
    box-shadow: 0 8px 24px rgba(0,0,0,0.06), 0 4px 12px rgba(234,88,12,0.04);
    overflow: hidden; position: relative;
  }
  .embed-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--gray-100);
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, #FFF7ED 0%, #FFFFFF 100%);
  }
  .embed-title {
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
    color: var(--black);
  }
  .embed-title .star {
    color: var(--orange); font-size: 14px;
    animation: starSpin 8s linear infinite;
    display: inline-block;
  }
  @keyframes starSpin {
    0%, 90%, 100% { transform: rotate(0deg); }
    95% { transform: rotate(360deg); }
  }
  .lang-switcher {
    display: flex; gap: 4px; background: var(--gray-100); padding: 3px;
    border-radius: 8px;
  }
  .lang-btn {
    padding: 4px 8px; border: none; cursor: pointer;
    background: transparent; color: var(--gray-500);
    font-size: 11px; font-weight: 600; border-radius: 6px;
    font-family: inherit; transition: all 0.2s;
    text-transform: uppercase;
  }
  .lang-btn:hover { color: var(--orange); }
  .lang-btn.active {
    background: var(--white); color: var(--orange);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .embed-body { padding: 18px; }

  .progress {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 18px;
  }
  .step-indicator {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    background: var(--gray-100); color: var(--gray-500);
    transition: all 0.3s; flex-shrink: 0;
  }
  .step-indicator.active { background: var(--orange); color: var(--white); transform: scale(1.1); }
  .step-indicator.done { background: var(--green-bg); color: var(--green); }
  .step-indicator.done::before { content: '✓'; font-size: 12px; }
  .step-indicator.done .num { display: none; }
  .step-line {
    flex: 1; height: 2px; background: var(--gray-200); border-radius: 1px;
    overflow: hidden; position: relative;
  }
  .step-line::after {
    content: ''; position: absolute; top: 0; left: 0;
    width: 0; height: 100%; background: var(--orange); transition: width 0.6s;
  }
  .step-line.filled::after { width: 100%; }

  .view { display: none; animation: fadeIn 0.3s; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  h2 {
    font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
    line-height: 1.2; margin-bottom: 4px;
  }
  h2 .serif { color: var(--orange); }
  .subtitle { color: var(--gray-700); font-size: 12px; margin-bottom: 14px; }

  .ai-suggest {
    background: var(--orange-bg); padding: 9px 12px; border-radius: 8px;
    border-left: 2px solid var(--orange); margin-bottom: 14px;
    font-size: 12px; color: var(--gray-700);
    display: flex; align-items: flex-start; gap: 6px;
  }
  .ai-suggest strong { color: var(--black); }
  .ai-suggest em {
    font-family: 'Source Serif 4', serif; font-style: italic;
    color: var(--orange); font-weight: 600;
  }
  .ai-icon { color: var(--orange); font-weight: 700; flex-shrink: 0; }

  .question-label, .types-label {
    font-size: 10px; color: var(--gray-500); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .quick-q { margin-bottom: 14px; }
  .qopts { display: flex; gap: 5px; flex-wrap: wrap; }
  .qopt {
    padding: 5px 10px; border: 1px solid var(--gray-200); border-radius: 100px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    background: var(--white); color: var(--gray-700);
    transition: all 0.2s; font-family: inherit;
  }
  .qopt:hover { border-color: var(--orange); color: var(--orange); }
  .qopt.selected { background: var(--orange); color: var(--white); border-color: var(--orange); }

  .types-grid { display: grid; gap: 8px; margin-bottom: 16px; }
  .type-card {
    padding: 12px; border: 1.5px solid var(--gray-100); border-radius: 10px;
    cursor: pointer; transition: all 0.25s; background: var(--white);
    display: flex; justify-content: space-between; align-items: center;
    position: relative;
  }
  .type-card:hover { border-color: var(--gray-300); transform: translateX(2px); }
  .type-card.selected { border-color: var(--orange); background: var(--orange-bg); }
  .type-card.recommended::before {
    content: '✦'; position: absolute;
    top: -6px; right: 10px;
    background: var(--orange); color: var(--white);
    padding: 2px 6px; border-radius: 10px;
    font-size: 9px; font-weight: 700;
  }
  .type-info { flex: 1; }
  .type-name { font-weight: 700; font-size: 13px; margin-bottom: 1px; }
  .type-desc {
    font-size: 11px; color: var(--gray-500);
    font-family: 'Source Serif 4', serif; font-style: italic;
  }
  .type-price {
    text-align: right; font-weight: 700; font-size: 14px; color: var(--orange);
    flex-shrink: 0; margin-left: 10px;
  }
  .type-price small { font-size: 9px; color: var(--gray-500); font-weight: 500; display: block; }
  .type-price .original {
    text-decoration: line-through; color: var(--gray-500); font-size: 10px;
    font-weight: 500; display: inline-block; margin-right: 4px;
  }
  .type-price .ai-tag {
    background: var(--orange); color: var(--white); padding: 1px 5px;
    border-radius: 4px; font-size: 8px; font-weight: 700;
    display: inline-block; margin-top: 2px; letter-spacing: 0.05em;
  }

  .form-grid { display: grid; gap: 8px; margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-field { display: flex; flex-direction: column; }
  .form-label {
    font-size: 10px; font-weight: 600; color: var(--gray-700); margin-bottom: 3px;
  }
  .form-label .required { color: var(--orange); }
  .form-field input {
    padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: 8px;
    font-size: 12px; font-family: inherit; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-field input:focus {
    border-color: var(--orange); box-shadow: 0 0 0 2px rgba(234,88,12,0.1);
  }

  .upload-section {
    border: 2px dashed var(--gray-200);
    border-radius: 10px; padding: 14px; margin-bottom: 10px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; background: var(--gray-50);
    display: block;
  }
  .upload-section:hover { border-color: var(--orange); background: var(--orange-bg); }
  .upload-section.has-file {
    border-color: var(--green); background: var(--green-bg); border-style: solid;
  }
  .upload-icon { font-size: 22px; margin-bottom: 4px; }
  .upload-section.has-file .upload-icon { color: var(--green); }
  .upload-label { font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 2px; }
  .upload-hint { font-size: 10px; color: var(--gray-500); }
  .upload-section input[type="file"] { display: none; }
  .upload-progress {
    height: 3px; background: var(--gray-200); border-radius: 2px;
    overflow: hidden; margin-top: 8px; display: none;
  }
  .upload-progress.active { display: block; }
  .upload-progress-bar {
    height: 100%; background: var(--orange); width: 0;
    transition: width 0.3s;
  }
  .upload-filename {
    font-size: 11px; color: var(--green); font-weight: 600;
    margin-top: 4px; word-break: break-all;
  }

  .signature-container {
    border: 2px solid var(--gray-200);
    border-radius: 10px; padding: 8px; margin-bottom: 10px;
    background: var(--white);
  }
  .signature-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; font-size: 11px;
  }
  .signature-header .label { color: var(--gray-700); font-weight: 600; }
  .signature-header .clear-btn {
    background: none; border: none; color: var(--orange);
    cursor: pointer; font-size: 11px; font-weight: 600;
    font-family: inherit; padding: 2px 6px;
  }
  .signature-header .clear-btn:hover { text-decoration: underline; }
  #signaturePad {
    width: 100%; height: 120px;
    border: 1px dashed var(--gray-300); border-radius: 6px;
    background: var(--gray-50); cursor: crosshair;
    display: block; touch-action: none;
  }
  .signature-hint {
    font-size: 10px; color: var(--gray-500); text-align: center;
    margin-top: 4px;
  }

  .cgv-block {
    background: var(--gray-50); padding: 12px;
    border-radius: 10px; margin-bottom: 12px;
  }
  .cgv-checkbox {
    display: flex; align-items: flex-start; gap: 8px;
  }
  .cgv-checkbox input[type="checkbox"] {
    width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;
    accent-color: var(--orange); cursor: pointer;
  }
  .cgv-checkbox label {
    font-size: 11px; color: var(--gray-700); line-height: 1.4;
    cursor: pointer;
  }
  .cgv-checkbox label a {
    color: var(--orange); text-decoration: underline;
    font-weight: 600;
  }

  .summary {
    background: var(--gray-50); padding: 11px 13px; border-radius: 10px;
    margin-bottom: 12px;
  }
  .sum-row {
    display: flex; justify-content: space-between; font-size: 12px;
    padding: 2px 0; color: var(--gray-700);
  }
  .sum-row.total {
    border-top: 1px solid var(--gray-200); margin-top: 6px; padding-top: 7px;
    font-weight: 700; color: var(--black); font-size: 13px;
  }
  .sum-row.total .price {
    color: var(--orange); font-size: 16px; font-weight: 800;
  }

  .btn-primary {
    width: 100%; background: var(--orange); color: var(--white);
    padding: 12px; border-radius: 10px;
    font-weight: 700; font-size: 13px; border: none; cursor: pointer;
    font-family: inherit; transition: all 0.25s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px); box-shadow: 0 8px 20px rgba(234,88,12,0.3);
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-back {
    background: none; border: none; color: var(--gray-700);
    font-size: 12px; cursor: pointer; padding: 4px 0; margin-bottom: 8px;
    font-family: inherit; display: flex; align-items: center; gap: 3px;
  }
  .btn-back:hover { color: var(--orange); }

  .loading {
    text-align: center; padding: 40px 20px; color: var(--gray-500); font-size: 13px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--gray-100); border-top-color: var(--orange);
    border-radius: 50%; margin: 0 auto 10px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: var(--red-bg); color: var(--red); padding: 9px 12px;
    border-radius: 8px; font-size: 12px; margin-bottom: 10px;
    border-left: 2px solid var(--red);
  }

  .success-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--green-bg); border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; font-size: 28px; color: var(--green); font-weight: 800;
  }
  .pin-pending {
    background: var(--orange-bg); border: 1px solid var(--orange-light);
    padding: 16px 14px; border-radius: 10px; text-align: center;
    margin-bottom: 12px;
  }
  .pin-pending-icon {
    font-size: 26px; margin-bottom: 6px;
  }
  .pin-pending-title {
    font-size: 11px; color: var(--orange); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .pin-pending-msg {
    font-size: 12px; color: var(--gray-700); line-height: 1.5;
  }

  .download-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gray-50); border: 1px solid var(--gray-200);
    color: var(--gray-700); padding: 10px 16px; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    margin-bottom: 8px;
  }
  .download-btn:hover { border-color: var(--orange); color: var(--orange); }

  .powered {
    text-align: center; padding-top: 10px; font-size: 9px;
    color: var(--gray-500); border-top: 1px solid var(--gray-100); margin-top: 14px;
  }
  .powered .serif { color: var(--gray-700); font-weight: 600; }
  .powered a { color: var(--orange); text-decoration: none; }
</style>
</head>

  function calculateDynamicPrice(type, center) {
    if (!center.ai_pricing_enabled) return parseFloat(type.price_monthly);
    const rules = center.ai_pricing_rules || {};
    const basePrice = parseFloat(type.price_monthly);
    let multiplier = 1.0;
    const availability = type.total_count > 0 ? type.available_count / type.total_count : 1;
    if (availability < (rules.low_stock_threshold || 0.3)) multiplier *= (rules.low_stock_multiplier || 1.20);
    else if (availability > (rules.high_stock_threshold || 0.7)) multiplier *= (rules.high_stock_multiplier || 0.92);
    const month = new Date().getMonth() + 1;
    if ((rules.high_season_months || [6,7,8,9]).includes(month)) multiplier *= (rules.high_season_multiplier || 1.10);
    else if ((rules.low_season_months || [1,2,11]).includes(month)) multiplier *= (rules.low_season_multiplier || 0.95);
    const maxIncrease = 1 + (rules.max_increase_pct || 25) / 100;
    const maxDecrease = 1 - (rules.max_decrease_pct || 15) / 100;
    multiplier = Math.max(maxDecrease, Math.min(maxIncrease, multiplier));
    return Math.round(basePrice * multiplier * 100) / 100;
  }

      state.center = centers[0];

  function setupUpload(inputId, urlField, filenameField, progressId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        alert('Fichier trop gros (max 10 MB)');
        return;
      }
      const progress = document.getElementById(progressId);
      const progressBar = progress.querySelector('.upload-progress-bar');
      progress.classList.add('active');
      progressBar.style.width = '20%';
      try {
        const ext = file.name.split('.').pop();
        const filename = 'res-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8) + '.' + ext;
        progressBar.style.width = '40%';
        const uploadRes = await fetch(SUPABASE_URL + '/storage/v1/object/reservation-documents/' + filename, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': file.type
          },
          body: file
        });
        progressBar.style.width = '90%';
        if (!uploadRes.ok) {
          const errText = await uploadRes.text();
          throw new Error('Upload failed: ' + errText);
        }
        const publicUrl = SUPABASE_URL + '/storage/v1/object/reservation-documents/' + filename;
        state[urlField] = publicUrl;
        state[filenameField] = file.name;
        progressBar.style.width = '100%';
        setTimeout(() => {
          progress.classList.remove('active');
          progressBar.style.width = '0%';
          renderStep(3);
        }, 400);
      } catch (err) {
        console.error('Upload error:', err);
        alert('Erreur upload : ' + err.message);
        progress.classList.remove('active');
        progressBar.style.width = '0%';
      }
    });
  }

  function setupSignaturePad() {
    const canvas = document.getElementById('signaturePad');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#0A0A0A';
    if (state.signatureDataUrl) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = state.signatureDataUrl;
    }
    let drawing = false, lastX = 0, lastY = 0;
    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x, y };
    }
    function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; }
    function move(e) {
      if (!drawing) return; e.preventDefault();
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
      lastX = p.x; lastY = p.y;
    }
    function end() {
      drawing = false;
      state.signatureDataUrl = canvas.toDataURL('image/png');
      validateStep3();
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', end);
    document.getElementById('clearSignature').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      state.signatureDataUrl = null;
      validateStep3();
    });
  }

  async function submitReservation() {
    const button = document.getElementById('btnSubmit');
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    button.disabled = true;
    button.textContent = t('processing');
    try {
      const data = state.formData;
      const clientRes = await fetch(SUPABASE_URL + '/rest/v1/frizz_box_clients', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json', 'Prefer': 'return=representation'
        },
        body: JSON.stringify({
          email: data.email, phone: data.phone,
          first_name: data.firstName, last_name: data.lastName,
          address: data.address, city: data.city,
          postal_code: data.postalCode, country: state.center.country,
          date_of_birth: data.dateOfBirth, id_document_number: data.idDocument
        })
      });
      const clientArr = await clientRes.json();
      const client = Array.isArray(clientArr) ? clientArr[0] : clientArr;
      if (!client || !client.id) throw new Error('Client error');
      const t_obj = state.selectedBoxType;
      const monthly = t_obj._dynamicPrice || parseFloat(t_obj.price_monthly);
      const deposit = parseFloat(t_obj.deposit) || 0;
      const total = monthly + deposit;
      const year = new Date().getFullYear();
      const resNumber = 'FB-' + year + '-' + String(Date.now()).slice(-5);
      // Le PIN n'est PAS généré ici. Il sera créé par le webhook Stripe après paiement confirmé.
      const now = new Date().toISOString();
      const resRes = await fetch(SUPABASE_URL + '/rest/v1/frizz_box_reservations', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json', 'Prefer': 'return=representation'
        },
        body: JSON.stringify({
          reservation_number: resNumber, center_id: state.center.id,
          box_type_id: t_obj.id, client_id: client.id,
          start_date: data.startDate, monthly_price: monthly,
          deposit: deposit, setup_fee: 0, total_paid_today: total,
          status: 'pending_payment', user_agent: navigator.userAgent,
          id_document_url: state.idDocumentUrl,
          proof_of_residence_url: state.proofOfResidenceUrl,
          signature_data_url: state.signatureDataUrl,
          cgv_accepted: true, cgv_accepted_at: now,
          contract_signed_at: now
        })
      });
      if (!resRes.ok) throw new Error('Reservation error');
      state._lastResNumber = resNumber;
      state._lastClient = client;
      state._lastTotal = total;
      state._lastMonthly = monthly;
      state._lastDeposit = deposit;
      state._lastStartDate = data.startDate;
      renderStep(4);
    } catch (err) {
      console.error(err);
      errorBox.textContent = t('error');
      errorBox.style.display = 'block';
      button.disabled = false;
      validateStep3();
      button.textContent = t('pay', { amount: ((state.selectedBoxType._dynamicPrice || parseFloat(state.selectedBoxType.price_monthly)) + (parseFloat(state.selectedBoxType.deposit) || 0)).toFixed(2) + ' €' });
    }
  }

  // ========= STEP 4 =========
  function renderStep4(container) {
    container.innerHTML = `
      <div class="success-icon">✓</div>
      <h2 style="text-align:center;">${t('title_step4')}</h2>
      <p class="subtitle" style="text-align:center; margin-bottom:14px;">${t('sub_step4')} <strong>#${state._lastResNumber}</strong></p>
      <div class="pin-pending">
        <div class="pin-pending-icon">📧</div>
        <div class="pin-pending-title">${t('pin_pending_title')}</div>
        <div class="pin-pending-msg">${t('pin_pending_msg')}</div>
      </div>
      <div style="text-align:center; margin-bottom:12px;">
        <button class="download-btn" id="btnDownloadContract">${t('download_contract')}</button>
      </div>
      <button class="btn-primary" id="btnRestart">${t('reserve_again')}</button>
    `;
    document.getElementById('btnDownloadContract').addEventListener('click', generateContractPDF);
    document.getElementById('btnRestart').addEventListener('click', () => {
      state.selectedBoxType = null; state.selectedNeed = null;
      state._lastResNumber = null;
      state.formData = {};
      state.idDocumentUrl = null; state.idDocumentFilename = null;
      state.proofOfResidenceUrl = null; state.proofOfResidenceFilename = null;
      state.signatureDataUrl = null; state.cgvAccepted = false;
      renderStep(1);
    });
  }

  // ========= CONTRAT PDF =========
  function generateContractPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const center = state.center;
    const client = state._lastClient || {};
    const box = state.selectedBoxType;
    const boxName = getTranslation(box, 'name');
    const monthly = state._lastMonthly;
    const deposit = state._lastDeposit;
    const total = state._lastTotal;
    const startDate = state._lastStartDate;
    let y = 20; const lh = 6;

    doc.setFontSize(18); doc.setFont('helvetica', 'bold');
    doc.text('FRIZZ', 105, y, { align: 'center' });
    y += 8;
    doc.setFontSize(13);
    doc.text(t('contract_title'), 105, y, { align: 'center' });
    y += 12;

    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('Contrat n° : ' + state._lastResNumber, 20, y);
    doc.text('Date : ' + new Date().toLocaleDateString('fr-FR'), 150, y);
    y += 10;

    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('1. PARTIES', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('LA SOCIETE :', 20, y); y += lh;
    doc.text(center.name || '', 25, y); y += lh;
    if (center.address) { doc.text((center.address || '') + ', ' + (center.postal_code || '') + ' ' + (center.city || ''), 25, y); y += lh; }
    if (center.email) { doc.text('Email : ' + center.email, 25, y); y += lh; }
    y += 3;
    doc.text('LE CLIENT :', 20, y); y += lh;
    doc.text((client.first_name || '') + ' ' + (client.last_name || ''), 25, y); y += lh;
    if (client.address) { doc.text((client.address || '') + ', ' + (client.postal_code || '') + ' ' + (client.city || ''), 25, y); y += lh; }
    if (client.email) { doc.text('Email : ' + client.email, 25, y); y += lh; }
    if (client.phone) { doc.text('Tél : ' + client.phone, 25, y); y += lh; }
    if (client.id_document_number) { doc.text("Pièce d'identité n° : " + client.id_document_number, 25, y); y += lh; }
    y += 5;

    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('2. OBJET DU CONTRAT', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    const objet = doc.splitTextToSize(
      'La SOCIETE met à disposition du CLIENT, qui accepte, un espace de stockage (ci-après "le box") aux conditions définies dans le présent contrat. Ce contrat ne peut être assimilé à un contrat de dépôt au sens des articles 1921 et suivants du Code civil.',
      170
    );
    doc.text(objet, 20, y); y += objet.length * lh + 3;

    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('3. DESCRIPTION DU BOX', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('Type : ' + boxName, 25, y); y += lh;
    doc.text('Surface : ' + box.surface_m2 + ' m²', 25, y); y += lh;
    doc.text("Date d'entrée : " + new Date(startDate).toLocaleDateString('fr-FR'), 25, y); y += lh;
    doc.text("Code d'accès personnel : communiqué par email après paiement", 25, y); y += lh;
    y += 5;

    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('4. CONDITIONS FINANCIERES', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('Loyer mensuel : ' + monthly.toFixed(2) + ' €', 25, y); y += lh;
    doc.text('Caution (remboursable) : ' + deposit.toFixed(2) + ' €', 25, y); y += lh;
    doc.text('Total payé à la signature : ' + total.toFixed(2) + ' €', 25, y); y += lh;
    doc.text('Modalité de paiement : Carte bancaire en ligne', 25, y); y += lh;
    y += 5;

    if (y > 220) { doc.addPage(); y = 20; }

    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('5. ENGAGEMENTS DU CLIENT', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    const eng = doc.splitTextToSize(
      "Le CLIENT s'engage à : (a) utiliser le box exclusivement pour le stockage, (b) ne pas y entreposer de biens interdits (armes, drogues, périssables, animaux, produits dangereux), (c) souscrire une assurance responsabilité civile locative et une assurance des biens, (d) respecter le règlement intérieur du centre, (e) ne pas communiquer son code d'accès à des tiers.",
      170
    );
    doc.text(eng, 20, y); y += eng.length * lh + 3;

    if (y > 220) { doc.addPage(); y = 20; }
    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('6. DUREE & RESILIATION', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    const duree = doc.splitTextToSize(
      'Le contrat est conclu pour une durée minimale de 1 mois, renouvelable par tacite reconduction. Préavis de résiliation : 30 jours par email ou courrier recommandé.',
      170
    );
    doc.text(duree, 20, y); y += duree.length * lh + 3;

    if (y > 220) { doc.addPage(); y = 20; }
    y += 10;
    doc.setFontSize(12); doc.setFont('helvetica', 'bold');
    doc.text('SIGNATURES', 20, y); y += 8;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('Le CLIENT, lu et approuvé :', 20, y);
    doc.text('La SOCIETE :', 130, y);
    y += 5;

    if (state.signatureDataUrl) {
      try { doc.addImage(state.signatureDataUrl, 'PNG', 20, y, 60, 25); }
      catch (e) { console.error('Sig error:', e); }
    }
    y += 30;
    doc.text((client.first_name || '') + ' ' + (client.last_name || ''), 20, y);
    doc.text(center.name || '', 130, y);
    y += 5;
    doc.setFontSize(8);
    doc.text('Date : ' + new Date().toLocaleDateString('fr-FR'), 20, y);

    const pageHeight = doc.internal.pageSize.height;
    doc.setFontSize(8); doc.setTextColor(128);
    doc.text('Propulsé par Frizz · Self-storage SaaS', 105, pageHeight - 10, { align: 'center' });

    doc.save('contrat-' + state._lastResNumber + '.pdf');
  }

  loadCenter();
</script>
</body>
