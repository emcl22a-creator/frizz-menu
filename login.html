<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light">
<title>Se connecter · Frizz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F2F2F7;
    --bg-secondary: #FFFFFF;
    --label: #000000;
    --label-secondary: rgba(60, 60, 67, 0.60);
    --label-tertiary: rgba(60, 60, 67, 0.30);
    --separator: rgba(60, 60, 67, 0.18);
    --blue: #007AFF;
    --red: #FF3B30;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.4;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(80% 60% at 50% -10%, rgba(0, 122, 255, 0.08) 0%, transparent 55%);
  }
  button, input { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { cursor: text; }

  .nav {
    display: flex;
    align-items: center;
    padding: 16px 16px 8px;
    max-width: 460px;
    margin: 0 auto;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    font-size: 17px;
    padding: 4px 8px 4px 0;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .back-btn:active { opacity: 0.5; }
  .back-btn svg { width: 18px; height: 18px; }

  .container {
    max-width: 460px;
    margin: 0 auto;
    padding: 12px 22px max(32px, env(safe-area-inset-bottom));
  }

  .marketing-col { display: none; }

  .header { padding: 20px 0 32px; text-align: center; }
  .logo {
    width: 56px; height: 56px;
    margin-bottom: 24px;
    filter: drop-shadow(0 4px 12px rgba(0, 122, 255, 0.30));
  }
  .title {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.030em;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: var(--label-secondary);
    letter-spacing: -0.012em;
  }

  /* DESKTOP LAYOUT */
  @media (min-width: 900px) {
    body::before {
      background:
        radial-gradient(60% 50% at 25% 20%, rgba(0, 122, 255, 0.10) 0%, transparent 55%),
        radial-gradient(50% 40% at 90% 10%, rgba(175, 82, 222, 0.06) 0%, transparent 60%);
    }
    .nav {
      max-width: 1200px;
      padding: 22px 60px 0;
    }
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 80px;
      padding: 20px 60px 60px;
      align-items: center;
      min-height: calc(100vh - 80px);
    }
    .marketing-col { display: block; }
    .marketing-logo {
      width: 96px; height: 96px;
      margin-bottom: 32px;
      filter: drop-shadow(0 8px 24px rgba(0, 122, 255, 0.40));
    }
    .marketing-title {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 22px;
      max-width: 14ch;
    }
    .marketing-sub {
      font-size: 18px;
      color: var(--label-secondary);
      line-height: 1.5;
      max-width: 38ch;
      letter-spacing: -0.012em;
    }

    .container {
      max-width: 100%;
      padding: 0;
      margin: 0;
    }
    .form-card {
      background: var(--bg-secondary);
      border-radius: 22px;
      padding: 40px 36px;
      border: 0.5px solid var(--separator);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
    }
    .header { padding: 0 0 24px; text-align: left; }
    .logo { display: none; }
    .title { font-size: 26px; }
  }
  @media (max-width: 899px) {
    .marketing-col { display: none; }
    .form-card { padding: 0; background: transparent; box-shadow: none; border: none; }
  }

  .form { margin-top: 8px; }
  .field {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 0.5px solid var(--separator);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.14);
  }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--label-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    color: var(--label);
    letter-spacing: -0.018em;
    padding: 0;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: var(--label-tertiary); }

  .error {
    color: var(--red);
    font-size: 14px;
    margin: 4px 6px 12px;
    letter-spacing: -0.005em;
    display: none;
  }
  .error.show { display: block; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--blue);
    color: white;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.018em;
    box-shadow: 0 8px 20px rgba(0, 122, 255, 0.30);
    margin-top: 12px;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: wait; }
  .submit-btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  .submit-btn.loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .forgot {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
  }
  .forgot a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
  }

  .signup-link {
    text-align: center;
    margin-top: 28px;
    font-size: 15px;
    color: var(--label-secondary);
  }
  .signup-link a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="landing.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>
</nav>

<div class="page-wrap">

  <div class="marketing-col">
    <svg class="marketing-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mgrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0040DD"/>
          <stop offset="50%" stop-color="#007AFF"/>
          <stop offset="100%" stop-color="#5AC8FA"/>
        </linearGradient>
      </defs>
      <path fill="url(#mgrad)" d="M12 0 C12 8 12 10 14.5 11 C17 12 24 12 24 12 C24 12 17 12 14.5 13 C12 14 12 16 12 24 C12 16 12 14 9.5 13 C7 12 0 12 0 12 C0 12 7 12 9.5 11 C12 10 12 8 12 0 Z"/>
    </svg>
    <h1 class="marketing-title">Heureux de vous revoir</h1>
    <p class="marketing-sub">Connectez-vous à votre compte Frizz pour retrouver vos appels, vos rendez-vous et vos statistiques.</p>
  </div>

  <div class="container">
    <div class="form-card">
      <div class="header">
        <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0040DD"/>
              <stop offset="50%" stop-color="#007AFF"/>
              <stop offset="100%" stop-color="#5AC8FA"/>
            </linearGradient>
          </defs>
          <path fill="url(#grad)" d="M12 0 C12 8 12 10 14.5 11 C17 12 24 12 24 12 C24 12 17 12 14.5 13 C12 14 12 16 12 24 C12 16 12 14 9.5 13 C7 12 0 12 0 12 C0 12 7 12 9.5 11 C12 10 12 8 12 0 Z"/>
        </svg>
        <h1 class="title">Bon retour</h1>
        <p class="subtitle">Connectez-vous à votre compte Frizz</p>
      </div>

      <form class="form" id="loginForm" autocomplete="on">
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" placeholder="vous@salon.fr" required autocomplete="email" inputmode="email" />
        </div>

        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="error" id="errorMsg"></div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="spinner"></span>
          <span class="btn-text">Se connecter</span>
        </button>

        <div class="forgot">
          <a href="#" onclick="forgotPassword(event)">Mot de passe oublié ?</a>
        </div>
      </form>

      <div class="signup-link">
        Pas encore de compte ? <a href="signup.html">Créer un compte</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('loginForm');
const errorEl = document.getElementById('errorMsg');
const btn = document.getElementById('submitBtn');
const btnText = btn.querySelector('.btn-text');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('show');
}
function hideError() {
  errorEl.classList.remove('show');
}
function setLoading(loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  btnText.textContent = loading ? 'Connexion…' : 'Se connecter';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Email et mot de passe requis');
    return;
  }
  setLoading(true);
  try {
    const { error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.href = 'index.html';
  } catch (err) {
    setLoading(false);
    let msg = err.message || 'Erreur de connexion';
    if (msg.includes('Invalid login credentials')) {
      msg = 'Email ou mot de passe incorrect';
    } else if (msg.includes('Email not confirmed')) {
      msg = 'Email pas encore confirmé. Vérifiez vos emails.';
    }
    showError(msg);
  }
});

async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    showError('Entrez votre email d\'abord');
    return;
  }
  hideError();
  try {
    const { error } = await supa.auth.resetPasswordForEmail(email);
    if (error) throw error;
    alert('Un email de réinitialisation vous a été envoyé.');
  } catch (err) {
    showError(err.message || 'Erreur lors de l\'envoi');
  }
}

// Si déjà connecté, rediriger
supa.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});
</script>
</body>
</html>
