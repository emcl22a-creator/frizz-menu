<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --bg-secondary: #0D0D0F;
    --label: #FFFFFF;
    --label-secondary: rgba(235, 235, 245, 0.60);
    --label-tertiary: rgba(235, 235, 245, 0.30);
    --separator: rgba(84, 84, 88, 0.40);
    --blue: #0A84FF;
    --red: #FF453A;
  }
  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.4;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -150px;
    right: -120px;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.09) 35%, transparent 65%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -180px;
    left: -150px;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle at 70% 70%, rgba(0, 100, 200, 0.16) 0%, rgba(0, 100, 200, 0.07) 35%, transparent 65%);
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
  }
  body > * { position: relative; z-index: 1; }
  button, input { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { cursor: text; }

  .nav {
    display: flex;
    align-items: center;
    padding: 16px 16px 8px;
    max-width: 460px;
    margin: 0 auto;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    font-size: 17px;
    padding: 4px 8px 4px 0;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .back-btn:active { opacity: 0.5; }
  .back-btn svg { width: 18px; height: 18px; }

  .container {
    max-width: 460px;
    margin: 0 auto;
    padding: 12px 22px max(32px, env(safe-area-inset-bottom));
  }

  .marketing-col { display: none; }

  .header { padding: 20px 0 32px; text-align: center; }
  .logo {
    width: 72px; height: 72px;
    border-radius: 18px;
    margin: 0 auto 24px;
    display: block;
  }
  .title {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.030em;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: var(--label-secondary);
    letter-spacing: -0.012em;
  }

  /* DESKTOP LAYOUT */
  @media (min-width: 900px) {
    body::before {
      background:
        radial-gradient(60% 50% at 25% 20%, rgba(0, 122, 255, 0.10) 0%, transparent 55%),
        radial-gradient(50% 40% at 90% 10%, rgba(100, 210, 255, 0.06) 0%, transparent 60%);
    }
    .nav {
      max-width: 1200px;
      padding: 22px 60px 0;
    }
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 80px;
      padding: 20px 60px 60px;
      align-items: center;
      min-height: calc(100vh - 80px);
    }
    .marketing-col { display: block; }
    .marketing-logo {
      width: 84px; height: 84px;
      border-radius: 20px;
      margin-bottom: 28px;
      display: block;
    }
    .marketing-title {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 22px;
      max-width: 14ch;
    }
    .marketing-sub {
      font-size: 18px;
      color: var(--label-secondary);
      line-height: 1.5;
      max-width: 38ch;
      letter-spacing: -0.012em;
    }

    .container {
      max-width: 100%;
      padding: 0;
      margin: 0;
    }
    .form-card {
      background: var(--bg-secondary);
      border-radius: 22px;
      padding: 40px 36px;
      border: 0.5px solid var(--separator);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
    }
    .header { padding: 0 0 24px; text-align: left; }
    .logo { display: none; }
    .title { font-size: 26px; }
  }
  @media (max-width: 899px) {
    .marketing-col { display: none; }
    .form-card { padding: 0; background: transparent; box-shadow: none; border: none; }
  }

  .form { margin-top: 8px; }
  .field {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 0.5px solid var(--separator);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.10);
  }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--label-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    color: var(--label);
    letter-spacing: -0.018em;
    padding: 0;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: var(--label-tertiary); }

  .error {
    color: var(--red);
    font-size: 14px;
    margin: 4px 6px 12px;
    letter-spacing: -0.005em;
    display: none;
  }
  .error.show { display: block; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--blue);
    color: white;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.018em;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    margin-top: 12px;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: wait; }
  .submit-btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  .submit-btn.loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .forgot {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
  }
  .forgot a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
  }

  .signup-link {
    text-align: center;
    margin-top: 28px;
    font-size: 15px;
    color: var(--label-secondary);
  }
  .signup-link a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
  }

  /* ═══ STYLE NOIR LUXE (identique à l'app Frizz) ═══ */
  :root {
    --bg: #0A0A0C !important;
    --bg-secondary: #0D0D0F !important;
    --label: #FFFFFF !important;
    --label-secondary: rgba(235, 235, 245, 0.60) !important;
    --label-tertiary: rgba(235, 235, 245, 0.30) !important;
    --separator: rgba(84, 84, 88, 0.40) !important;
    --blue: #FFFFFF !important;
    --red: #FF453A !important;
  }
  html, body {
    background:
      radial-gradient(90% 50% at 25% 0%, rgba(20,20,26,0.9) 0%, rgba(16,16,22,0.4) 35%, transparent 62%),
      radial-gradient(140% 110% at 90% 40%, rgba(28,28,34,0.85) 0%, rgba(18,18,24,0.45) 35%, transparent 68%),
      linear-gradient(180deg, #0A0A0E 0%, #101014 42%, #0C0C10 62%, #08080C 100%) !important;
    background-attachment: fixed !important;
  }
  /* On neutralise les anciens halos bleus */
  body::before, body::after { display: none !important; }

  /* Halos noir luxe (statiques) */
  .frizz-halo { position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.85; z-index: -1; pointer-events: none; }
  .frizz-halo-1 { top: 8%; left: -10%; width: 60vw; height: 60vw; max-width: 520px; max-height: 520px; background: radial-gradient(circle, #1E1E26 0%, transparent 70%); }
  .frizz-halo-2 { bottom: 0%; right: -12%; width: 65vw; height: 65vw; max-width: 560px; max-height: 560px; background: radial-gradient(circle, #24242E 0%, transparent 70%); }
  .frizz-halo-3 { top: -10%; left: 50%; transform: translateX(-50%); width: 110vw; height: 60vw; max-width: 900px; max-height: 520px; background: radial-gradient(circle, #20202A 0%, transparent 68%); }

  /* Ciel étoilé (plafond luxe) */
  .frizz-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-repeat: repeat;
    background-image:
      radial-gradient(1.4px 1.4px at 12% 18%, rgba(255,255,255,0.9), transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1.6px 1.6px at 45% 12%, rgba(255,250,235,0.95), transparent 100%),
      radial-gradient(1px 1px at 62% 30%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 78% 16%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1px 1px at 88% 48%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(1.5px 1.5px at 8% 62%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 33% 72%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.3px 1.3px at 54% 84%, rgba(255,255,255,0.8), transparent 100%),
      radial-gradient(1px 1px at 70% 66%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1.6px 1.6px at 92% 78%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 48% 56%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1px 1px at 82% 94%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.7px 0.7px at 5% 35%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.7px 0.7px at 38% 26%, rgba(255,255,255,0.45), transparent 100%),
      radial-gradient(0.8px 0.8px at 60% 38%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 76% 50%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.8px 0.8px at 91% 14%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 21% 70%, rgba(255,255,255,0.45), transparent 100%),
      radial-gradient(0.8px 0.8px at 73% 90%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 89% 86%, rgba(255,255,255,0.45), transparent 100%);
    background-size: 100% 100%;
  }

  /* Logo en ondes (rond -> naturel) */
  .logo, .marketing-logo {
    border-radius: 0 !important;
    width: auto !important;
    height: 64px !important;
    object-fit: contain !important;
    background: transparent !important;
  }
  /* Liens / accents : blanc au lieu de bleu */
  .back-btn, .signup-link a, .login-link a, .forgot { color: #FFFFFF !important; }
  input:focus { border-color: rgba(255,255,255,0.5) !important; }
  /* Bouton principal : blanc avec texte sombre (cohérence app) */
  .submit-btn { background: #FFFFFF !important; color: #0A0A0C !important; }
  .submit-btn * { color: #0A0A0C !important; }


  /* Supprimer toute lueur bleue (box-shadow) */
  .submit-btn, .btn-primary, .submit-btn:hover, .btn-primary:hover, .submit-btn:not(:disabled), .btn-primary:not(:disabled) {
    box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important;
  }
  input:focus { box-shadow: 0 0 0 4px rgba(255,255,255,0.10) !important; }
  /* Accents bleus restants -> blanc */
  .btn-primary { background: #FFFFFF !important; color: #0A0A0C !important; }
  .btn-primary * { color: #0A0A0C !important; }

</style>
</head>

        <h1 class="title">Bon retour</h1>
        <p class="subtitle">Connectez-vous à votre compte Frizz</p>
      </div>

      <form class="form" id="loginForm" autocomplete="on">
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" placeholder="vous@restaurant.fr" required autocomplete="email" inputmode="email" />
        </div>

        <div class="field">
          <label class="field-label" for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="error" id="errorMsg"></div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="spinner"></span>
          <span class="btn-text">Se connecter</span>
        </button>

        <div class="forgot">
          <a href="#" onclick="forgotPassword(event)">Mot de passe oublié ?</a>
        </div>
      </form>

      <div class="signup-link">
        Pas encore de compte ? <a href="signup.html">Créer un compte</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('loginForm');
const errorEl = document.getElementById('errorMsg');
const btn = document.getElementById('submitBtn');
const btnText = btn.querySelector('.btn-text');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('show');
}
function hideError() {
  errorEl.classList.remove('show');
}
function setLoading(loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  btnText.textContent = loading ? 'Connexion…' : 'Se connecter';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Email et mot de passe requis');
    return;
  }
  setLoading(true);
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    // Check if onboarded
    const { data: salon } = await supa
      .from('frizz_ai_salons')
      .select('onboarded')
      .eq('user_id', data.user.id)
      .limit(1).single();
    if (salon && salon.onboarded === false) {
      window.location.href = 'setup.html';
    } else {
      window.location.href = 'index.html';
    }
  } catch (err) {
    setLoading(false);
    let msg = err.message || 'Erreur de connexion';
    if (msg.includes('Invalid login credentials')) {
      msg = 'Email ou mot de passe incorrect';
    } else if (msg.includes('Email not confirmed')) {
      msg = 'Email pas encore confirmé. Vérifiez vos emails.';
    }
    showError(msg);
  }
});

async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    showError('Entrez votre email d\'abord');
    return;
  }
  hideError();
  try {
    const { error } = await supa.auth.resetPasswordForEmail(email);
    if (error) throw error;
    alert('Un email de réinitialisation vous a été envoyé.');
  } catch (err) {
    showError(err.message || 'Erreur lors de l\'envoi');
  }
}

// Si déjà connecté, rediriger
supa.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: salon } = await supa
    .from('frizz_ai_salons')
    .select('onboarded')
    .eq('user_id', session.user.id)
    .limit(1).single();
  if (salon && salon.onboarded === false) {
    window.location.href = 'setup.html';
  } else {
    window.location.href = 'index.html';
  }
});
</script>
