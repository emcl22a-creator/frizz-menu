<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light">
<title>Frizz · Mon restaurant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

<style>
  /* ════════════════════════════════════════════════════════════════
     FRIZZ — Page Stats pixel-perfect screenshot
     ════════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F2F2F7;
    --bg-card: #FFFFFF;
    --bg-card-translucent: rgba(255, 255, 255, 0.92);
    --label: #000000;
    --label-secondary: rgba(60, 60, 67, 0.60);
    --label-tertiary: rgba(60, 60, 67, 0.30);
    --blue: #007AFF;
    --blue-vivid: #1E64FF;
    --blue-light: rgba(0, 122, 255, 0.10);
    --green: #34C759;
    --green-light: rgba(52, 199, 89, 0.10);
    --red: #FF3B30;
    --separator: rgba(60, 60, 67, 0.10);
    --tabbar-bg: rgba(249, 249, 249, 0.85);
  }

  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.35;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    color-scheme: light;
    overflow-x: hidden;
    position: relative;
    font-feature-settings: 'cv11', 'ss01';
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { font-family: inherit; color: inherit; }

  body::before {
    content: '';
    position: fixed;
    top: -150px;
    right: -120px;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.09) 35%, transparent 65%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    animation: floatOrb1 18s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -180px;
    left: -150px;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle at 70% 70%, rgba(0, 100, 200, 0.16) 0%, rgba(0, 100, 200, 0.07) 35%, transparent 65%);
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    animation: floatOrb2 22s ease-in-out infinite;
  }
  @keyframes floatOrb1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-30px, 40px) scale(1.08); }
    66% { transform: translate(20px, -20px) scale(0.95); }
  }
  @keyframes floatOrb2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.92); }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* SCREEN "NOT CONNECTED" */
  .not-connected-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .not-connected-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(24px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 24px;
    padding: 36px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
  }
  .not-connected-logo {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    object-fit: contain;
    display: block;
    margin: 0 auto 20px;
    filter: drop-shadow(0 8px 20px rgba(0, 122, 255, 0.30));
  }
  .not-connected-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .not-connected-subtitle {
    font-size: 15px;
    color: var(--label-secondary);
    margin-bottom: 24px;
    line-height: 1.4;
  }
  .not-connected-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--blue);
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  .not-connected-btn:active { transform: scale(0.98); }

  /* SPLASH */
  .splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .splash-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--separator);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 8px;
    animation: cascadeIn 0.6s ease-out 0.02s backwards;
  }
  .logo {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 12px 28px rgba(0, 122, 255, 0.40)) drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
  }
  .bell-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label);
    position: relative;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.06);
    transition: transform 0.2s;
  }
  .bell-btn:active { transform: scale(0.95); }
  .bell-btn svg { width: 22px; height: 22px; stroke: var(--label); stroke-width: 1.8; fill: none; }
  .bell-dot {
    position: absolute;
    top: 9px;
    right: 11px;
    width: 8px;
    height: 8px;
    background: var(--blue);
    border-radius: 50%;
    border: 2px solid white;
  }

  /* GREETING */
  .greeting {
    padding: 18px 22px 22px;
    animation: cascadeIn 0.6s ease-out 0.06s backwards;
  }
  .greeting h1 {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1.05;
    color: var(--label);
    margin-bottom: 8px;
  }
  .greeting .subtitle {
    font-size: 16px;
    font-weight: 500;
    color: var(--label-secondary);
    letter-spacing: -0.01em;
  }
  .wave {
    display: inline-block;
    transform-origin: 70% 70%;
    animation: wave 1.6s ease-in-out 0.4s 1 backwards;
  }
  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    15% { transform: rotate(14deg); }
    30% { transform: rotate(-8deg); }
    45% { transform: rotate(14deg); }
    60% { transform: rotate(-4deg); }
    75% { transform: rotate(10deg); }
  }

  /* DUO HERO + CHART */
  .duo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 12px;
    animation: cascadeIn 0.6s ease-out 0.10s backwards;
  }
  .hero-card {
    background: linear-gradient(160deg, #4DA2FF 0%, #1E64FF 60%, #0A4FE5 100%);
    border-radius: 24px;
    padding: 20px 18px 18px;
    color: white;
    aspect-ratio: 1 / 1.18;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 20px 50px rgba(0, 122, 255, 0.40), 0 8px 16px rgba(0, 0, 0, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.20);
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%);
    pointer-events: none;
  }
  .hero-label {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: -0.3px;
    text-align: center;
    color: white;
  }
  .hero-number {
    font-size: 76px;
    font-weight: 600;
    letter-spacing: -3px;
    line-height: 1;
    text-align: center;
    margin: -2px 0;
    color: white;
    font-variant-numeric: tabular-nums;
  }
  .hero-sublabel {
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    color: white;
    opacity: 0.92;
    margin-bottom: 4px;
  }
  .hero-icon {
    align-self: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-icon svg { width: 18px; height: 18px; fill: white; }

  .chart-card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 24px;
    padding: 18px 16px 0;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1.18;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.06);
    overflow: hidden;
    position: relative;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--label);
    letter-spacing: -0.3px;
  }
  .chart-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--blue-light);
    color: var(--blue);
    padding: 6px 12px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-top: 10px;
    width: fit-content;
  }
  .chart-badge svg { width: 14px; height: 14px; fill: currentColor; }
  .chart-desc {
    font-size: 12px;
    color: var(--label-secondary);
    line-height: 1.4;
    letter-spacing: -0.2px;
    margin-top: 8px;
  }
  .chart-desc .secondary { color: var(--label-tertiary); display: block; }
  .chart-svg {
    margin-top: auto;
    margin-bottom: -1px;
    margin-left: -16px;
    margin-right: -16px;
    width: calc(100% + 32px);
    height: 70px;
    display: block;
  }
  .chart-line {
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawLine 1.6s cubic-bezier(0.65, 0, 0.35, 1) 0.4s forwards;
  }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  .chart-dot {
    opacity: 0;
    animation: fadeInDot 0.3s ease 1.6s forwards;
  }
  @keyframes fadeInDot { to { opacity: 1; } }

  /* DUO STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 24px;
    animation: cascadeIn 0.6s ease-out 0.18s backwards;
  }
  .stat-card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 18px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.07), 0 3px 10px rgba(0, 0, 0, 0.05);
  }
  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stat-icon.blue { background: var(--blue-light); color: var(--blue); }
  .stat-icon.green { background: var(--green-light); color: var(--green); }
  .stat-icon svg { width: 22px; height: 22px; }
  .stat-content { display: flex; flex-direction: column; }
  .stat-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--label-secondary);
    letter-spacing: -0.2px;
    line-height: 1.2;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--label);
    letter-spacing: -0.6px;
    line-height: 1.2;
    margin-top: 2px;
  }

  /* RÉSAS À VENIR */
  .resa-section {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 20px;
    margin: 0 20px;
    padding: 18px 0 6px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.06);
    animation: cascadeIn 0.6s ease-out 0.26s backwards;
  }
  .resa-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px 14px;
  }
  .resa-header h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--label);
  }
  .voir-plus {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    color: var(--blue);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    cursor: pointer;
  }
  .voir-plus svg { width: 14px; height: 14px; stroke: var(--blue); stroke-width: 2.4; fill: none; }
  .resa-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .resa-row:active { background: rgba(0, 122, 255, 0.05); }
  .resa-row + .resa-row { border-top: 0.5px solid var(--separator); }
  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
    flex-shrink: 0;
  }
  .resa-info { flex: 1; min-width: 0; }
  .resa-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--label);
    letter-spacing: -0.3px;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .resa-subtitle {
    font-size: 13px;
    color: var(--label-secondary);
    letter-spacing: -0.2px;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .resa-time {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    font-weight: 600;
    color: var(--label);
    letter-spacing: -0.3px;
    flex-shrink: 0;
  }
  .resa-time svg { width: 14px; height: 14px; stroke: var(--label-tertiary); stroke-width: 2.4; fill: none; }

  .empty-state {
    padding: 32px 18px;
    text-align: center;
  }
  .empty-state svg {
    width: 40px;
    height: 40px;
    color: var(--label-tertiary);
    margin: 0 auto 12px;
    display: block;
    stroke: currentColor;
    stroke-width: 1.6;
    fill: none;
  }
  .empty-state .empty-text {
    font-size: 15px;
    color: var(--label-secondary);
    font-weight: 500;
  }

  /* TAB BAR */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--tabbar-bg);
    backdrop-filter: blur(24px) saturate(200%);
    border-top: 0.5px solid var(--separator);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-around;
    z-index: 10;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    color: var(--label-secondary);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.1px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--blue); }
  .tab svg {
    width: 26px;
    height: 26px;
    stroke: currentColor;
    stroke-width: 1.8;
    fill: none;
  }
  .tab.active svg { fill: rgba(0, 122, 255, 0.15); stroke: var(--blue); }

  @keyframes cascadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══ POPUP RÉSERVATIONS PLEIN ÉCRAN ═══ */
  .resa-popup-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(4px);
    z-index: 95;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .resa-popup-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .resa-popup {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 100%;
    max-width: 430px;
    z-index: 96;
    background: var(--bg);
    transform: translate(-50%, 100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    pointer-events: none;
    visibility: hidden;
  }
  .resa-popup.visible {
    transform: translate(-50%, 0);
    pointer-events: auto;
    visibility: visible;
  }
  .resa-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--separator);
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px) saturate(180%);
  }
  .resa-popup-header h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--label);
  }
  .resa-popup-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(60, 60, 67, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label-secondary);
    transition: background 0.15s;
  }
  .resa-popup-close:active { background: rgba(60, 60, 67, 0.18); }
  .resa-popup-close svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

  /* Filtres en pilules */
  .resa-filters {
    display: flex;
    gap: 8px;
    padding: 12px 20px 14px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 0.5px solid var(--separator);
  }
  .resa-filters::-webkit-scrollbar { display: none; }
  .resa-filter-pill {
    padding: 8px 16px;
    border-radius: 100px;
    background: rgba(60, 60, 67, 0.08);
    color: var(--label);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  .resa-filter-pill:active { transform: scale(0.96); }
  .resa-filter-pill.active {
    background: var(--blue);
    color: white;
    box-shadow: 0 4px 12px rgba(0, 122, 255, 0.30);
  }
  .resa-filter-count {
    margin-left: 6px;
    opacity: 0.7;
    font-weight: 600;
  }

  /* Liste de résa filtrée */
  .resa-popup-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 40px;
  }
  .resa-popup-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 16px;
    margin-bottom: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.05);
    transition: transform 0.15s;
  }
  .resa-popup-card:active { transform: scale(0.99); }
  .resa-popup-empty {
    padding: 48px 24px;
    text-align: center;
  }
  .resa-popup-empty-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--blue-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }
  .resa-popup-empty-icon svg { width: 26px; height: 26px; stroke: var(--blue); stroke-width: 1.8; fill: none; }
  .resa-popup-empty-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--label);
    margin-bottom: 6px;
  }
  .resa-popup-empty-text {
    font-size: 14px;
    color: var(--label-secondary);
    line-height: 1.4;
  }

  /* ═══ POPUP NOTIFICATIONS ═══ */
  .notif-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(4px);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .notif-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .notif-popup {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translate(-50%, -100%);
    width: calc(100% - 24px);
    max-width: 406px;
    margin-top: 12px;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(24px) saturate(180%);
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.05);
    z-index: 91;
    max-height: calc(100vh - 100px);
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    pointer-events: none;
    visibility: hidden;
  }
  .notif-popup.visible {
    transform: translate(-50%, 0);
    pointer-events: auto;
    visibility: visible;
  }
  .notif-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 0.5px solid var(--separator);
  }
  .notif-header h3 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--label);
  }
  .notif-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(60, 60, 67, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label-secondary);
    transition: background 0.15s;
  }
  .notif-close:active { background: rgba(60, 60, 67, 0.18); }
  .notif-close svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

  .notif-list {
    overflow-y: auto;
    max-height: calc(100vh - 200px);
  }
  .notif-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 20px;
  }
  .notif-row + .notif-row {
    border-top: 0.5px solid var(--separator);
  }
  .notif-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
  }
  .notif-icon.created { background: rgba(52, 199, 89, 0.10); color: var(--green); }
  .notif-icon.modified { background: rgba(0, 122, 255, 0.10); color: var(--blue); }
  .notif-icon.cancelled { background: rgba(255, 59, 48, 0.10); color: var(--red); }
  .notif-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

  .notif-content { flex: 1; min-width: 0; }
  .notif-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--label);
    letter-spacing: -0.2px;
    line-height: 1.3;
  }
  .notif-subtitle {
    font-size: 12px;
    color: var(--label-secondary);
    letter-spacing: -0.1px;
    margin-top: 2px;
    line-height: 1.3;
  }
  .notif-time {
    font-size: 11px;
    color: var(--label-tertiary);
    letter-spacing: -0.1px;
    margin-top: 3px;
  }

  .notif-empty {
    padding: 36px 24px;
    text-align: center;
  }
  .notif-empty-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--blue-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }
  .notif-empty-icon svg { width: 22px; height: 22px; stroke: var(--blue); stroke-width: 1.8; fill: none; }
  .notif-empty-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--label);
    margin-bottom: 4px;
  }
  .notif-empty-text {
    font-size: 13px;
    color: var(--label-secondary);
    line-height: 1.4;
  }

  .hidden { display: none !important; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // CONFIG SUPABASE
  const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentSalon = null;
  let allReservations = []; // stockage global pour la popup notifs

  const $ = (id) => document.getElementById(id);
  const show = (id) => $(id).classList.remove('hidden');
  const hide = (id) => $(id).classList.add('hidden');

  async function checkSession() {
    const { data: { session } } = await supa.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadAppData();
    } else {
      showNotConnected();
    }
  }

  function showNotConnected() {
    hide('splash');
    hide('app');
    hide('tabbar');
    show('notConnectedScreen');
  }

  function showApp() {
    hide('splash');
    hide('notConnectedScreen');
    show('app');
    show('tabbar');
  }

  async function loadAppData() {
    show('splash');
    try {
      const { data: salons, error: salonErr } = await supa
        .from('frizz_ai_salons')
        .select('*')
        .eq('user_id', currentUser.id)
        .limit(1);

      if (salonErr) throw salonErr;

      if (!salons || salons.length === 0) {
        const { data: demoSalons } = await supa
          .from('frizz_ai_salons')
          .select('*')
          .eq('id', '0a4897c5-42a9-4e86-8de5-9c4c34232281')
          .limit(1);
        currentSalon = demoSalons?.[0] || null;
      } else {
        currentSalon = salons[0];
      }

      if (!currentSalon) throw new Error('Aucun salon trouvé pour ce compte.');

      const { data: reservations, error: resaErr } = await supa
        .from('frizz_ai_reservations')
        .select('*')
        .eq('salon_id', currentSalon.id)
        .order('date_reservation', { ascending: true });

      if (resaErr) throw resaErr;

      allReservations = reservations || [];
      renderStats(allReservations);
      updateBellDot();
      showApp();
    } catch (err) {
      console.error('Load error:', err);
      alert('Erreur de chargement : ' + (err.message || err));
      await supa.auth.signOut();
      showNotConnected();
    }
  }

  function renderStats(reservations) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const todayEnd = new Date(todayStart.getTime() + 24 * 3600 * 1000);
    const firstThisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    const firstLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const dayOfMonth = now.getDate();
    const lastMonthCutoff = new Date(now.getFullYear(), now.getMonth() - 1, dayOfMonth);

    const validResas = reservations
      .filter(r => r.statut !== 'annulee' && r.statut !== 'annule')
      .map(r => ({
        ...r,
        dateObj: new Date(`${r.date_reservation}T${r.heure_reservation || '00:00:00'}`),
      }));

    // Greeting
    const prenom = currentSalon.patron_prenom || '';
    $('greetingTitle').innerHTML = prenom
      ? `Bonjour ${escapeHtml(prenom)} <span class="wave">👋</span>`
      : `Bonjour <span class="wave">👋</span>`;

    const todayCount = validResas.filter(r => r.dateObj >= todayStart && r.dateObj < todayEnd).length;
    if (todayCount === 0) {
      $('greetingSubtitle').textContent = "Aucune réservation aujourd'hui";
    } else if (todayCount === 1) {
      $('greetingSubtitle').textContent = "1 réservation aujourd'hui";
    } else {
      $('greetingSubtitle').textContent = `${todayCount} réservations aujourd'hui`;
    }

    // Couverts libres
    const capaciteInterieur = parseInt(currentSalon.couverts_interieur) || 0;
    const capaciteTerrasse = parseInt(currentSalon.couverts_terrasse) || 0;
    const capaciteTotale = capaciteInterieur + capaciteTerrasse;
    const couvertsReservesToday = validResas
      .filter(r => r.dateObj >= todayStart && r.dateObj < todayEnd)
      .reduce((sum, r) => sum + (parseInt(r.nb_couverts) || 0), 0);
    const couvertsLibres = Math.max(0, capaciteTotale - couvertsReservesToday);
    $('couvertsLibres').textContent = couvertsLibres;

    // Trend vs mois dernier
    const thisMonthCount = validResas.filter(r => r.dateObj >= firstThisMonth && r.dateObj <= now).length;
    const lastMonthCount = validResas.filter(r => r.dateObj >= firstLastMonth && r.dateObj <= lastMonthCutoff).length;

    let pct = 0;
    let direction = 'up';
    let descMain = '';
    let descSecondary = '';

    if (lastMonthCount === 0 && thisMonthCount === 0) {
      pct = 0;
      descMain = 'Aucune donnée';
      descSecondary = '';
    } else if (lastMonthCount === 0) {
      pct = 100;
      direction = 'up';
      descMain = `${thisMonthCount} résa ce mois`;
      descSecondary = '(rien le mois dernier)';
    } else {
      pct = Math.round(((thisMonthCount - lastMonthCount) / lastMonthCount) * 100);
      direction = pct >= 0 ? 'up' : 'down';
      descMain = `${thisMonthCount} ce mois`;
      descSecondary = `(${lastMonthCount} le mois dernier)`;
    }

    $('trendPercent').textContent = (pct >= 0 ? '+' : '') + pct + '%';
    $('trendDescMain').textContent = descMain;
    $('trendDescSecondary').textContent = descSecondary;

    const arrowEl = $('trendArrow');
    const rotation = direction === 'down' ? '90 12 12' : '-90 12 12';
    arrowEl.querySelector('path').setAttribute('transform', `rotate(${rotation})`);

    const color = direction === 'down' ? '#FF453A' : '#007AFF';
    $('trendBadge').style.background = direction === 'down' ? 'rgba(255, 69, 58, 0.10)' : 'rgba(0, 122, 255, 0.10)';
    $('trendBadge').style.color = color;
    $('chartLine').setAttribute('stroke', color);
    $('chartDotOuter').setAttribute('fill', color);
    const grad1 = document.querySelector('#chartGradient stop:first-child');
    const grad2 = document.querySelector('#chartGradient stop:last-child');
    if (grad1) grad1.setAttribute('stop-color', color);
    if (grad2) grad2.setAttribute('stop-color', color);

    if (direction === 'down') {
      $('chartLine').setAttribute('d', 'M 0 8 C 30 12, 50 18, 75 28 S 120 42, 150 52 S 180 58, 200 62');
      $('chartArea').setAttribute('d', 'M 0 8 C 30 12, 50 18, 75 28 S 120 42, 150 52 S 180 58, 200 62 L 200 70 L 0 70 Z');
      $('chartDotOuter').setAttribute('cy', '62');
      $('chartDotInner').setAttribute('cy', '62');
    }

    // Résas ce mois
    $('resaCeMois').textContent = thisMonthCount;

    // No-shows évités
    const noShowsEvites = validResas.filter(r => r.statut === 'confirmee' && r.dateObj < todayStart).length;
    $('noShowsEvites').textContent = noShowsEvites;

    // Liste résas à venir
    renderResaList(validResas, now);
  }

  function renderResaList(validResas, now) {
    const container = $('resaList');
    const upcoming = validResas
      .filter(r => r.dateObj > now)
      .sort((a, b) => a.dateObj - b.dateObj)
      .slice(0, 4);

    if (upcoming.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <div class="empty-text">Aucune réservation à venir</div>
        </div>`;
      return;
    }

    container.innerHTML = upcoming.map(r => {
      const initials = getInitials(r.client_nom);
      const heure = formatHeure(r.heure_reservation);
      const color = avatarColorFor(r.client_nom || '');
      const sourceText = (r.source === 'ia' || r.source === 'vapi')
        ? 'Réservation confirmée par IA'
        : 'Réservation confirmée';
      return `
        <div class="resa-row">
          <div class="avatar" style="background: ${color.bg}; color: ${color.fg};">${escapeHtml(initials)}</div>
          <div class="resa-info">
            <div class="resa-title">Table de ${parseInt(r.nb_couverts) || '?'} · ${escapeHtml(r.client_nom || 'Client')}</div>
            <div class="resa-subtitle">${sourceText}</div>
          </div>
          <div class="resa-time">
            ${heure}
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
      `;
    }).join('');
  }

  function getInitials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  // ═══ POPUP RÉSERVATIONS PLEIN ÉCRAN ═══
  let currentResaFilter = 'today';

  function getFilteredResas(filter) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const todayEnd = new Date(todayStart.getTime() + 24 * 3600 * 1000);
    const tomorrowStart = todayEnd;
    const tomorrowEnd = new Date(tomorrowStart.getTime() + 24 * 3600 * 1000);
    
    // Début de semaine : lundi 00:00 de la semaine en cours
    const weekStart = new Date(todayStart);
    const dayOfWeek = (todayStart.getDay() + 6) % 7; // lundi = 0
    weekStart.setDate(todayStart.getDate() - dayOfWeek);
    const weekEnd = new Date(weekStart.getTime() + 7 * 24 * 3600 * 1000);
    
    // Mois en cours
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 1);

    const validResas = allReservations
      .filter(r => r.statut !== 'annulee' && r.statut !== 'annule')
      .map(r => ({
        ...r,
        dateObj: new Date(`${r.date_reservation}T${r.heure_reservation || '00:00:00'}`),
      }));

    let filtered;
    if (filter === 'today') {
      filtered = validResas.filter(r => r.dateObj >= todayStart && r.dateObj < todayEnd);
    } else if (filter === 'tomorrow') {
      filtered = validResas.filter(r => r.dateObj >= tomorrowStart && r.dateObj < tomorrowEnd);
    } else if (filter === 'week') {
      filtered = validResas.filter(r => r.dateObj >= weekStart && r.dateObj < weekEnd);
    } else if (filter === 'month') {
      filtered = validResas.filter(r => r.dateObj >= monthStart && r.dateObj < monthEnd);
    } else {
      filtered = validResas;
    }

    return filtered.sort((a, b) => a.dateObj - b.dateObj);
  }

  function updateFilterCounts() {
    $('countToday').textContent = getFilteredResas('today').length;
    $('countTomorrow').textContent = getFilteredResas('tomorrow').length;
    $('countWeek').textContent = getFilteredResas('week').length;
    $('countMonth').textContent = getFilteredResas('month').length;
  }

  function openResaPopup() {
    currentResaFilter = 'today';
    updateFilterCounts();
    setResaFilter('today');
    $('resaPopupBackdrop').classList.add('visible');
    $('resaPopup').classList.add('visible');
  }

  function closeResaPopup() {
    $('resaPopupBackdrop').classList.remove('visible');
    $('resaPopup').classList.remove('visible');
  }

  function setResaFilter(filter) {
    currentResaFilter = filter;
    // Update pilules
    document.querySelectorAll('.resa-filter-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.filter === filter);
    });
    renderResaPopupList();
  }

  function renderResaPopupList() {
    const filtered = getFilteredResas(currentResaFilter);
    const container = $('resaPopupList');

    if (filtered.length === 0) {
      const messages = {
        today: 'Aucune réservation aujourd\'hui',
        tomorrow: 'Aucune réservation demain',
        week: 'Aucune réservation cette semaine',
        month: 'Aucune réservation ce mois',
      };
      container.innerHTML = `
        <div class="resa-popup-empty">
          <div class="resa-popup-empty-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="resa-popup-empty-title">${messages[currentResaFilter] || 'Aucune réservation'}</div>
          <div class="resa-popup-empty-text">Les nouvelles réservations apparaîtront ici.</div>
        </div>
      `;
      return;
    }

    container.innerHTML = filtered.map(r => {
      const initials = getInitials(r.client_nom);
      const heure = formatHeure(r.heure_reservation);
      const dateResa = formatResaDate(r.date_reservation);
      const color = avatarColorFor(r.client_nom || '');
      const sourceText = (r.source === 'ia' || r.source === 'vapi')
        ? 'Confirmée par IA'
        : 'Confirmée';
      return `
        <div class="resa-popup-card">
          <div class="avatar" style="background: ${color.bg}; color: ${color.fg};">${escapeHtml(initials)}</div>
          <div class="resa-info">
            <div class="resa-title">Table de ${parseInt(r.nb_couverts) || '?'} · ${escapeHtml(r.client_nom || 'Client')}</div>
            <div class="resa-subtitle">${dateResa} à ${heure} · ${sourceText}</div>
          </div>
          <div class="resa-time">
            ${heure}
          </div>
        </div>
      `;
    }).join('');
  }

  // ═══ POPUP NOTIFICATIONS ═══
  function getTodayActivity() {
    // Réservations dont created_at est aujourd'hui
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const todayEnd = new Date(todayStart.getTime() + 24 * 3600 * 1000);

    return allReservations
      .filter(r => {
        if (!r.created_at) return false;
        const createdAt = new Date(r.created_at);
        return createdAt >= todayStart && createdAt < todayEnd;
      })
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // plus récent en haut
  }

  function updateBellDot() {
    const activity = getTodayActivity();
    const dot = $('bellDot');
    if (activity.length > 0) {
      dot.style.display = 'block';
    } else {
      dot.style.display = 'none';
    }
  }

  function openNotifs() {
    renderNotifs();
    $('notifBackdrop').classList.add('visible');
    $('notifPopup').classList.add('visible');
  }

  function closeNotifs() {
    $('notifBackdrop').classList.remove('visible');
    $('notifPopup').classList.remove('visible');
  }

  function renderNotifs() {
    const activity = getTodayActivity();
    const container = $('notifList');

    if (activity.length === 0) {
      container.innerHTML = `
        <div class="notif-empty">
          <div class="notif-empty-icon">
            <svg viewBox="0 0 24 24">
              <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="notif-empty-title">Tout est calme</div>
          <div class="notif-empty-text">Aucune nouvelle activité aujourd'hui pour le moment.</div>
        </div>
      `;
      return;
    }

    container.innerHTML = activity.map(r => {
      // Déterminer le type : créée / modifiée / annulée
      const statut = r.statut || 'confirmee';
      let type, icon, title;
      if (statut === 'annulee' || statut === 'annule') {
        type = 'cancelled';
        icon = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round"/></svg>';
        title = `Annulation de la résa de ${escapeHtml(r.client_nom || 'Client')}`;
      } else if (statut === 'modifiee' || statut === 'modified') {
        type = 'modified';
        icon = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        title = `Modification de la résa de ${escapeHtml(r.client_nom || 'Client')}`;
      } else {
        type = 'created';
        icon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        title = `Nouvelle résa de ${escapeHtml(r.client_nom || 'Client')}`;
      }

      // Détails de la réservation
      const dateResa = formatResaDate(r.date_reservation);
      const heureResa = formatHeure(r.heure_reservation);
      const couverts = parseInt(r.nb_couverts) || '?';
      const subtitle = `Table de ${couverts} · ${dateResa} à ${heureResa}`;

      // Heure de création (relative)
      const timeAgo = formatTimeAgo(r.created_at);

      return `
        <div class="notif-row">
          <div class="notif-icon ${type}">${icon}</div>
          <div class="notif-content">
            <div class="notif-title">${title}</div>
            <div class="notif-subtitle">${subtitle}</div>
            <div class="notif-time">${timeAgo}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function formatResaDate(dateStr) {
    if (!dateStr) return '?';
    const [year, month, day] = dateStr.split('-');
    const months = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juill.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
    return `${parseInt(day)} ${months[parseInt(month) - 1]}`;
  }

  function formatTimeAgo(createdAt) {
    const now = new Date();
    const created = new Date(createdAt);
    const diffMs = now - created;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMin / 60);

    if (diffMin < 1) return 'À l\'instant';
    if (diffMin < 60) return `Il y a ${diffMin} min`;
    if (diffHours < 24) return `Il y a ${diffHours}h`;
    return created.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatHeure(timeStr) {
    if (!timeStr) return '';
    const [h, m] = timeStr.split(':');
    if (m === '00') return `${parseInt(h)}h`;
    return `${parseInt(h)}h${m}`;
  }

  const avatarColors = [
    { bg: 'rgba(0, 122, 255, 0.10)', fg: '#007AFF' },
    { bg: 'rgba(52, 199, 89, 0.10)', fg: '#34C759' },
    { bg: 'rgba(255, 149, 0, 0.10)', fg: '#FF9500' },
    { bg: 'rgba(175, 82, 222, 0.10)', fg: '#AF52DE' },
    { bg: 'rgba(255, 45, 85, 0.10)', fg: '#FF2D55' },
  ];

  function avatarColorFor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    return avatarColors[Math.abs(hash) % avatarColors.length];
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // EVENT LISTENERS
  $('voirPlusBtn').addEventListener('click', openResaPopup);
  $('resaPopupCloseBtn').addEventListener('click', closeResaPopup);
  $('resaPopupBackdrop').addEventListener('click', closeResaPopup);
  document.querySelectorAll('.resa-filter-pill').forEach(pill => {
    pill.addEventListener('click', () => setResaFilter(pill.dataset.filter));
  });
  $('bellBtn').addEventListener('click', openNotifs);
  $('notifCloseBtn').addEventListener('click', closeNotifs);
  $('notifBackdrop').addEventListener('click', closeNotifs);
  // Fermer popup avec Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeNotifs();
      closeResaPopup();
    }
  });

  document.addEventListener('DOMContentLoaded', checkSession);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentSalon) loadAppData();
  });
</script>

</body>
</html>
