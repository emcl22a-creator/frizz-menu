<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Frizz✦ — Inscription</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050506;
    --surface: rgba(255,255,255,0.03);
    --text: #F2F2F4;
    --text-2: rgba(255,255,255,0.65);
    --text-3: rgba(255,255,255,0.45);
    --text-4: rgba(255,255,255,0.25);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --blue: #0A84FF;
    --blue-soft: rgba(10,132,255,0.14);
    --blue-strong: #2E9DFF;
    --red: #FF6B5C;
    --red-soft: rgba(255,107,92,0.14);
    --green: #30D158;
  }

  html, body {
    color: var(--text);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 700;
    letter-spacing: -0.014em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Aurora bleue subtile */
  html {
    background:
      radial-gradient(ellipse 60% 50% at 10% 5%, rgba(10,132,255,0.30), transparent 50%),
      radial-gradient(ellipse 50% 40% at 90% 15%, rgba(91,143,249,0.20), transparent 50%),
      radial-gradient(ellipse 45% 40% at 95% 60%, rgba(46,157,255,0.18), transparent 50%),
      #050506 !important;
    background-attachment: fixed !important;
  }
  body { background: transparent !important; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 50% 35% at 30% 30%, rgba(10,132,255,0.10), transparent 50%),
      radial-gradient(ellipse 50% 35% at 70% 50%, rgba(46,157,255,0.08), transparent 50%);
    animation: auroraDrift 24s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes auroraDrift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(3%, 2%) scale(1.06); }
    100% { transform: translate(-2%, 3%) scale(1.04); }
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 22px;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: rgba(20, 20, 26, 0.45);
    backdrop-filter: saturate(180%) blur(40px);
    -webkit-backdrop-filter: saturate(180%) blur(40px);
    border: 1px solid var(--border-strong);
    border-radius: 28px;
    padding: 32px 28px 28px;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,0.16),
      inset 0 0 0 1px rgba(255,255,255,0.04),
      0 30px 80px -20px rgba(0,0,0,0.7);
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-text {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: -0.020em;
    color: var(--text);
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
  }
  .logo-text .spark {
    color: var(--blue);
    text-shadow: 0 0 12px rgba(10,132,255,0.5);
    animation: sparkPulse 3.5s ease-in-out infinite;
    font-size: 32px;
  }
  @keyframes sparkPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }

  .hero {
    text-align: center;
    margin-bottom: 26px;
  }
  .hero-num {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 12px;
    color: var(--blue);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .hero-title {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.030em;
    color: var(--text);
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .hero-title em {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    color: var(--blue);
  }
  .hero-sub {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 14.5px;
    color: var(--text-3);
    letter-spacing: -0.005em;
  }

  .field { margin-bottom: 14px; }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .field-label {
    display: block;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--text-2);
    margin-bottom: 6px;
    padding-left: 4px;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"],
  select {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.012em;
    transition: all 0.18s ease;
    outline: none;
  }
  input::placeholder { color: var(--text-4); }
  input:focus, select:focus {
    border-color: var(--blue);
    background: rgba(10,132,255,0.06);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.15);
  }
  .field-help {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 5px;
    padding-left: 4px;
    line-height: 1.4;
  }

  .btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: 14.5px;
    letter-spacing: -0.012em;
    cursor: pointer;
    border: 0;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      0 6px 20px -4px rgba(10,132,255,0.5);
  }
  .btn-primary:hover {
    background: var(--blue-strong);
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.30),
      0 10px 28px -4px rgba(10,132,255,0.6);
  }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .footer-link {
    text-align: center;
    margin-top: 22px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    color: var(--text-3);
  }
  .footer-link a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 800;
  }
  .footer-link a:hover { text-decoration: underline; }

  .msg {
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    display: none;
    line-height: 1.4;
  }
  .msg.show { display: block; }
  .msg.error {
    background: var(--red-soft);
    border: 1px solid rgba(255,107,92,0.30);
    color: var(--red);
  }
  .msg.success {
    background: rgba(48,209,88,0.14);
    border: 1px solid rgba(48,209,88,0.30);
    color: var(--green);
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mention essai gratuit */
  .trial-banner {
    background: linear-gradient(135deg, rgba(10,132,255,0.10), rgba(167,139,250,0.06));
    border: 1px solid rgba(10,132,255,0.20);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 22px;
    text-align: center;
  }
  .trial-banner-title {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 16px;
    color: var(--blue);
    margin-bottom: 2px;
  }
  .trial-banner-sub {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: -0.005em;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-text">Frizz<span class="spark">✦</span></div>
    </div>

    <div class="hero">
      <div class="hero-num">— Inscription</div>
      <h1 class="hero-title">Créez votre<br><em>compte</em>.</h1>
      <p class="hero-sub">Configurez votre restaurant en 2 minutes.</p>
    </div>

    <div class="trial-banner">
      <div class="trial-banner-title">Premier mois gratuit</div>
      <div class="trial-banner-sub">Sans engagement · Annulable à tout moment</div>
    </div>

    <div class="msg" id="msg"></div>

    <form id="signup-form">
      <div class="field">
        <label class="field-label">Nom du restaurant</label>
        <input type="text" id="resto-nom" placeholder="ex. Chez Nico" required autocomplete="organization">
      </div>

      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" id="email" placeholder="contact@…" required autocomplete="email">
      </div>

      <div class="field">
        <label class="field-label">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
        <p class="field-help">Minimum 6 caractères</p>
      </div>

      <div class="field-row">
        <div>
          <label class="field-label">Pays</label>
          <select id="country">
            <option value="CH">Suisse 🇨🇭</option>
            <option value="FR">France 🇫🇷</option>
          </select>
        </div>
        <div>
          <label class="field-label">Devise</label>
          <select id="currency">
            <option value="CHF">CHF</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">
        Créer mon compte
      </button>
    </form>

    <div class="footer-link">
      Déjà un compte ?
      <a href="login.html">Se connecter</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById('signup-form');
const msgEl = document.getElementById('msg');
const submitBtn = document.getElementById('submit-btn');

// Si déjà connecté, redirige vers admin
(async function checkSession() {
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    location.href = 'menu-admin.html';
  }
})();

// Auto-adapter devise selon pays
document.getElementById('country').addEventListener('change', (e) => {
  document.getElementById('currency').value = e.target.value === 'FR' ? 'EUR' : 'CHF';
});

function showMsg(text, type = 'error') {
  msgEl.textContent = text;
  msgEl.classList.remove('error', 'success');
  msgEl.classList.add(type);
  msgEl.classList.add('show');
}
function hideMsg() {
  msgEl.classList.remove('show');
}

// Slug : transforme un nom en URL-friendly
function slugify(s) {
  return (s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .substring(0, 60);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMsg();

  const restoNom = document.getElementById('resto-nom').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const country = document.getElementById('country').value;
  const currency = document.getElementById('currency').value;

  if (!restoNom || !email || !password) {
    showMsg('Tous les champs sont requis', 'error');
    return;
  }
  if (password.length < 6) {
    showMsg('Le mot de passe doit contenir au moins 6 caractères', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> Création…';

  try {
    // 1) Créer le compte auth Supabase
    const { data: authData, error: authError } = await supa.auth.signUp({
      email,
      password,
      options: {
        data: { resto_nom: restoNom }
      }
    });

    if (authError) {
      if (authError.message.toLowerCase().includes('already')) {
        showMsg('Un compte existe déjà avec cet email. Connectez-vous.', 'error');
      } else {
        showMsg(authError.message, 'error');
      }
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Créer mon compte';
      return;
    }

    if (!authData.user) {
      showMsg('Vérifiez votre email pour confirmer votre compte avant de continuer.', 'success');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Créer mon compte';
      return;
    }

    // 2) Créer le restaurant lié
    let baseSlug = slugify(restoNom) || 'mon-resto';
    let finalSlug = baseSlug;
    let counter = 1;
    while (counter < 50) {
      const { data: existing } = await supa.from('restaurants').select('id').eq('slug', finalSlug).maybeSingle();
      if (!existing) break;
      finalSlug = `${baseSlug}-${counter}`;
      counter++;
    }

    const restoPayload = {
      nom: restoNom,
      slug: finalSlug,
      user_id: authData.user.id,
      email,
      fiscal_country: country,
      currency,
      statut: 'actif'
    };

    // Retry intelligent : si certaines colonnes n'existent pas, on les retire
    const optionalCols = ['fiscal_country', 'currency', 'statut', 'email'];
    let payload = { ...restoPayload };
    let restoCreated = false;

    for (let attempt = 0; attempt < 8; attempt++) {
      const { error } = await supa.from('restaurants').insert(payload);
      if (!error) {
        restoCreated = true;
        break;
      }
      console.error(`Tentative resto ${attempt + 1}:`, error);

      const msg = (error.message || '').toLowerCase();
      // Si user_id rejeté, retenter avec owner_id
      if (msg.includes('user_id') && payload.user_id !== undefined) {
        payload.owner_id = payload.user_id;
        delete payload.user_id;
        continue;
      }
      // Sinon retirer une colonne optionnelle
      const colMatch = msg.match(/column ['"]?(\w+)['"]?|could not find the ['"]?(\w+)['"]? column/i);
      let col = colMatch ? (colMatch[1] || colMatch[2]) : null;
      if (!col) col = optionalCols.find(c => payload[c] !== undefined);
      if (col && payload[col] !== undefined) {
        delete payload[col];
        continue;
      }
      break;
    }

    if (!restoCreated) {
      showMsg('Compte créé mais erreur de configuration restaurant. Connectez-vous pour continuer.', 'success');
      setTimeout(() => location.href = 'login.html', 2500);
      return;
    }

    showMsg('Compte créé ! Redirection…', 'success');
    setTimeout(() => location.href = 'menu-admin.html', 1500);
  } catch (err) {
    console.error(err);
    showMsg('Erreur de création. Réessayez.', 'error');
    submitBtn.disabled = false;
    submitBtn.innerHTML = 'Créer mon compte';
  }
});
</script>
</body>
</html>
