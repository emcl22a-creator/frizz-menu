<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0C">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>Frizz · L'agent IA pour restaurants</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --bg-secondary: #0D0D0F;
    --label: #FFFFFF;
    --label-secondary: rgba(235, 235, 245, 0.60);
    --label-tertiary: rgba(235, 235, 245, 0.30);
    --separator: rgba(84, 84, 88, 0.40);
    --blue: #0A84FF;
  }
  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.4;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    color-scheme: dark;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -150px; right: -120px;
    width: 520px; height: 520px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.09) 35%, transparent 65%);
    filter: blur(60px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb1 18s ease-in-out infinite;
  }
  body::after {
    content: ''; position: fixed; bottom: -180px; left: -150px;
    width: 480px; height: 480px;
    background: radial-gradient(circle at 70% 70%, rgba(0, 100, 200, 0.16) 0%, rgba(0, 100, 200, 0.07) 35%, transparent 65%);
    filter: blur(70px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb2 22s ease-in-out infinite;
  }
  html::before {
    content: ''; position: fixed; top: 30%; left: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(100, 210, 255, 0.14) 0%, rgba(100, 210, 255, 0.06) 40%, transparent 70%);
    filter: blur(80px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb3 26s ease-in-out infinite;
  }
  @keyframes floatOrb1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-30px,40px) scale(1.08);} }
  @keyframes floatOrb2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(40px,-30px) scale(1.10);} }
  @keyframes floatOrb3 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,30px) scale(1.12);} }
  @media (prefers-reduced-motion: reduce) {
    body::before, body::after, html::before { animation: none; }
  }

  button, a { font-family: inherit; cursor: pointer; text-decoration: none; }
  button { border: none; background: none; color: inherit; padding: 0; }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 24px max(32px, env(safe-area-inset-bottom));
    max-width: 460px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .hero {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 0;
  }
  .logo-big {
    width: 80px; height: 80px; margin-bottom: 28px;
    border-radius: 20px;
    display: block;
    animation: scaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes scaleIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
  .title {
    font-size: 38px; font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.05; margin-bottom: 14px; color: var(--label);
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
  .subtitle {
    font-size: 16px; color: var(--label-secondary); line-height: 1.45;
    max-width: 380px; letter-spacing: -0.012em;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s backwards;
  }
  .actions {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; margin-top: 24px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s backwards;
  }
  .btn {
    display: flex; align-items: center; justify-content: center;
    padding: 16px 22px; border-radius: 14px;
    font-size: 16px; font-weight: 600; letter-spacing: -0.018em;
    transition: transform 0.18s cubic-bezier(0.32, 0.72, 0.42, 1), box-shadow 0.18s ease;
    width: 100%; text-align: center;
  }
  .btn-primary {
    background: var(--blue);
    color: white;
    box-shadow: 0 8px 24px rgba(0, 122, 255, 0.30), 0 2px 6px rgba(0, 0, 0, 0.04);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.40), 0 2px 6px rgba(0, 0, 0, 0.04); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid var(--separator);
    color: var(--label);
  }
  .btn-secondary:hover { border-color: rgba(255, 255, 255, 0.40); transform: translateY(-1px); }
  .btn-secondary:active { transform: scale(0.98); }
  .footer {
    text-align: center; font-size: 13px; color: var(--label-tertiary);
    margin-top: 24px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.65s backwards;
  }

  @media (min-width: 900px) {
    .container { max-width: 1080px; flex-direction: row; align-items: center; justify-content: center; gap: 80px; padding: 60px; }
    .hero { align-items: flex-start; text-align: left; padding: 0; flex: 1; }
    .logo-big { width: 88px; height: 88px; }
    .title { font-size: 56px; line-height: 1.02; }
    .subtitle { font-size: 18px; max-width: 480px; }
    .right-col { flex: 0 0 380px; }
    .right-card {
      background: var(--bg-secondary);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid var(--separator);
      border-radius: 22px;
      padding: 36px 32px;
      box-shadow:
        0 1px 0 0 rgba(255, 255, 255, 0.50) inset,
        0 12px 32px rgba(0, 0, 0, 0.06),
        0 4px 12px rgba(0, 0, 0, 0.04);
    }
    .right-card-title { display: block; font-size: 22px; font-weight: 600; letter-spacing: -0.025em; margin-bottom: 4px; color: var(--label); }
    .right-card-sub { display: block; font-size: 15px; color: var(--label-secondary); margin-bottom: 22px; letter-spacing: -0.012em; }
    .actions { margin-top: 0; }
    .footer { display: none; }
  }

  /* ═══ STYLE NOIR LUXE (identique à la page login) ═══ */
  :root {
    --bg: #0A0A0C !important;
    --bg-secondary: #0D0D0F !important;
    --blue: #FFFFFF !important;
  }
  html, body {
    background:
      radial-gradient(90% 50% at 25% 0%, rgba(20,20,26,0.9) 0%, rgba(16,16,22,0.4) 35%, transparent 62%),
      radial-gradient(140% 110% at 90% 40%, rgba(28,28,34,0.85) 0%, rgba(18,18,24,0.45) 35%, transparent 68%),
      linear-gradient(180deg, #0A0A0E 0%, #101014 42%, #0C0C10 62%, #08080C 100%) !important;
    background-attachment: fixed !important;
  }
  body::before, body::after { display: none !important; }

  .frizz-halo { position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.85; z-index: -1; pointer-events: none; }
  .frizz-halo-1 { top: 8%; left: -10%; width: 60vw; height: 60vw; max-width: 520px; max-height: 520px; background: radial-gradient(circle, #1E1E26 0%, transparent 70%); }
  .frizz-halo-2 { bottom: 0%; right: -12%; width: 65vw; height: 65vw; max-width: 560px; max-height: 560px; background: radial-gradient(circle, #24242E 0%, transparent 70%); }
  .frizz-halo-3 { top: -10%; left: 50%; transform: translateX(-50%); width: 110vw; height: 60vw; max-width: 900px; max-height: 520px; background: radial-gradient(circle, #20202A 0%, transparent 68%); }

  .frizz-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-repeat: repeat;
    background-image:
      radial-gradient(1.4px 1.4px at 12% 18%, rgba(255,255,255,0.9), transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1.6px 1.6px at 45% 12%, rgba(255,250,235,0.95), transparent 100%),
      radial-gradient(1px 1px at 62% 30%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 78% 16%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1px 1px at 88% 48%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(1.5px 1.5px at 8% 62%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 33% 72%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.3px 1.3px at 54% 84%, rgba(255,255,255,0.8), transparent 100%),
      radial-gradient(1px 1px at 70% 66%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1.6px 1.6px at 92% 78%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 48% 56%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1px 1px at 82% 94%, rgba(255,255,255,0.5), transparent 100%);
    background-size: 100% 100%;
  }

  /* Logo en ondes */
  .logo-big { border-radius: 0 !important; width: auto !important; height: 96px !important; object-fit: contain !important; background: transparent !important; }
  @media (max-width: 760px) { .logo-big { height: 80px !important; } }

  /* Accents bleus -> blanc */
  .btn-primary { background: #FFFFFF !important; color: #0A0A0C !important; box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important; }
  .btn-primary * { color: #0A0A0C !important; }
  .btn-secondary { background: rgba(255,255,255,0.06) !important; color: #FFFFFF !important; border: 0.5px solid rgba(255,255,255,0.18) !important; }
  .right-card { background: var(--bg-secondary) !important; border: 0.5px solid rgba(255,255,255,0.08) !important; }
  /* Sur tablette et mobile : pas de carte grise autour des boutons */
  @media (max-width: 900px) {
    .right-card {
      background: transparent !important;
      border: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
  }
</style>
</head>
<body>
  <div class="frizz-stars" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-1" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-2" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-3" aria-hidden="true"></div>
<div class="container">
  <div class="hero">
    <img class="logo-big" src="logo.png" alt="Frizz"/>
    <h1 class="title">Frizz prend vos réservations.</h1>
    <p class="subtitle">L'agent IA qui décroche 24/7, prend les réservations et réduit vos no-shows. Pour les restaurants qui ne veulent plus rater un seul client au téléphone.</p>
  </div>

  <div class="right-col">
    <div class="right-card">
      <div class="actions">
        <a href="signup.html" class="btn btn-primary">Créer mon compte</a>
        <a href="login.html" class="btn btn-secondary">J'ai déjà un compte</a>
      </div>
    </div>
  </div>

  <div class="footer">Sans engagement · annulation à tout moment</div>
</div>
</body>
</html>
