<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boutique en ligne</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='Source Serif 4, serif' font-style='italic' font-weight='700' fill='%23B8593A'%3E✦%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg-main: #F5EFE6;
  --bg-card: #FFFFFF;
  --bg-warm: #ECE3D5;
  --text-primary: #2A1810;
  --text-secondary: #6B5544;
  --text-tertiary: #A89180;
  --accent: #B8593A;
  --accent-hover: #9C4830;
  --accent-light: rgba(184, 89, 58, 0.1);
  --border: rgba(42, 24, 16, 0.08);
  --border-strong: rgba(42, 24, 16, 0.15);
  --success: #5C8A4F;
}

html, body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  line-height: 1.55;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.045 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

a { color: inherit; text-decoration: none; }

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding-bottom: 140px;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  aspect-ratio: 5 / 4;
  background: linear-gradient(135deg, var(--bg-warm) 0%, #D9CCB7 100%);
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
@media (min-width: 720px) {
  .hero { aspect-ratio: 16 / 9; border-radius: 0 0 32px 32px; }
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(42, 24, 16, 0.55) 100%);
}
.hero-overlay-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 2;
  padding: 0 24px 28px;
  color: #fff;
}
.hero-eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 8px;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: 4px;
  backdrop-filter: blur(4px);
}
.hero-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -1.2px;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}
.hero-title em { font-style: italic; font-weight: 400; }

/* INTRO + INFO CARDS */
.intro-section {
  padding: 32px 24px 0;
}
.intro-desc {
  font-family: 'Source Serif 4', serif;
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.45;
  color: var(--text-primary);
  margin-bottom: 22px;
  white-space: pre-line;
  letter-spacing: -0.2px;
}
.info-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
}
.info-card-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.info-card-icon .material-icons-round { color: var(--accent); font-size: 20px; }
.info-card-content { flex: 1; min-width: 0; }
.info-card-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.info-card-value {
  font-size: 13.5px;
  color: var(--text-primary);
  white-space: pre-line;
  line-height: 1.5;
}

/* PRODUITS */
.products-section { padding: 40px 24px 0; }
.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.section-eyebrow::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--text-tertiary);
}
.section-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 32px;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text-primary);
  margin-bottom: 24px;
}
.section-title em { font-style: italic; font-weight: 400; color: var(--accent); }

.products-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (min-width: 600px) { .products-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }

.product {
  background: var(--bg-card);
  border-radius: 18px;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(.22,.61,.36,1), box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
}
.product:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 30px -12px rgba(42, 24, 16, 0.18);
}
.product-photo {
  aspect-ratio: 4 / 5;
  background-color: var(--bg-warm);
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
}
.product-photo .material-icons-round { font-size: 44px; opacity: 0.4; }
.product-info {
  padding: 14px 14px 16px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.product-nom {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 17px;
  line-height: 1.2;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.product-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;
}
.product-prix {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.product-add {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s ease, background 0.2s ease;
  box-shadow: 0 4px 14px -4px rgba(184, 89, 58, 0.5);
}
.product-add:active { transform: scale(0.92); }
.product-add:hover { background: var(--accent-hover); }
.product-add .material-icons-round { font-size: 20px; }
.product-qty {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-light);
  border-radius: 100px;
  padding: 3px;
}
.product-qty button {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: 50%;
  flex-shrink: 0;
}
.product-qty button:active { transform: scale(0.9); }
.product-qty button:hover { background: var(--accent-hover); }
.product-qty .material-icons-round { font-size: 16px; }
.product-qty-num {
  min-width: 22px;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.empty-products {
  padding: 60px 24px;
  text-align: center;
  color: var(--text-tertiary);
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-size: 16px;
}

/* FOOTER */
.shop-footer {
  margin-top: 60px;
  padding: 30px 24px 20px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.shop-footer-text {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.3px;
}
.logo-mini {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 700;
  color: var(--text-secondary);
}
.logo-mini-sparkle { color: var(--accent); }

/* CART BTN */
.cart-btn {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 24px;
  background: var(--text-primary);
  border: none;
  border-radius: 100px;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 14px 32px -10px rgba(42, 24, 16, 0.5);
  z-index: 50;
  transition: transform 0.2s cubic-bezier(.22,.61,.36,1), opacity 0.2s ease;
  min-width: 240px;
  justify-content: space-between;
  white-space: nowrap;
}
.cart-btn:active { transform: translateX(-50%) scale(0.96); }
.cart-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(120px); }
.cart-btn-left { display: inline-flex; align-items: center; gap: 8px; }
.cart-btn-left .material-icons-round { font-size: 18px; }
.cart-btn-count {
  background: var(--accent);
  border-radius: 100px;
  padding: 1px 8px;
  font-size: 11.5px;
  font-weight: 700;
  min-width: 22px;
  text-align: center;
}
.cart-btn-total {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 16px;
}

/* DRAWER */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42, 24, 16, 0.45);
  backdrop-filter: blur(4px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 720px;
  max-height: 92vh;
  background: var(--bg-main);
  border-radius: 32px 32px 0 0;
  z-index: 101;
  transition: transform 0.4s cubic-bezier(.32,.72,0,1);
  display: flex;
  flex-direction: column;
  box-shadow: 0 -10px 40px rgba(42, 24, 16, 0.2);
}
.drawer.open { transform: translateX(-50%) translateY(0); }
.drawer-handle {
  width: 42px;
  height: 5px;
  background: var(--border-strong);
  border-radius: 100px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.drawer-header {
  padding: 16px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.drawer-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}
.drawer-title em { font-style: italic; font-weight: 400; color: var(--accent); }
.drawer-close {
  width: 38px; height: 38px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.drawer-body {
  padding: 18px 24px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.cart-item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item:last-of-type { border-bottom: none; }
.cart-item-photo {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  background-color: var(--bg-warm);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
}
.cart-item-photo .material-icons-round { font-size: 24px; opacity: 0.5; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-nom {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 16px;
  line-height: 1.25;
  margin-bottom: 4px;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}
.cart-item-prix {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.cart-item-prix .unit-price {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  color: var(--accent);
  font-weight: 600;
  font-size: 13px;
}

.form-section { margin-top: 22px; }
.form-section-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-tertiary);
  letter-spacing: 1.6px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.form-section-eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--text-tertiary);
}
.input-wrap { margin-bottom: 12px; }
.input-wrap label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}
input[type=text], input[type=email], input[type=tel], input[type=datetime-local], textarea {
  width: 100%;
  padding: 13px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}
input:focus, textarea:focus { border-color: var(--accent); background: #fff; }
input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
.lead-time-info {
  margin-top: 6px;
  font-size: 11.5px;
  color: var(--accent);
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 4px;
}
.lead-time-info::before { content: '⏱'; font-size: 13px; }

.drawer-footer {
  padding: 18px 24px 32px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.total-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.total-value {
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 32px;
  color: var(--text-primary);
  letter-spacing: -1px;
}
.btn-checkout {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 17px;
  background: var(--accent);
  border: none;
  border-radius: 100px;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: 0 10px 24px -8px rgba(184, 89, 58, 0.55);
  transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
}
.btn-checkout:hover { background: var(--accent-hover); }
.btn-checkout:active { transform: scale(0.98); }
.btn-checkout:disabled { opacity: 0.5; cursor: wait; }

/* STATES */
.state-screen {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 40px 24px;
  text-align: center;
}
.state-icon {
  width: 88px; height: 88px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
}
.state-icon.success { background: rgba(92, 138, 79, 0.15); color: var(--success); }
.state-icon.error { background: rgba(184, 89, 58, 0.15); color: var(--accent); }
.state-icon .material-icons-round { font-size: 48px; }
.state-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.state-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 30px;
  margin-bottom: 12px;
  letter-spacing: -1px;
  line-height: 1.1;
  color: var(--text-primary);
}
.state-title em { font-style: italic; font-weight: 400; color: var(--accent); }
.state-desc {
  font-size: 15px;
  color: var(--text-secondary);
  max-width: 380px;
  line-height: 1.6;
}
.state-desc strong { color: var(--text-primary); font-weight: 600; }

.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-bottom: 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast-floating {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 22px;
  background: var(--text-primary);
  color: #fff;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s ease;
  max-width: 90%;
  box-shadow: 0 10px 28px rgba(42, 24, 16, 0.3);
}
.toast-floating.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-floating.error { background: var(--accent); }
</style>
</head>
<body>

<div id="app">
  <div class="state-screen" id="state-loading">
    <div class="spinner"></div>
    <div class="state-desc">Chargement de la boutique…</div>
  </div>
</div>

<div class="toast-floating" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

let boulangerie = null;
let produits = [];
let cart = {};

function showToast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast-floating ' + (type === 'error' ? 'error' : '');
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3500);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function fmtPrix(p) {
  return parseFloat(p || 0).toFixed(2).replace('.', ',') + ' €';
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('s');

  if (!slug) {
    renderError('Lien invalide', 'Aucune boutique spécifiée dans l\'adresse.');
    return;
  }

  const { data: bou, error: bouErr } = await supabase
    .from('boulangeries')
    .select('id, nom, ville, pays, telephone, boutique_active, boutique_slug, boutique_banner_url, boutique_description, boutique_adresse, boutique_horaires')
    .eq('boutique_slug', slug)
    .eq('boutique_active', true)
    .maybeSingle();

  if (bouErr) {
    console.error(bouErr);
    renderError('Erreur de chargement', 'Impossible de charger la boutique. Réessayez plus tard.');
    return;
  }
  if (!bou) {
    renderError('Boutique introuvable', 'Cette boutique n\'existe pas ou n\'est plus active.');
    return;
  }

  boulangerie = bou;
  document.title = bou.nom + ' — Commander en ligne';

  const { data: prods } = await supabase
    .from('produits_boutique')
    .select('*')
    .eq('boulangerie_id', bou.id)
    .eq('actif', true)
    .order('ordre', { ascending: true })
    .order('created_at', { ascending: false });

  produits = prods || [];
  renderShop();
}

function renderError(title, desc) {
  $('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon error"><span class="material-icons-round">error_outline</span></div>
      <div class="state-eyebrow">— Oups</div>
      <h1 class="state-title">${title}</h1>
      <p class="state-desc">${desc}</p>
    </div>
  `;
}

function renderSuccess() {
  $('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon success"><span class="material-icons-round">check_circle</span></div>
      <div class="state-eyebrow">— Merci pour votre commande</div>
      <h1 class="state-title">À très <em>bientôt</em>.</h1>
      <p class="state-desc">Votre commande est bien transmise à <strong>${escapeHtml(boulangerie.nom)}</strong>. Le boulanger vous contactera si nécessaire. À très vite !</p>
    </div>
  `;
}

function renderShop() {
  const banner = boulangerie.boutique_banner_url
    ? `<div class="hero" style="background-image: url('${boulangerie.boutique_banner_url}')">`
    : `<div class="hero">`;

  const horaires = boulangerie.boutique_horaires ? `
    <div class="info-card">
      <div class="info-card-icon"><span class="material-icons-round">schedule</span></div>
      <div class="info-card-content">
        <div class="info-card-label">Horaires de retrait</div>
        <div class="info-card-value">${escapeHtml(boulangerie.boutique_horaires)}</div>
      </div>
    </div>
  ` : '';

  const adresseLines = [];
  if (boulangerie.boutique_adresse) adresseLines.push(boulangerie.boutique_adresse);
  if (boulangerie.ville) {
    const villePays = boulangerie.ville + (boulangerie.pays === 'CH' ? ', Suisse' : boulangerie.pays === 'FR' ? ', France' : '');
    // n'ajoute la ville séparément que si elle n'est pas déjà dans l'adresse complète
    if (!boulangerie.boutique_adresse || !boulangerie.boutique_adresse.toLowerCase().includes(boulangerie.ville.toLowerCase())) {
      adresseLines.push(villePays);
    }
  }
  const adresse = adresseLines.length > 0 ? `
    <div class="info-card">
      <div class="info-card-icon"><span class="material-icons-round">place</span></div>
      <div class="info-card-content">
        <div class="info-card-label">Adresse</div>
        <div class="info-card-value">${escapeHtml(adresseLines.join('\n'))}</div>
      </div>
    </div>
  ` : '';

  const description = boulangerie.boutique_description ? `
    <p class="intro-desc">"${escapeHtml(boulangerie.boutique_description)}"</p>
  ` : '';

  const produitsHtml = produits.length === 0
    ? `<div class="empty-products">La carte n'est pas encore disponible.</div>`
    : `<div class="products-grid">${produits.map(produitCard).join('')}</div>`;

  $('app').innerHTML = `
    <div class="wrapper">
      ${banner}
        <div class="hero-overlay-content">
          <div class="hero-eyebrow">${escapeHtml((boulangerie.ville || 'Boulangerie').toUpperCase())} · ${boulangerie.pays === 'CH' ? 'SUISSE' : 'FRANCE'}</div>
          <h1 class="hero-title">${escapeHtml(boulangerie.nom)}</h1>
        </div>
      </div>

      <div class="intro-section">
        ${description}
        ${horaires}
        ${adresse}
      </div>

      <div class="products-section">
        <div class="section-eyebrow">Notre carte</div>
        <h2 class="section-title">À la <em>boulangerie</em>.</h2>
        ${produitsHtml}
      </div>

      <div class="shop-footer">
        <div class="shop-footer-text">
          Propulsé par <span class="logo-mini">Frizz<span class="logo-mini-sparkle">✦</span></span>
        </div>
      </div>
    </div>

    <button class="cart-btn hidden" id="cart-btn">
      <span class="cart-btn-left">
        <span class="material-icons-round">shopping_bag</span>
        <span class="cart-btn-count" id="cart-count">0</span>
        Voir le panier
      </span>
      <span class="cart-btn-total" id="cart-total">0,00 €</span>
    </button>

    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <h2 class="drawer-title">Votre <em>commande</em></h2>
        <button class="drawer-close" id="drawer-close"><span class="material-icons-round">close</span></button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
      <div class="drawer-footer" id="drawer-footer" style="display: none;">
        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-value" id="checkout-total">0,00 €</span>
        </div>
        <button class="btn-checkout" id="btn-checkout">Confirmer ma commande</button>
      </div>
    </div>
  `;

  attachShopHandlers();
  updateCartButton();
}

function produitCard(p) {
  const photo = p.photo_url
    ? `<div class="product-photo" style="background-image: url('${p.photo_url}')"></div>`
    : `<div class="product-photo"><span class="material-icons-round">restaurant</span></div>`;
  return `
    <div class="product" data-id="${p.id}">
      ${photo}
      <div class="product-info">
        <div class="product-nom">${escapeHtml(p.nom)}</div>
        ${p.description ? `<div class="product-desc">${escapeHtml(p.description)}</div>` : ''}
        <div class="product-bottom">
          <span class="product-prix">${fmtPrix(p.prix)}</span>
          <div class="product-action" id="action-${p.id}"></div>
        </div>
      </div>
    </div>
  `;
}

function attachShopHandlers() {
  produits.forEach(p => updateProduitAction(p.id));
  $('cart-btn').addEventListener('click', openDrawer);
  $('drawer-overlay').addEventListener('click', closeDrawer);
  $('drawer-close').addEventListener('click', closeDrawer);
}

function updateProduitAction(id) {
  const wrap = $('action-' + id);
  if (!wrap) return;
  const qty = cart[id] || 0;
  if (qty === 0) {
    wrap.innerHTML = `<button class="product-add" data-add="${id}"><span class="material-icons-round">add</span></button>`;
    wrap.querySelector('button').addEventListener('click', () => addToCart(id));
  } else {
    wrap.innerHTML = `
      <div class="product-qty">
        <button data-dec="${id}"><span class="material-icons-round">remove</span></button>
        <span class="product-qty-num">${qty}</span>
        <button data-inc="${id}"><span class="material-icons-round">add</span></button>
      </div>
    `;
    wrap.querySelector('[data-dec]').addEventListener('click', () => decrement(id));
    wrap.querySelector('[data-inc]').addEventListener('click', () => addToCart(id));
  }
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateProduitAction(id);
  updateCartButton();
}
function decrement(id) {
  cart[id] = Math.max(0, (cart[id] || 0) - 1);
  if (cart[id] === 0) delete cart[id];
  updateProduitAction(id);
  updateCartButton();
  if (Object.keys(cart).length === 0) closeDrawer();
}

function getCartTotal() {
  let t = 0, c = 0;
  Object.entries(cart).forEach(([id, qty]) => {
    const p = produits.find(x => x.id === id);
    if (p) { t += parseFloat(p.prix) * qty; c += qty; }
  });
  return { total: t, count: c };
}

function updateCartButton() {
  const { total, count } = getCartTotal();
  const btn = $('cart-btn');
  if (count === 0) btn.classList.add('hidden');
  else {
    btn.classList.remove('hidden');
    $('cart-count').textContent = count;
    $('cart-total').textContent = fmtPrix(total);
  }
  if ($('drawer').classList.contains('open')) renderDrawer();
}

function openDrawer() {
  renderDrawer();
  $('drawer-overlay').classList.add('open');
  $('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  $('drawer-overlay').classList.remove('open');
  $('drawer').classList.remove('open');
  document.body.style.overflow = '';
}

function getMaxLeadHours() {
  let max = 0;
  Object.keys(cart).forEach(id => {
    const p = produits.find(x => x.id === id);
    if (p && (p.lead_time_hours || 0) > max) max = p.lead_time_hours || 0;
  });
  return max;
}
function getMinDateTime() {
  const max = getMaxLeadHours();
  const dt = new Date(Date.now() + max * 60 * 60 * 1000);
  dt.setMinutes(Math.ceil(dt.getMinutes() / 15) * 15);
  dt.setSeconds(0);
  const tz = dt.getTimezoneOffset() * 60000;
  return new Date(dt - tz).toISOString().slice(0, 16);
}
function leadTimeLabel(hours) {
  if (hours <= 4) return '4 heures';
  if (hours <= 24) return '24 heures';
  if (hours <= 48) return '48 heures';
  return '1 semaine';
}

function renderDrawer() {
  const body = $('drawer-body');
  const footer = $('drawer-footer');
  const { total, count } = getCartTotal();

  if (count === 0) {
    body.innerHTML = `<div style="padding: 50px 0; text-align: center; color: var(--text-tertiary); font-family: 'Source Serif 4', serif; font-style: italic; font-size: 16px;">Votre panier est vide.</div>`;
    footer.style.display = 'none';
    return;
  }

  const items = Object.entries(cart).map(([id, qty]) => {
    const p = produits.find(x => x.id === id);
    if (!p) return '';
    const photo = p.photo_url
      ? `<div class="cart-item-photo" style="background-image: url('${p.photo_url}')"></div>`
      : `<div class="cart-item-photo"><span class="material-icons-round">restaurant</span></div>`;
    return `
      <div class="cart-item">
        ${photo}
        <div class="cart-item-info">
          <div class="cart-item-nom">${escapeHtml(p.nom)}</div>
          <div class="cart-item-prix"><span class="unit-price">${fmtPrix(p.prix)}</span> × ${qty} = ${fmtPrix(parseFloat(p.prix) * qty)}</div>
          <div class="product-qty">
            <button data-dec="${id}"><span class="material-icons-round">remove</span></button>
            <span class="product-qty-num">${qty}</span>
            <button data-inc="${id}"><span class="material-icons-round">add</span></button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const minDt = getMinDateTime();
  const maxLead = getMaxLeadHours();
  const leadInfo = maxLead > 0
    ? `<div class="lead-time-info">Délai minimum de préparation : ${leadTimeLabel(maxLead)}</div>`
    : '';

  body.innerHTML = `
    ${items}
    <div class="form-section">
      <div class="form-section-eyebrow">Vos coordonnées</div>
      <div class="input-wrap">
        <label for="ck-nom">Votre nom *</label>
        <input type="text" id="ck-nom" placeholder="Marie Martin" required>
      </div>
      <div class="input-wrap">
        <label for="ck-tel">Téléphone *</label>
        <input type="tel" id="ck-tel" placeholder="06 12 34 56 78" required>
      </div>
      <div class="input-wrap">
        <label for="ck-email">Email (optionnel)</label>
        <input type="email" id="ck-email" placeholder="marie@example.com">
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-eyebrow">Date de retrait</div>
      <div class="input-wrap">
        <label for="ck-dt">Quand venez-vous récupérer ? *</label>
        <input type="datetime-local" id="ck-dt" min="${minDt}" required>
        ${leadInfo}
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-eyebrow">Notes</div>
      <div class="input-wrap">
        <textarea id="ck-notes" rows="2" placeholder="Allergies, demandes particulières…"></textarea>
      </div>
    </div>
  `;

  footer.style.display = 'block';
  $('checkout-total').textContent = fmtPrix(total);

  body.querySelectorAll('[data-dec]').forEach(b => b.addEventListener('click', () => decrement(b.dataset.dec)));
  body.querySelectorAll('[data-inc]').forEach(b => b.addEventListener('click', () => addToCart(b.dataset.inc)));

  $('btn-checkout').onclick = submitCommande;
}

async function submitCommande() {
  const nom = $('ck-nom').value.trim();
  const tel = $('ck-tel').value.trim();
  const email = $('ck-email').value.trim();
  const dt = $('ck-dt').value;
  const notes = $('ck-notes').value.trim();

  if (!nom) { showToast('Veuillez indiquer votre nom', 'error'); $('ck-nom').focus(); return; }
  if (!tel) { showToast('Téléphone requis', 'error'); $('ck-tel').focus(); return; }
  if (!dt) { showToast('Date de retrait requise', 'error'); $('ck-dt').focus(); return; }

  const dtMs = new Date(dt).getTime();
  const minMs = Date.now() + getMaxLeadHours() * 60 * 60 * 1000;
  if (dtMs < minMs) { showToast('Délai de préparation insuffisant', 'error'); return; }

  const { total } = getCartTotal();
  const articlesText = Object.entries(cart).map(([id, qty]) => {
    const p = produits.find(x => x.id === id);
    return p ? `${qty} × ${p.nom}` : '';
  }).filter(Boolean).join(', ');

  const btn = $('btn-checkout');
  btn.disabled = true;
  btn.innerHTML = `Envoi…`;

  const { data, error } = await supabase
    .from('commandes')
    .insert([{
      boulangerie_id: boulangerie.id,
      nom_client: nom,
      telephone: tel,
      email: email || null,
      articles: articlesText,
      date_retrait: new Date(dt).toISOString(),
      montant: total,
      notes: notes || null,
      statut: 'a_preparer',
      source: 'boutique'
    }])
    .select()
    .single();

  if (error) {
    console.error(error);
    showToast('Erreur : ' + error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = `Confirmer ma commande`;
    return;
  }

  closeDrawer();
  document.body.style.overflow = '';
  cart = {};
  renderSuccess();
}

init();
</script>

</body>
</html>
