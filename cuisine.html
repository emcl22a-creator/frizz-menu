<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cuisine — Frizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #000;
    --bg-elev: #0e0e10;
    --label: #ffffff;
    --label-2: rgba(255,255,255,0.65);
    --label-3: rgba(255,255,255,0.42);
    --label-4: rgba(255,255,255,0.18);
    --fill-1: rgba(255,255,255,0.06);
    --fill-2: rgba(255,255,255,0.04);
    --sep: rgba(255,255,255,0.1);
    --sep-strong: rgba(255,255,255,0.18);
    --blue: #0A84FF;
    --blue-soft: rgba(10,132,255,0.14);
    --green: #30D158;
    --green-soft: rgba(48,209,88,0.14);
    --orange: #FF9F0A;
    --orange-soft: rgba(255,159,10,0.14);
    --red: #FF453A;
    --red-soft: rgba(255,69,58,0.14);
    --r: 14px;
    --r-lg: 18px;
    --r-xl: 22px;
    --pill: 100px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  *::selection { background: var(--blue); color: #fff; }

  html, body {
    background: var(--bg);
    color: var(--label);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 600;
    letter-spacing: -0.013em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }

  /* ========== HEADER ========== */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border-bottom: 1px solid var(--sep-strong);
  }
  .header-inner {
    padding: 16px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.045em;
    color: var(--blue);
    text-shadow: 0 0 16px rgba(10,132,255,0.5);
  }
  .brand-logo .spark {
    font-size: 26px;
    animation: twinkle 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(10,132,255,1));
    line-height: 1;
  }
  @keyframes twinkle {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.65; transform: scale(0.85); }
  }
  .brand-sub {
    padding-left: 14px;
    border-left: 1px solid var(--sep-strong);
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  .brand-name {
    font-size: 13px;
    color: var(--label-2);
    font-weight: 500;
    letter-spacing: -0.012em;
  }
  .brand-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.025em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .clock {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    padding: 8px 16px;
    background: var(--fill-1);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    margin-right: 4px;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--fill-1);
    border: 1px solid var(--sep);
    color: var(--label-2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s var(--ease);
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--fill-2); color: var(--label); border-color: var(--sep-strong); }
  .icon-btn.active {
    background: var(--blue-soft);
    border-color: rgba(10,132,255,0.4);
    color: var(--blue);
  }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ========== KANBAN BOARD ========== */
  .board {
    height: calc(100vh - 73px);
    height: calc(100dvh - 73px);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  .col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--sep-strong);
    min-width: 0;
  }
  .col:last-child { border-right: 0; }

  .col-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--sep);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .col-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .col-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .col[data-statut="en_attente"] .col-dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .col[data-statut="en_cours"] .col-dot { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
  .col[data-statut="prete"] .col-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }

  .col-title {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  .col-count {
    font-size: 13px;
    color: var(--label-2);
    font-weight: 700;
    padding: 4px 10px;
    background: var(--fill-1);
    border: 1px solid var(--sep);
    border-radius: var(--pill);
    font-variant-numeric: tabular-nums;
    min-width: 28px;
    text-align: center;
  }
  .col[data-statut="en_attente"] .col-count {
    background: var(--red-soft);
    border-color: rgba(255,69,58,0.3);
    color: var(--red);
  }
  .col[data-statut="en_cours"] .col-count {
    background: var(--orange-soft);
    border-color: rgba(255,159,10,0.3);
    color: var(--orange);
  }
  .col[data-statut="prete"] .col-count {
    background: var(--green-soft);
    border-color: rgba(48,209,88,0.3);
    color: var(--green);
  }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .col-body::-webkit-scrollbar { width: 8px; }
  .col-body::-webkit-scrollbar-thumb { background: var(--sep); border-radius: 4px; }

  /* ========== ORDER CARD ========== */
  .order {
    background: var(--bg-elev);
    border: 1px solid var(--sep);
    border-radius: var(--r-lg);
    overflow: hidden;
    transition: border-color 0.3s var(--ease), transform 0.3s var(--ease);
    position: relative;
    touch-action: pan-y;
    -webkit-user-select: none;
    user-select: none;
  }
  .order-content {
    background: var(--bg-elev);
    border-radius: var(--r-lg);
    transition: transform 0.3s var(--ease);
    position: relative;
    z-index: 2;
    touch-action: pan-y;
  }
  .order.swiping .order-content {
    transition: none;
  }
  .order.swipe-done .order-content {
    transform: translateX(110%);
    transition: transform 0.35s var(--ease-spring);
  }

  /* Hint visuel sous la carte qui apparaît au swipe */
  .swipe-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 28px;
    border-radius: var(--r-lg);
    background: linear-gradient(90deg, transparent 0%, rgba(48,209,88,0.16) 35%, rgba(48,209,88,0.32) 100%);
    color: var(--green);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.018em;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s var(--ease);
  }
  .order[data-statut="en_attente"] .swipe-hint {
    background: linear-gradient(90deg, transparent 0%, rgba(255,159,10,0.16) 35%, rgba(255,159,10,0.32) 100%);
    color: var(--orange);
  }
  .swipe-hint svg { width: 22px; height: 22px; margin-right: 8px; }
  .order.swiping .swipe-hint { opacity: 1; }
  .order.is-new {
    animation: card-in 0.5s var(--ease-spring) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .order.flash {
    animation: flash 1.4s ease-out 1;
  }
  @keyframes flash {
    0% { box-shadow: 0 0 0 0 rgba(10,132,255,0.6); border-color: var(--blue); }
    100% { box-shadow: 0 0 0 0 rgba(10,132,255,0); border-color: var(--sep); }
  }
  .order:hover { border-color: var(--sep-strong); transform: translateY(-2px); }

  .order-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--sep);
    background: var(--fill-2);
    gap: 10px;
  }
  .order-table {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }
  .order-meta {
    font-size: 12px;
    color: var(--label-2);
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .order-time {
    font-size: 13px;
    font-weight: 800;
    color: var(--label);
    background: var(--fill-1);
    border: 1px solid var(--sep);
    padding: 6px 11px;
    border-radius: var(--pill);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .order-time.urgent {
    background: var(--red-soft);
    border-color: rgba(255,69,58,0.3);
    color: var(--red);
    animation: pulse-urgent 1.5s ease-in-out infinite;
  }
  @keyframes pulse-urgent {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .order-items {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .order-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.3;
  }
  .order-item-qty {
    font-size: 18px;
    font-weight: 900;
    color: var(--label);
    min-width: 36px;
    padding-top: 1px;
    letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .order-item-info {
    flex: 1;
    min-width: 0;
  }
  .order-item-nom {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .order-item-note {
    font-size: 12.5px;
    color: var(--orange);
    margin-top: 4px;
    font-style: italic;
    font-weight: 600;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .order-item-note::before {
    content: '✏️';
    font-style: normal;
    flex-shrink: 0;
  }

  .order-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--sep);
    background: var(--fill-2);
    display: flex;
    gap: 8px;
  }
  .btn-action {
    flex: 1;
    padding: 12px 14px;
    border-radius: var(--pill);
    font-size: 13.5px;
    font-weight: 800;
    letter-spacing: -0.015em;
    transition: all 0.2s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 44px;
  }
  .btn-action svg { width: 14px; height: 14px; stroke-width: 2.5; }
  .btn-primary {
    background: var(--label);
    color: #000;
    box-shadow: 0 4px 14px rgba(255,255,255,0.12);
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary.green {
    background: var(--green);
    color: #000;
    box-shadow: 0 4px 14px rgba(48,209,88,0.4);
  }
  .btn-primary.orange {
    background: var(--orange);
    color: #000;
    box-shadow: 0 4px 14px rgba(255,159,10,0.4);
  }
  .btn-secondary {
    background: var(--fill-1);
    color: var(--label-2);
    border: 1px solid var(--sep);
    flex: 0;
    padding: 12px 14px;
  }
  .btn-secondary:hover { background: var(--fill-2); color: var(--label); }

  /* ========== EMPTY STATE ========== */
  .col-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--label-3);
    text-align: center;
    padding: 30px 20px;
    gap: 12px;
  }
  .col-empty-icon {
    width: 48px; height: 48px;
    border-radius: var(--r);
    background: var(--fill-1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--label-3);
  }
  .col-empty-icon svg { width: 22px; height: 22px; }
  .col-empty-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--label-3);
  }

  /* ========== ALERTS BAR (Appels serveur) ========== */
  .alerts-bar {
    background: linear-gradient(180deg, rgba(255,159,10,0.12) 0%, rgba(255,159,10,0.04) 100%);
    border-bottom: 1px solid rgba(255,159,10,0.3);
    overflow-x: auto;
    scrollbar-width: none;
    display: none;
  }
  .alerts-bar::-webkit-scrollbar { display: none; }
  .alerts-bar.show { display: flex; }
  .alerts-bar-inner {
    display: flex;
    gap: 10px;
    padding: 12px 18px;
    min-width: max-content;
  }
  .alert-card {
    background: var(--bg-elev);
    border: 1.5px solid var(--orange);
    border-radius: var(--pill);
    padding: 10px 16px 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(255,159,10,0.6);
    animation: alert-pulse 2s ease-in-out infinite;
    transition: all 0.25s var(--ease);
  }
  @keyframes alert-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,159,10,0.6); }
    50% { box-shadow: 0 0 0 8px rgba(255,159,10,0); }
  }
  .alert-icon-wrap {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--orange-soft);
    border: 1.5px solid rgba(255,159,10,0.5);
    color: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .alert-icon-wrap svg { width: 15px; height: 15px; }
  .alert-content {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .alert-table {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .alert-msg {
    font-size: 12px;
    font-weight: 600;
    color: var(--label-2);
    margin-top: 2px;
  }
  .alert-time {
    font-size: 11px;
    font-weight: 700;
    color: var(--orange);
    background: var(--orange-soft);
    padding: 4px 10px;
    border-radius: var(--pill);
    margin-left: 4px;
    font-variant-numeric: tabular-nums;
  }
  .alert-done {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--green);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s var(--ease);
    margin-left: 4px;
    flex-shrink: 0;
    cursor: pointer;
    border: 0;
  }
  .alert-done:hover { transform: scale(1.08); }
  .alert-done svg { width: 14px; height: 14px; stroke-width: 2.5; }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(140px);
    background: rgba(20,20,22,0.95);
    backdrop-filter: blur(32px) saturate(200%);
    border: 1px solid var(--sep-strong);
    border-radius: var(--pill);
    padding: 13px 22px;
    font-size: 14px;
    font-weight: 700;
    z-index: 200;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    transition: transform 0.4s var(--ease-spring);
    letter-spacing: -0.013em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .toast.success .toast-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .toast.error .toast-dot { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* ========== LOADING / ERROR ========== */
  .center-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 30px;
  }
  .center-screen.hidden { display: none; }
  .loading-logo {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--blue);
    text-shadow: 0 0 28px rgba(10,132,255,0.55);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .loading-logo .spark {
    font-size: 30px;
    animation: spark-pulse 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(10,132,255,0.95));
  }
  @keyframes spark-pulse {
    0%,100% { opacity: 1; transform: scale(1) rotate(0); }
    50% { opacity: 0.4; transform: scale(0.7) rotate(180deg); }
  }
  .error-card {
    text-align: center;
    max-width: 360px;
  }
  .error-icon {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    border-radius: 18px;
    background: var(--red-soft);
    border: 1px solid rgba(255,69,58,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--red);
  }
  .error-icon svg { width: 30px; height: 30px; }
  .error-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .error-msg {
    color: var(--label-2);
    font-size: 14.5px;
    line-height: 1.55;
    font-weight: 500;
  }

  /* ========== AUDIO UNLOCK BANNER ========== */
  .audio-banner {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--blue);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--pill);
    font-size: 13.5px;
    font-weight: 700;
    box-shadow: 0 14px 32px -8px rgba(10,132,255,0.6), 0 0 24px rgba(10,132,255,0.3);
    z-index: 150;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    transition: all 0.25s var(--ease);
    animation: bounce 1s ease-in-out infinite;
    white-space: nowrap;
    max-width: calc(100vw - 32px);
    letter-spacing: -0.012em;
  }
  .audio-banner:hover { transform: translateX(-50%) translateY(-2px); }
  .audio-banner.hidden { display: none; }
  .audio-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
  .audio-banner span {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-4px); }
  }
  @media (max-width: 480px) {
    .audio-banner { font-size: 12.5px; padding: 11px 18px; gap: 8px; bottom: 18px; }
    .audio-banner svg { width: 15px; height: 15px; }
  }

  /* AUTO-REFRESH INDICATOR — petit point qui pulse à chaque refresh */
  .refresh-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    margin-right: 8px;
    flex-shrink: 0;
    transition: opacity 0.3s var(--ease);
    opacity: 0.55;
  }
  .refresh-dot.pulsing {
    animation: refresh-pulse 0.6s var(--ease);
  }
  @keyframes refresh-pulse {
    0% { transform: scale(1); opacity: 0.55; }
    50% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 16px var(--green); }
    100% { transform: scale(1); opacity: 0.55; }
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; overflow: visible; height: auto; }
    .col { border-right: 0; border-bottom: 1px solid var(--sep-strong); overflow: visible; }

<script>
// ========== SUPABASE ==========
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ========== MULTI-TENANT ==========
const RESTO_SLUG = new URLSearchParams(location.search).get('resto') || 'chez-nico';
let RESTO = null;

let state = {
  config: {},
  tablesById: {},
  orders: [],
  appels: [],
  knownIds: new Set(),
  knownAppelIds: new Set(),
  soundEnabled: true,
  audioCtx: null,
  audioReady: false,
  pollInterval: null,
  clockInterval: null,
  ageInterval: null
};

// ========== UTILS ==========
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2400);
}
function showError(title, msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.remove('hidden');
}

// ========== HORLOGE ==========
function tickClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}

function ageString(heureIso) {
  const now = Date.now();
  const t = new Date(heureIso).getTime();
  const sec = Math.max(0, Math.floor((now - t) / 1000));
  if (sec < 60) return sec + 's';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  const restMin = min % 60;
  return h + 'h' + String(restMin).padStart(2, '0');
}

function ageMinutes(heureIso) {
  return Math.floor((Date.now() - new Date(heureIso).getTime()) / 60000);
}

// ========== AUDIO (bing iPhone) ==========
function unlockAudio() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!state.audioCtx) state.audioCtx = new Ctx();
    if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
    // Joue un son silencieux pour débloquer
    const o = state.audioCtx.createOscillator();
    const g = state.audioCtx.createGain();
    g.gain.value = 0.0001;
    o.connect(g); g.connect(state.audioCtx.destination);
    o.start();
    o.stop(state.audioCtx.currentTime + 0.01);
    state.audioReady = true;
    document.getElementById('audio-banner').classList.add('hidden');
    showToast('Son activé 🔔', 'success');
  } catch (e) {
    console.error('audio unlock:', e);
  }
}

function playBing() {
  if (!state.soundEnabled || !state.audioReady || !state.audioCtx) return;
  try {
    const ctx = state.audioCtx;
    const now = ctx.currentTime;
    // 2 notes courtes (style notification iPhone)
    [
      { freq: 1318.5, start: 0, dur: 0.18 },   // E6
      { freq: 1760, start: 0.16, dur: 0.32 }  // A6
    ].forEach(note => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = note.freq;
      gain.gain.setValueAtTime(0, now + note.start);
      gain.gain.linearRampToValueAtTime(0.32, now + note.start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + note.start + note.dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + note.start);
      osc.stop(now + note.start + note.dur + 0.05);
    });
  } catch (e) { console.error('bing:', e); }
}

function playDing() {
  // Son distinct pour appel serveur : 3 notes plus graves "ding ding ding"
  if (!state.soundEnabled || !state.audioReady || !state.audioCtx) return;
  try {
    const ctx = state.audioCtx;
    const now = ctx.currentTime;
    [
      { freq: 880, start: 0, dur: 0.22 },    // A5
      { freq: 880, start: 0.28, dur: 0.22 }, // A5
      { freq: 1108, start: 0.56, dur: 0.4 }  // C#6
    ].forEach(note => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = note.freq;
      gain.gain.setValueAtTime(0, now + note.start);
      gain.gain.linearRampToValueAtTime(0.3, now + note.start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + note.start + note.dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + note.start);
      osc.stop(now + note.start + note.dur + 0.05);
    });
  } catch (e) { console.error('ding:', e); }
}

function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  const btn = document.getElementById('sound-btn');
  const on = document.getElementById('sound-on');
  const off = document.getElementById('sound-off');
  if (state.soundEnabled) {
    btn.classList.add('active');
    on.style.display = '';
    off.style.display = 'none';
    showToast('Son activé', 'success');
  } else {
    btn.classList.remove('active');
    on.style.display = 'none';
    off.style.display = '';
    showToast('Son coupé');
  }
}

// ========== INIT ==========
async function init() {
  try {
    // 1) Charge le restaurant via slug
    const restoRes = await supa.from('restaurants').select('*').eq('slug', RESTO_SLUG).maybeSingle();
    if (restoRes.error) throw new Error('Restaurant: ' + restoRes.error.message);
    if (!restoRes.data) throw new Error('Restaurant introuvable : ' + RESTO_SLUG);
    RESTO = restoRes.data;

    // 2) Charge les tables du restaurant pour mapper id → nom
    const tableRes = await supa.from('tables').select('*').eq('restaurant_id', RESTO.id);
    if (tableRes.error) throw new Error('Tables: ' + tableRes.error.message);

    state.config = {
      restaurant_nom: RESTO.nom || 'Restaurant'
    };
    state.tablesById = {};
    (tableRes.data || []).forEach(t => { state.tablesById[t.id] = t; });

    document.getElementById('resto-name').textContent = state.config.restaurant_nom;
    document.title = state.config.restaurant_nom + ' — Cuisine';

    await loadOrders(true);

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').style.display = 'block';

    // Audio banner si pas encore activé
    document.getElementById('audio-banner').classList.remove('hidden');

    // Auto-refresh silencieux toutes les 5s avec mini-flash visuel
    state.pollInterval = setInterval(async () => {
      await loadOrders(false);
      // Petit flash de l'indicateur pour confirmer visuellement
      const dot = document.getElementById('refresh-dot');
      if (dot) {
        dot.classList.remove('pulsing');
        // Force reflow pour que l'animation rejoue
        void dot.offsetWidth;
        dot.classList.add('pulsing');
      }
    }, 5000);
    // Clock toutes les secondes
    tickClock();
    state.clockInterval = setInterval(tickClock, 1000);
    // Re-render des ages toutes les 20s
    state.ageInterval = setInterval(() => { renderBoard(); renderAlerts(); }, 20000);
  } catch (err) {
    console.error(err);
    showError('Erreur de chargement', err.message || 'Impossible de joindre la base.');
  }
}

async function loadOrders(initial) {
  try {
    // Commandes des dernières 8h, en attente / en cours / prêtes
    const since = new Date(Date.now() - 8 * 60 * 60 * 1000).toISOString();
    const [ordersRes, appelsRes] = await Promise.all([
      supa.from('commandes')
        .select('*')
        .eq('restaurant_id', RESTO.id)
        .gte('heure', since)
        .in('statut', ['en_attente', 'en_cours', 'prete'])
        .order('heure', { ascending: true }),
      supa.from('appels')
        .select('*')
        .eq('restaurant_id', RESTO.id)
        .eq('statut', 'en_attente')
        .gte('heure', since)
        .order('heure', { ascending: true })
    ]);
    if (ordersRes.error) throw ordersRes.error;
    if (appelsRes.error) console.error('appels:', appelsRes.error);

    const newOrders = ordersRes.data || [];
    const newAppels = appelsRes.data || [];

    // Détecter nouvelles commandes pour son
    if (!initial) {
      const newInQueue = newOrders.filter(o =>
        o.statut === 'en_attente' && !state.knownIds.has(o.id)
      );
      if (newInQueue.length > 0) {
        playBing();
        showToast(newInQueue.length + ' nouvelle' + (newInQueue.length>1?'s':'') + ' commande' + (newInQueue.length>1?'s':''), 'success');
      }
      // Détecter nouveaux appels pour son distinct
      const newCalls = newAppels.filter(a => !state.knownAppelIds.has(a.id));
      if (newCalls.length > 0) {
        playDing();
        const tableNames = newCalls.map(a => {
          const t = state.tablesById[a.table_id];
          return t ? t.nom : 'Table';
        }).join(', ');
        showToast('🔔 Appel : ' + tableNames, 'success');
      }
    }
    newOrders.forEach(o => state.knownIds.add(o.id));
    newAppels.forEach(a => state.knownAppelIds.add(a.id));
    state.orders = newOrders;
    state.appels = newAppels;
    renderBoard();
    renderAlerts();
  } catch (err) {
    console.error('loadOrders:', err);
  }
}

function reload() {
  loadOrders(false);
  showToast('Rechargé', 'success');
}

function renderAlerts() {
  const bar = document.getElementById('alerts-bar');
  if (!state.appels || state.appels.length === 0) {
    bar.classList.remove('show');
    bar.innerHTML = '';
    return;
  }
  bar.classList.add('show');
  bar.innerHTML = `
    <div class="alerts-bar-inner">
      ${state.appels.map(a => {
        const t = state.tablesById[a.table_id];
        const tableName = t ? t.nom : 'Table';
        return `
          <div class="alert-card" data-id="${a.id}">
            <div class="alert-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
            <div class="alert-content">
              <div class="alert-table">${escapeHtml(tableName)}</div>
              <div class="alert-msg">${escapeHtml(a.message || 'Demande le serveur')}</div>
            </div>
            <span class="alert-time">${ageString(a.heure)}</span>
            <button class="alert-done" onclick="dismissAlert('${a.id}')" title="Marquer comme traité">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>`;
      }).join('')}
    </div>`;
}

async function dismissAlert(id) {
  state.appels = state.appels.filter(a => a.id !== id);
  renderAlerts();
  try {
    const { error } = await supa.from('appels').update({ statut: 'traite' }).eq('id', id);
    if (error) throw error;
    showToast('Appel traité ✓', 'success');
  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
    await loadOrders(false);
  }
}

// ========== RENDER ==========
function renderBoard() {
  const grouped = { en_attente: [], en_cours: [], prete: [] };
  state.orders.forEach(o => {
    if (grouped[o.statut]) grouped[o.statut].push(o);
  });

  // Trier: FIFO (du plus ancien au plus récent)
  Object.keys(grouped).forEach(k => {
    grouped[k].sort((a, b) => new Date(a.heure) - new Date(b.heure));
  });

  ['en_attente', 'en_cours', 'prete'].forEach(statut => {
    const arr = grouped[statut];
    document.getElementById('count-' + statut).textContent = arr.length;
    const col = document.getElementById('col-' + statut);

    if (arr.length === 0) {
      // Empty state seulement si pas déjà affiché
      if (!col.querySelector('.col-empty')) {
        col.innerHTML = `
          <div class="col-empty">
            <div class="col-empty-icon">
              ${statut === 'en_attente' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>' :
                statut === 'en_cours' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 13 2 2 4-4"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'}
            </div>
            <div class="col-empty-text">${statut === 'en_attente' ? "Pas de nouvelle commande" : statut === 'en_cours' ? "Aucune en préparation" : "Rien à servir"}</div>
          </div>`;
      }
      return;
    }

    // Si l'empty state est là, on le retire
    const empty = col.querySelector('.col-empty');
    if (empty) col.innerHTML = '';

    // Set des IDs attendus dans cette colonne
    const expectedIds = new Set(arr.map(o => o.id));
    // Retirer les cards qui ne devraient plus être là
    [...col.children].forEach(node => {
      const id = node.dataset.id;
      if (id && !expectedIds.has(id)) node.remove();
    });

    // Ajouter / mettre à jour les cards dans le bon ordre
    arr.forEach((o, idx) => {
      let existing = col.querySelector(`[data-id="${o.id}"]`);
      if (existing) {
        // Mise à jour des champs dynamiques (âge, urgence) sans recréer la card
        const ageEl = existing.querySelector('.order-time');
        if (ageEl) {
          ageEl.textContent = ageString(o.heure);
          const isUrgent = o.statut !== 'prete' && ageMinutes(o.heure) >= 10;
          ageEl.classList.toggle('urgent', isUrgent);
        }
        // Vérifier que la card est à la bonne position
        const currentChildren = [...col.children];
        if (currentChildren[idx] !== existing) {
          col.insertBefore(existing, currentChildren[idx] || null);
        }
      } else {
        // Nouvelle card → on la crée avec animation
        const wrapper = document.createElement('div');
        wrapper.innerHTML = renderOrder(o);
        const newCard = wrapper.firstElementChild;
        newCard.classList.add('is-new');
        const currentChildren = [...col.children];
        col.insertBefore(newCard, currentChildren[idx] || null);
      }
    });
  });
}

function renderOrder(o) {
  const table = state.tablesById[o.table_id];
  const tableName = table ? table.nom : ('Table ' + (o.table_id || '?'));
  const items = Array.isArray(o.items) ? o.items : [];
  const totalQte = items.reduce((s, it) => s + (parseInt(it.qte) || 1), 0);
  const ageMin = ageMinutes(o.heure);
  const isUrgent = o.statut !== 'prete' && ageMin >= 10;

  const heureCmd = new Date(o.heure);
  const hh = String(heureCmd.getHours()).padStart(2,'0');
  const mm = String(heureCmd.getMinutes()).padStart(2,'0');

  let actionsHtml = '';
  if (o.statut === 'en_attente') {
    actionsHtml = `
      <button class="btn-action btn-primary orange" onclick="startOrder('${o.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Démarrer
      </button>
      <button class="btn-action btn-secondary" onclick="updateStatut('${o.id}', 'annulee')" title="Annuler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>`;
  } else if (o.statut === 'en_cours') {
    actionsHtml = `
      <button class="btn-action btn-primary green" onclick="updateStatut('${o.id}', 'prete')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Marquer prête
      </button>
      <button class="btn-action btn-secondary" onclick="updateStatut('${o.id}', 'en_attente')" title="Retour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>`;
  } else if (o.statut === 'prete') {
    actionsHtml = `
      <button class="btn-action btn-primary" onclick="updateStatut('${o.id}', 'servie')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l7 7L21 7"/></svg>
        Servie
      </button>
      <button class="btn-action btn-secondary" onclick="updateStatut('${o.id}', 'en_cours')" title="Retour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>`;
  }

  return `
    <div class="order" data-id="${o.id}" data-statut="${o.statut}" data-action-id="${nextStatut(o.statut)}">
      <div class="swipe-hint swipe-hint-right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span>${swipeLabel(o.statut)}</span>
      </div>
      <div class="order-content">
      <div class="order-head">
        <div>
          <div class="order-table">${escapeHtml(tableName)}</div>
          <div class="order-meta">${escapeHtml(o.personne_nom || 'Client')} · ${totalQte} item${totalQte>1?'s':''} · ${hh}:${mm}</div>
        </div>
        <div class="order-time ${isUrgent?'urgent':''}">${ageString(o.heure)}</div>
      </div>
      <div class="order-items">
        ${items.map(it => `
          <div class="order-item">
            <div class="order-item-qty">×${parseInt(it.qte) || 1}</div>
            <div class="order-item-info">
              <div class="order-item-nom">${escapeHtml(it.nom || '')}</div>
              ${it.note ? `<div class="order-item-note">${escapeHtml(it.note)}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="order-footer">
        ${actionsHtml}
      </div>
      </div>
    </div>`;
}

// Utilitaires pour le swipe
function nextStatut(statut) {
  if (statut === 'en_attente') return 'en_cours';
  if (statut === 'en_cours') return 'prete';
  if (statut === 'prete') return 'servie';
  return null;
}
function swipeLabel(statut) {
  if (statut === 'en_attente') return 'Démarrer';
  if (statut === 'en_cours') return 'Marquer prête';
  if (statut === 'prete') return 'Servie';
  return '';
}

// ========== SWIPE GESTUEL SUR LES CARTES ==========
// Délégation d'événements sur le board entier
(function setupSwipe() {
  const board = document.querySelector('.board');
  if (!board) return;

  let activeCard = null;
  let activeContent = null;
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let isDragging = false;
  let isHorizontal = null; // null = pas encore décidé, true = swipe horizontal, false = scroll vertical

  const SWIPE_THRESHOLD = 90; // px à swiper pour valider l'action
  const MAX_SWIPE = 220;

  function onStart(e) {
    const card = e.target.closest('.order');
    if (!card) return;
    // On ne swipe pas sur les boutons d'action (ils ont leur onclick)
    if (e.target.closest('button')) return;
    // Pas de swipe si la commande n'a pas de "next status"
    if (!card.dataset.actionId || card.dataset.actionId === 'null') return;

    activeCard = card;
    activeContent = card.querySelector('.order-content');
    if (!activeContent) { activeCard = null; return; }
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    currentX = 0;
    isDragging = true;
    isHorizontal = null;
  }

  function onMove(e) {
    if (!isDragging || !activeCard) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    // Détecter le sens du geste sur les premiers pixels
    if (isHorizontal === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        isHorizontal = Math.abs(dx) > Math.abs(dy);
        if (isHorizontal) {
          activeCard.classList.add('swiping');
        } else {
          // Scroll vertical → on annule le swipe
          isDragging = false;
          activeCard = null;
          return;
        }
      } else {
        return;
      }
    }

    // Swipe horizontal en cours : on suit le doigt (uniquement vers la droite)
    if (dx > 0) {
      currentX = Math.min(dx, MAX_SWIPE);
      activeContent.style.transform = `translateX(${currentX}px)`;
      if (e.cancelable) e.preventDefault();
    } else {
      currentX = 0;
      activeContent.style.transform = '';
    }
  }

  function onEnd() {
    if (!isDragging || !activeCard) {
      isDragging = false;
      activeCard = null;
      return;
    }
    const card = activeCard;
    const content = activeContent;
    const reached = currentX >= SWIPE_THRESHOLD;
    card.classList.remove('swiping');

    if (reached && isHorizontal) {
      const orderId = card.dataset.id;
      const nextStatut = card.dataset.actionId;
      // Animation de sortie
      card.classList.add('swipe-done');
      // Trigger l'update après l'animation
      setTimeout(() => {
        if (nextStatut === 'en_cours') {
          startOrder(orderId);
        } else {
          updateStatut(orderId, nextStatut);
        }
      }, 280);
    } else {
      // Snap back
      content.style.transform = '';
    }

    isDragging = false;
    activeCard = null;
    activeContent = null;
    isHorizontal = null;
    currentX = 0;
  }

  // Touch
  board.addEventListener('touchstart', onStart, { passive: true });
  board.addEventListener('touchmove', onMove, { passive: false });
  board.addEventListener('touchend', onEnd);
  board.addEventListener('touchcancel', onEnd);
  // Mouse (pour debug desktop)
  board.addEventListener('mousedown', onStart);
  board.addEventListener('mousemove', e => { if (isDragging) onMove(e); });
  board.addEventListener('mouseup', onEnd);
  board.addEventListener('mouseleave', onEnd);
})();

// ========== ACTIONS ==========
async function updateStatut(orderId, nouveauStatut, extraData = {}) {
  // Optimistic update
  const order = state.orders.find(o => o.id === orderId);
  const oldStatut = order ? order.statut : null;
  if (order) order.statut = nouveauStatut;

  // Si servie/annulée → on retire de la liste
  if (nouveauStatut === 'servie' || nouveauStatut === 'annulee') {
    state.orders = state.orders.filter(o => o.id !== orderId);
  }
  renderBoard();

  // Build payload
  const payload = { statut: nouveauStatut, ...extraData };
  if (nouveauStatut === 'en_cours' && !payload.heure_demarrage) {
    payload.heure_demarrage = new Date().toISOString();
  }

  try {
    const { error } = await supa.from('commandes').update(payload).eq('id', orderId);
    if (error) throw error;
    if (nouveauStatut === 'en_cours') showToast('Commande démarrée 🍳', 'success');
    else if (nouveauStatut === 'prete') showToast('Commande prête 🛎', 'success');
    else if (nouveauStatut === 'servie') showToast('Servie ✓', 'success');
    else if (nouveauStatut === 'annulee') showToast('Annulée');
  } catch (err) {
    // Rollback
    if (order && oldStatut) order.statut = oldStatut;
    showToast('Erreur : ' + (err.message || 'mise à jour'), 'error');
    await loadOrders(false);
  }
}

// Démarrer une commande (plus de prompt temps estimé - feature désactivée)
async function startOrder(orderId) {
  await updateStatut(orderId, 'en_cours');
}

// Démarrer
init();

// Cleanup
window.addEventListener('beforeunload', () => {
  if (state.pollInterval) clearInterval(state.pollInterval);
  if (state.clockInterval) clearInterval(state.clockInterval);
  if (state.ageInterval) clearInterval(state.ageInterval);
});
</script>
