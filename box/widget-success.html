<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frizz · Réservation confirmée</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@1,400;1,600;1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #0A0A0A; --gray-700: #4B5563; --gray-500: #6B7280;
    --gray-300: #D1D5DB; --gray-100: #F3F4F6; --gray-50: #FAFAFA;
    --white: #FFFFFF; --orange: #EA580C; --orange-light: #FED7AA;
    --orange-bg: #FFF7ED; --green: #10B981; --green-bg: #DCFCE7;
  }
  body {
    font-family: 'Inter Tight', sans-serif; color: var(--black);
    background: var(--gray-50); line-height: 1.6;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    padding: 32px 16px; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -300px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(234,88,12,0.18) 0%, rgba(234,88,12,0.06) 40%, transparent 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: glowFloat 15s ease-in-out infinite;
  }
  body::after {
    content: ''; position: fixed; bottom: -300px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(234,88,12,0.12) 0%, rgba(234,88,12,0.04) 40%, transparent 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: glowFloat 18s ease-in-out infinite reverse;
  }
  @keyframes glowFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, 30px) scale(1.1); }
    66% { transform: translate(-30px, 50px) scale(0.95); }
  }
  .serif { font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 400; }
  .container {
    max-width: 580px; margin: 0 auto;
    background: var(--white); border-radius: 24px;
    border: 1px solid var(--gray-100);
    box-shadow: 0 30px 80px rgba(0,0,0,0.08), 0 12px 30px rgba(234,88,12,0.06);
    overflow: hidden; position: relative; z-index: 1;
    padding: 48px;
  }
  .logo {
    font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 700;
    font-size: 22px; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 2px;
    margin-bottom: 32px;
  }
  .logo .star { color: var(--orange); font-style: normal; font-family: 'Inter Tight', sans-serif; }
  .success-icon-wrap {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--green-bg); border: 3px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .success-icon { color: var(--green); font-size: 42px; font-weight: 800; }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  h1 {
    text-align: center; font-size: 32px; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 10px;
  }
  h1 .serif { color: var(--orange); }
  .subtitle {
    text-align: center; color: var(--gray-700); font-size: 15px;
    margin-bottom: 32px;
  }
  .ref { color: var(--orange); font-weight: 600; font-family: 'Source Serif 4', serif; font-style: italic; }
  .pin-section {
    background: var(--black); color: var(--white);
    padding: 32px; border-radius: 18px; margin-bottom: 24px;
    text-align: center; position: relative; overflow: hidden;
  }
  .pin-section::before {
    content: '✦'; position: absolute; top: -20px; right: -20px;
    font-size: 140px; color: var(--orange); opacity: 0.1; font-family: serif;
  }
  .pin-label {
    font-size: 11px; color: var(--orange-light); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 14px; position: relative; z-index: 2;
  }
  .pin-digits {
    display: flex; justify-content: center; gap: 12px;
    margin-bottom: 14px; position: relative; z-index: 2;
  }
  .pin-digit {
    width: 56px; height: 64px; background: rgba(255,255,255,0.08);
    border: 2px solid var(--orange); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 800; color: var(--orange);
    animation: pinAppear 0.6s ease-out backwards;
  }
  .pin-digit:nth-child(1) { animation-delay: 0.3s; }
  .pin-digit:nth-child(2) { animation-delay: 0.4s; }
  .pin-digit:nth-child(3) { animation-delay: 0.5s; }
  .pin-digit:nth-child(4) { animation-delay: 0.6s; }
  @keyframes pinAppear {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .pin-helper {
    font-size: 12px; color: var(--gray-300); position: relative; z-index: 2;
    font-family: 'Source Serif 4', serif; font-style: italic;
  }
  .next-steps {
    background: var(--gray-50); padding: 20px; border-radius: 14px; margin-bottom: 24px;
  }
  .next-steps-title {
    font-size: 13px; font-weight: 700; margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500);
  }
  .next-step-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 0; font-size: 14px;
  }
  .next-step-item .check { color: var(--orange); font-weight: 700; flex-shrink: 0; }
  .next-step-item em {
    font-family: 'Source Serif 4', serif; font-style: italic;
    color: var(--black); font-weight: 600;
  }
  .btn-primary {
    width: 100%; background: var(--orange); color: var(--white);
    padding: 18px; border-radius: 14px;
    font-weight: 700; font-size: 16px; border: none; cursor: pointer;
    font-family: inherit; margin-bottom: 12px; transition: all 0.3s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(234,88,12,0.3); }
  .btn-secondary {
    width: 100%; background: var(--white); color: var(--black);
    padding: 18px; border-radius: 14px;
    font-weight: 600; font-size: 15px; border: 1px solid var(--gray-300);
    cursor: pointer; font-family: inherit;
  }
  .loading { text-align: center; padding: 60px 20px; color: var(--gray-500); }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--gray-100); border-top-color: var(--orange);
    border-radius: 50%; margin: 0 auto 18px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    .container { padding: 32px 24px; border-radius: 18px; }
    h1 { font-size: 26px; }
    .pin-digit { width: 48px; height: 56px; font-size: 24px; }
  }
</style>
</head>
<body>

<div class="container" id="container">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Validation du paiement...</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
  const urlParams = new URLSearchParams(window.location.search);
  const resNumber = urlParams.get('res');

  async function loadReservation() {
    if (!resNumber) {
      document.getElementById('container').innerHTML =
        '<div class="loading"><div style="color:#EF4444;">Numéro de réservation manquant.</div></div>';
      return;
    }

    // Polling : on attend que le webhook ait validé la résa (max 10s)
    let attempts = 0;
    const maxAttempts = 20;
    let reservation = null;

    while (attempts < maxAttempts) {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/frizz_box_reservations?reservation_number=eq.' + resNumber +
        '&select=*,frizz_box_centers(name,address,city,phone,email),frizz_box_types(name,surface_m2,description),frizz_box_clients(first_name,last_name,email,phone,address,city,postal_code)',
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
      );
      const data = await res.json();
      if (data && data.length > 0) {
        reservation = data[0];
        if (reservation.status === 'paid' && reservation.access_pin) break;
      }
      await new Promise(r => setTimeout(r, 500));
      attempts++;
    }

    if (!reservation || reservation.status !== 'paid') {
      document.getElementById('container').innerHTML =
        '<div class="loading">' +
        '<div style="color:#EF4444; margin-bottom:12px;">Le paiement est en cours de validation.</div>' +
        '<div style="font-size:13px;">Si cette page reste affichée, contactez le centre directement.</div>' +
        '</div>';
      return;
    }

    renderConfirmation(reservation);
  }

  function renderConfirmation(r) {
    const pin = r.access_pin || '----';
    const pinDigits = pin.split('').map(d => '<div class="pin-digit">' + d + '</div>').join('');
    const center = r.frizz_box_centers || {};
    const boxType = r.frizz_box_types || {};
    const client = r.frizz_box_clients || {};

    document.getElementById('container').innerHTML = `
      <div class="logo"><span class="star">✦</span> Frizz</div>
      <div class="success-icon-wrap">
        <div class="success-icon">✓</div>
      </div>
      <h1>Bienvenue chez <span class="serif">Frizz</span>.</h1>
      <p class="subtitle">Réservation <span class="ref">#${r.reservation_number}</span> confirmée.<br>Paiement reçu, contrat signé.</p>

      <div class="pin-section">
        <div class="pin-label">Votre code d'accès</div>
        <div class="pin-digits">${pinDigits}</div>
        <div class="pin-helper">À taper sur le clavier à l'entrée du centre.</div>
      </div>

      <div class="next-steps">
        <div class="next-steps-title">Prochaines étapes</div>
        <div class="next-step-item">
          <span class="check">✓</span>
          <span>Téléchargez votre <em>contrat PDF</em> avec le bouton ci-dessous</span>
        </div>
        <div class="next-step-item">
          <span class="check">✓</span>
          <span>Votre PIN est valable dès le <em>${new Date(r.start_date).toLocaleDateString('fr-FR')}</em></span>
        </div>
        <div class="next-step-item">
          <span class="check">✓</span>
          <span>Le centre vous contactera sous 24h pour <em>l'état des lieux</em></span>
        </div>
      </div>

      <button class="btn-primary" onclick="downloadContract()">📄 Télécharger mon contrat PDF</button>
      <button class="btn-secondary" onclick="window.location.href='/box/'">Retour à l'accueil</button>
    `;

    // Stocker pour générer PDF
    window.__reservation = r;
    window.__center = center;
    window.__boxType = boxType;
    window.__client = client;
  }

  function downloadContract() {
    const r = window.__reservation;
    const c = window.__center;
    const b = window.__boxType;
    const cl = window.__client;
    if (!r) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;

    // Header
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text('CONTRAT DE LOCATION DE BOX', 105, y, { align: 'center' });
    y += 8;
    doc.setFontSize(11);
    doc.setFont('helvetica', 'italic');
    doc.text('Référence : ' + r.reservation_number, 105, y, { align: 'center' });
    y += 14;

    doc.setLineWidth(0.5);
    doc.line(20, y, 190, y);
    y += 10;

    // Section 1 : Parties
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('1. PARTIES AU CONTRAT', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('LE LOUEUR :', 20, y); y += 5;
    doc.setFont('helvetica', 'normal');
    doc.text(c.name || '', 20, y); y += 5;
    doc.text(c.address || '', 20, y); y += 5;
    doc.text((c.city || '') + (c.phone ? ' · ' + c.phone : ''), 20, y); y += 8;

    doc.setFont('helvetica', 'bold');
    doc.text('LE LOCATAIRE :', 20, y); y += 5;
    doc.setFont('helvetica', 'normal');
    doc.text((cl.first_name || '') + ' ' + (cl.last_name || ''), 20, y); y += 5;
    doc.text(cl.address || '', 20, y); y += 5;
    doc.text((cl.postal_code || '') + ' ' + (cl.city || ''), 20, y); y += 5;
    doc.text('Email : ' + (cl.email || ''), 20, y); y += 5;
    doc.text('Téléphone : ' + (cl.phone || ''), 20, y); y += 12;

    // Section 2 : Objet
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('2. OBJET DU CONTRAT', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('Box de type : ' + (b.name || '') + ' - ' + (b.surface_m2 || '') + ' m²', 20, y); y += 5;
    doc.text('Description : ' + (b.description || ''), 20, y); y += 5;
    doc.text('Date d\'entrée : ' + new Date(r.start_date).toLocaleDateString('fr-FR'), 20, y); y += 5;
    doc.text('Durée : indéterminée (résiliable au mois)', 20, y); y += 12;

    // Section 3 : Conditions financières
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('3. CONDITIONS FINANCIÈRES', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('Loyer mensuel : ' + parseFloat(r.monthly_price).toFixed(2) + ' €', 20, y); y += 5;
    doc.text('Caution (remboursable) : ' + parseFloat(r.deposit || 0).toFixed(2) + ' €', 20, y); y += 5;
    doc.text('Total payé aujourd\'hui : ' + parseFloat(r.total_paid_today).toFixed(2) + ' €', 20, y); y += 12;

    // Section 4 : Accès
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('4. ACCÈS AU BOX', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('Code PIN d\'accès : ' + (r.access_pin || '----'), 20, y); y += 5;
    doc.text('Ce code est strictement personnel et confidentiel.', 20, y); y += 12;

    // Section 5 : Conditions générales
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('5. CONDITIONS GÉNÉRALES', 20, y);
    y += 8;
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    const conditions = [
      'Le locataire s\'engage à respecter les consignes de sécurité du centre.',
      'Aucune marchandise dangereuse, illégale, périssable ou vivante n\'est autorisée.',
      'Le loyer est prélevé automatiquement chaque mois à la date d\'entrée.',
      'En cas de retard de paiement, des pénalités peuvent s\'appliquer.',
      'Le contrat est résiliable par les deux parties avec un préavis de 30 jours.',
      'La caution est restituée sous 15 jours après remise des clés et état des lieux.'
    ];
    conditions.forEach(line => {
      doc.text('• ' + line, 20, y, { maxWidth: 170 });
      y += 5;
    });
    y += 8;

    // Signature
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('SIGNATURE ÉLECTRONIQUE', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const signedAt = r.contract_signed_at ? new Date(r.contract_signed_at).toLocaleString('fr-FR') : new Date().toLocaleString('fr-FR');
    doc.text('Signé électroniquement le : ' + signedAt, 20, y); y += 5;
    doc.text('Par : ' + (cl.first_name || '') + ' ' + (cl.last_name || ''), 20, y); y += 5;
    doc.text('Email validé : ' + (cl.email || ''), 20, y); y += 8;

    // Footer
    doc.setFontSize(8);
    doc.setFont('helvetica', 'italic');
    doc.text('Contrat généré par Frizz · frizz-instant.com', 105, 285, { align: 'center' });

    doc.save('Contrat_Frizz_' + r.reservation_number + '.pdf');
  }

  loadReservation();
</script>
</body>
</html>
