<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0C">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>Créer un compte · Frizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --bg-secondary: #0D0D0F;
    --label: #FFFFFF;
    --label-secondary: rgba(235, 235, 245, 0.60);
    --label-tertiary: rgba(235, 235, 245, 0.30);
    --separator: rgba(84, 84, 88, 0.40);
    --blue: #0A84FF;
    --red: #FF453A;
    --green: #30D158;
  }
  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    font-size: 17px;
    line-height: 1.4;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    color-scheme: dark;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -150px; right: -120px;
    width: 520px; height: 520px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.09) 35%, transparent 65%);
    filter: blur(60px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb1 18s ease-in-out infinite;
  }
  body::after {
    content: ''; position: fixed; bottom: -180px; left: -150px;
    width: 480px; height: 480px;
    background: radial-gradient(circle at 70% 70%, rgba(0, 100, 200, 0.16) 0%, rgba(0, 100, 200, 0.07) 35%, transparent 65%);
    filter: blur(70px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb2 22s ease-in-out infinite;
  }
  html::before {
    content: ''; position: fixed; top: 30%; left: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(100, 210, 255, 0.14) 0%, rgba(100, 210, 255, 0.06) 40%, transparent 70%);
    filter: blur(80px); pointer-events: none; z-index: 0; border-radius: 50%;
    animation: floatOrb3 26s ease-in-out infinite;
  }
  @keyframes floatOrb1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-30px,40px) scale(1.08);} }
  @keyframes floatOrb2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(40px,-30px) scale(1.10);} }
  @keyframes floatOrb3 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,30px) scale(1.12);} }
  @media (prefers-reduced-motion: reduce) { body::before, body::after, html::before { animation: none; } }

  button, a { font-family: inherit; cursor: pointer; text-decoration: none; }
  button { border: none; background: none; color: inherit; padding: 0; }
  input { font-family: inherit; color: inherit; }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 24px max(32px, env(safe-area-inset-bottom));
    max-width: 460px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    font-size: 17px;
    font-weight: 400;
    padding: 8px 0;
    width: fit-content;
    transition: opacity 0.15s;
  }
  .back-btn:hover { opacity: 0.7; }
  .back-btn svg { width: 12px; height: 12px; stroke-width: 3; }

  .header {
    margin: 24px 0 24px;
    text-align: center;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  .logo-mini {
    width: 72px; height: 72px;
    border-radius: 18px;
    margin-bottom: 20px;
    filter: drop-shadow(0 6px 18px rgba(10, 132, 255, 0.40));
  }
  .title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.030em;
    line-height: 1.1;
    margin-bottom: 8px;
    color: var(--label);
  }
  .subtitle {
    font-size: 16px;
    color: var(--label-secondary);
    letter-spacing: -0.012em;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

  form { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s backwards; }

  .form-group {
    background: var(--bg-secondary);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid var(--separator);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
  }
  .form-group::before { display: none; }
  .input-row { display: flex; align-items: center; padding: 0 16px; }
  .input-row:not(:last-child) { border-bottom: 0.5px solid var(--separator); }
  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 16px 0;
    font-size: 17px;
    color: var(--label);
    outline: none;
    letter-spacing: -0.022em;
  }
  .input-row input::placeholder { color: var(--label-tertiary); }

  .helper {
    font-size: 13px;
    color: var(--label-tertiary);
    padding: 6px 4px 18px;
    letter-spacing: -0.005em;
  }

  .submit-btn {
    width: 100%;
    background: #007AFF;
    color: white;
    padding: 16px 22px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.018em;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    transition: transform 0.18s cubic-bezier(0.32, 0.72, 0.42, 1), box-shadow 0.18s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .submit-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
  }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.7; cursor: wait; }
  .submit-btn.loading .btn-spinner { display: inline-block; }
  .btn-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.30);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255, 69, 58, 0.10);
    border: 0.5px solid rgba(255, 69, 58, 0.30);
    color: #FF6961;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 14px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .error-msg.show { display: block; }

  .benefits {
    margin: 18px 0 22px;
    padding: 14px 16px;
    background: var(--bg-secondary);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid var(--separator);
    border-radius: 12px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s backwards;
  }
  .benefit-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--label);
    padding: 4px 0;
    letter-spacing: -0.012em;
  }
  .benefit-row svg { width: 14px; height: 14px; color: var(--green); flex-shrink: 0; }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 15px;
    color: var(--label-secondary);
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s backwards;
  }
  .footer a { color: var(--blue); font-weight: 600; }
  .footer a:hover { opacity: 0.7; }

  /* Country selector */
  .country-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 12px;
    background: var(--bg-secondary);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border: 0.5px solid var(--separator);
    border-radius: 14px;
    color: var(--label);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.32, 0.72, 0.42, 1);
    text-align: left;
  }
  .country-btn:hover {
    border-color: rgba(255, 255, 255, 0.40);
    transform: translateY(-1px);
  }
  .country-btn.country-active {
    border-color: #FFFFFF;
    background: rgba(255, 255, 255, 0.12);
    box-shadow:
      0 0 0 1px #FFFFFF,
      0 0 16px rgba(255, 255, 255, 0.12);
  }

  /* ═══ STYLE NOIR LUXE (identique à l'app Frizz) ═══ */
  :root {
    --bg: #0A0A0C !important;
    --bg-secondary: #0D0D0F !important;
    --label: #FFFFFF !important;
    --label-secondary: rgba(235, 235, 245, 0.60) !important;
    --label-tertiary: rgba(235, 235, 245, 0.30) !important;
    --separator: rgba(84, 84, 88, 0.40) !important;
    --blue: #FFFFFF !important;
    --red: #FF453A !important;
  }
  html, body {
    background:
      radial-gradient(90% 50% at 25% 0%, rgba(20,20,26,0.9) 0%, rgba(16,16,22,0.4) 35%, transparent 62%),
      radial-gradient(140% 110% at 90% 40%, rgba(28,28,34,0.85) 0%, rgba(18,18,24,0.45) 35%, transparent 68%),
      linear-gradient(180deg, #0A0A0E 0%, #101014 42%, #0C0C10 62%, #08080C 100%) !important;
    background-attachment: fixed !important;
  }
  /* On neutralise les anciens halos bleus */
  body::before, body::after { display: none !important; }

  /* Halos noir luxe (statiques) */
  .frizz-halo { position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.85; z-index: -1; pointer-events: none; }
  .frizz-halo-1 { top: 8%; left: -10%; width: 60vw; height: 60vw; max-width: 520px; max-height: 520px; background: radial-gradient(circle, #1E1E26 0%, transparent 70%); }
  .frizz-halo-2 { bottom: 0%; right: -12%; width: 65vw; height: 65vw; max-width: 560px; max-height: 560px; background: radial-gradient(circle, #24242E 0%, transparent 70%); }
  .frizz-halo-3 { top: -10%; left: 50%; transform: translateX(-50%); width: 110vw; height: 60vw; max-width: 900px; max-height: 520px; background: radial-gradient(circle, #20202A 0%, transparent 68%); }

  /* Ciel étoilé (plafond luxe) */
  .frizz-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-repeat: repeat;
    background-image:
      radial-gradient(1.4px 1.4px at 12% 18%, rgba(255,255,255,0.9), transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1.6px 1.6px at 45% 12%, rgba(255,250,235,0.95), transparent 100%),
      radial-gradient(1px 1px at 62% 30%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 78% 16%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1px 1px at 88% 48%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(1.5px 1.5px at 8% 62%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 33% 72%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.3px 1.3px at 54% 84%, rgba(255,255,255,0.8), transparent 100%),
      radial-gradient(1px 1px at 70% 66%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1.6px 1.6px at 92% 78%, rgba(255,250,235,0.9), transparent 100%),
      radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.2px 1.2px at 48% 56%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1px 1px at 82% 94%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.7px 0.7px at 5% 35%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.7px 0.7px at 38% 26%, rgba(255,255,255,0.45), transparent 100%),
      radial-gradient(0.8px 0.8px at 60% 38%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 76% 50%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.8px 0.8px at 91% 14%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 21% 70%, rgba(255,255,255,0.45), transparent 100%),
      radial-gradient(0.8px 0.8px at 73% 90%, rgba(255,250,235,0.55), transparent 100%),
      radial-gradient(0.7px 0.7px at 89% 86%, rgba(255,255,255,0.45), transparent 100%);
    background-size: 100% 100%;
  }

  /* Logo en ondes (rond -> naturel) */
  .logo, .marketing-logo {
    border-radius: 0 !important;
    width: auto !important;
    height: 64px !important;
    object-fit: contain !important;
    background: transparent !important;
  }
  /* Liens / accents : blanc au lieu de bleu */
  .back-btn, .signup-link a, .login-link a, .forgot { color: #FFFFFF !important; }
  input:focus { border-color: rgba(255,255,255,0.5) !important; }
  /* Bouton principal : blanc avec texte sombre (cohérence app) */
  .submit-btn { background: #FFFFFF !important; color: #0A0A0C !important; }
  .submit-btn * { color: #0A0A0C !important; }


  /* Supprimer toute lueur bleue (box-shadow) */
  .submit-btn, .btn-primary, .submit-btn:hover, .btn-primary:hover, .submit-btn:not(:disabled), .btn-primary:not(:disabled) {
    box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important;
  }
  input:focus { box-shadow: 0 0 0 4px rgba(255,255,255,0.10) !important; }
  /* Accents bleus restants -> blanc */
  .btn-primary { background: #FFFFFF !important; color: #0A0A0C !important; }
  .btn-primary * { color: #0A0A0C !important; }

</style>
</head>
<body>
  <div class="frizz-stars" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-1" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-2" aria-hidden="true"></div>
  <div class="frizz-halo frizz-halo-3" aria-hidden="true"></div>

<div class="container">
  <a href="landing.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>

  <div class="header">
    <img class="logo-mini" src="logo.png" alt="Frizz" style="width:72px;height:72px;border-radius:18px;display:block;margin:0 auto 20px;"/>
    <h1 class="title">Créer mon compte</h1>
    <p class="subtitle">Frizz décroche à votre place. 24h/24.</p>
  </div>

  <div class="benefits">
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Frizz décroche 24h/24, 7j/7
    </div>
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Prend vos réservations automatiquement
    </div>
    <div class="benefit-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Installation en 5 minutes
    </div>
  </div>

  <form id="signupForm" novalidate>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Sélecteur pays -->
    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 13px; color: var(--label-secondary); margin-bottom: 8px; letter-spacing: -0.005em; padding-left: 4px;">Votre restaurant est en :</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button type="button" id="countryFR" onclick="selectCountry('FR')" class="country-btn country-active">
          <span style="font-size: 24px;">🇫🇷</span>
          <div style="font-weight: 600; font-size: 15px;">France</div>
        </button>
        <button type="button" id="countryCH" onclick="selectCountry('CH')" class="country-btn">
          <span style="font-size: 24px;">🇨🇭</span>
          <div style="font-weight: 600; font-size: 15px;">Suisse</div>
        </button>
      </div>
    </div>

    <div class="form-group">
      <div class="input-row">
        <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      </div>
      <div class="input-row">
        <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" autocomplete="new-password" required minlength="6">
      </div>
    </div>

    <div class="helper">En continuant, vous acceptez nos <a href="conditions.html" style="color:var(--blue);text-decoration:underline;">conditions</a>.</div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-spinner"></span>
      <span class="btn-text">Créer mon compte</span>
    </button>
  </form>

  <div class="footer">
    Déjà un compte ? <a href="login.html">Se connecter</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('signupForm');
const errorEl = document.getElementById('errorMsg');
const btn = document.getElementById('submitBtn');
const btnText = btn.querySelector('.btn-text');

// Pays sélectionné par défaut
let selectedCountry = 'FR';

function selectCountry(country) {
  selectedCountry = country;
  document.getElementById('countryFR').classList.toggle('country-active', country === 'FR');
  document.getElementById('countryCH').classList.toggle('country-active', country === 'CH');
}
window.selectCountry = selectCountry;

function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
function hideError() { errorEl.classList.remove('show'); }
function setLoading(loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  btnText.textContent = loading ? 'Création en cours…' : 'Créer mon compte';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showError('Tous les champs sont obligatoires'); return; }
  if (password.length < 6) { showError('Le mot de passe doit faire au moins 6 caractères'); return; }

  setLoading(true);
  try {
    const { data: authData, error: authError } = await supa.auth.signUp({ email, password });
    if (authError) throw authError;
    if (!authData.user) throw new Error('Erreur lors de la création du compte');

    const { error: salonError } = await supa
      .from('frizz_ai_salons')
      .insert({
        user_id: authData.user.id,
        pays: selectedCountry,
        actif: true,
        subscription_status: 'inactive',
        trial_end: null,
        onboarded: true,
      });
    if (salonError) throw salonError;

    window.location.href = 'index.html';
  } catch (err) {
    setLoading(false);
    let msg = err.message || 'Une erreur est survenue';
    if (msg.includes('already registered') || msg.includes('already been registered')) {
      msg = 'Cet email a déjà un compte. Connectez-vous à la place.';
    } else if (msg.includes('invalid email') || msg.includes('Invalid email')) {
      msg = "Cet email n'est pas valide";
    } else if (msg.includes('Password should be')) {
      msg = 'Le mot de passe doit faire au moins 6 caractères';
    }
    showError(msg);
  }
});

supa.auth.getSession().then(({ data: { session } }) => {
  if (!session) return;
  window.location.href = 'index.html';
});
</script>
</body>
</html>
