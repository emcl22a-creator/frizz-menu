<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frizz · Connexion gérant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #0A0A0A; --gray-700: #4B5563; --gray-500: #6B7280;
    --gray-300: #D1D5DB; --gray-200: #E5E7EB; --gray-100: #F3F4F6;
    --gray-50: #FAFAFA; --white: #FFFFFF;
    --orange: #EA580C; --orange-light: #FED7AA; --orange-bg: #FFF7ED;
    --green: #10B981; --red: #EF4444; --red-bg: #FEE2E2;
  }
  body {
    font-family: 'Inter Tight', sans-serif; color: var(--black);
    background: var(--gray-50); line-height: 1.6;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    padding: 32px 16px; overflow-x: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ''; position: fixed; top: -300px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(234,88,12,0.18) 0%, rgba(234,88,12,0.06) 40%, transparent 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: glowFloat 15s ease-in-out infinite;
  }
  body::after {
    content: ''; position: fixed; bottom: -300px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(234,88,12,0.12) 0%, rgba(234,88,12,0.04) 40%, transparent 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: glowFloat 18s ease-in-out infinite reverse;
  }
  @keyframes glowFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, 30px) scale(1.1); }
    66% { transform: translate(-30px, 50px) scale(0.95); }
  }
  .serif { font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 400; }

  .container {
    max-width: 440px; width: 100%;
    background: var(--white); border-radius: 24px;
    border: 1px solid var(--gray-100);
    box-shadow: 0 30px 80px rgba(0,0,0,0.08), 0 12px 30px rgba(234,88,12,0.06);
    padding: 48px; position: relative; z-index: 1;
  }
  .logo {
    font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 700;
    font-size: 28px; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 2px;
    justify-content: center; margin-bottom: 8px;
  }
  .logo .star {
    color: var(--orange); font-style: normal; font-family: 'Inter Tight', sans-serif;
  }
  .tagline {
    text-align: center; color: var(--gray-500); font-size: 13px;
    margin-bottom: 36px;
    font-family: 'Source Serif 4', serif; font-style: italic;
  }
  h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  h1 .serif { color: var(--orange); }
  .subtitle { color: var(--gray-700); font-size: 14px; margin-bottom: 28px; }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--gray-100); padding: 4px; border-radius: 10px;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border-radius: 8px; transition: all 0.2s;
    color: var(--gray-700);
  }
  .tab.active {
    background: var(--white); color: var(--orange);
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--gray-700); margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 13px 14px; border: 1px solid var(--gray-200);
    border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--orange); box-shadow: 0 0 0 3px rgba(234,88,12,0.1);
  }

  .btn-primary {
    width: 100%; background: var(--orange); color: var(--white);
    padding: 14px; border-radius: 10px;
    font-weight: 700; font-size: 15px; border: none; cursor: pointer;
    font-family: inherit; transition: all 0.3s; margin-top: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(234,88,12,0.3); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    background: var(--red-bg); color: var(--red);
    padding: 12px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px;
    border-left: 3px solid var(--red);
  }
  .success {
    background: #DCFCE7; color: var(--green);
    padding: 12px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px;
    border-left: 3px solid var(--green);
  }
  .form-link {
    text-align: center; font-size: 13px; color: var(--gray-700);
    margin-top: 16px;
  }
  .form-link a { color: var(--orange); text-decoration: none; font-weight: 500; }
  .form-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <div class="logo"><span class="star">✦</span> Frizz</div>
  <div class="tagline">Le self-storage, simplifié.</div>

  <div class="tabs">
    <div class="tab active" id="tabLogin" onclick="switchTab('login')">Connexion</div>
    <div class="tab" id="tabSignup" onclick="switchTab('signup')">Inscription</div>
  </div>

  <!-- LOGIN -->
  <div id="loginPanel">
    <h1>Bon retour, <span class="serif">gérant.</span></h1>
    <p class="subtitle">Connectez-vous à votre tableau de bord.</p>

    <div class="error" id="loginError" style="display:none;"></div>

    <form onsubmit="return doLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="loginPassword" required>
      </div>
      <button type="submit" class="btn-primary" id="btnLogin">Se connecter →</button>
    </form>

    <div class="form-link">
      Pas encore de compte ? <a href="#" onclick="switchTab('signup'); return false;">Inscrivez-vous</a>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="signupPanel" style="display:none;">
    <h1>Rejoignez la <span class="serif">beta privée.</span></h1>
    <p class="subtitle">3 mois gratuits, sans engagement.</p>

    <div class="error" id="signupError" style="display:none;"></div>
    <div class="success" id="signupSuccess" style="display:none;"></div>

    <form onsubmit="return doSignup(event)">
      <div class="form-group">
        <label class="form-label">Email professionnel</label>
        <input type="email" class="form-input" id="signupEmail" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe (min 6 caractères)</label>
        <input type="password" class="form-input" id="signupPassword" required minlength="6">
      </div>
      <button type="submit" class="btn-primary" id="btnSignup">Créer mon compte →</button>
    </form>

    <div class="form-link">
      Déjà inscrit ? <a href="#" onclick="switchTab('login'); return false;">Se connecter</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://iryhmfiuvpxbssjquxyo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWhtZml1dnB4YnNzanF1eHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzU1NjQsImV4cCI6MjA5MjY1MTU2NH0.aYLAXhLoNJaefGt_1j1z1x8nd_DypFaaP1LPdLrxCM0';

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupPanel').style.display = tab === 'signup' ? 'block' : 'none';
  }

  async function doLogin(event) {
    event.preventDefault();
    const errBox = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');
    errBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Connexion...';

    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.msg || data.error_description || 'Erreur de connexion');

      // Stocker la session
      localStorage.setItem('frizz_session', JSON.stringify(data));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errBox.textContent = '❌ ' + err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Se connecter →';
    }
    return false;
  }

  async function doSignup(event) {
    event.preventDefault();
    const errBox = document.getElementById('signupError');
    const successBox = document.getElementById('signupSuccess');
    const btn = document.getElementById('btnSignup');
    errBox.style.display = 'none';
    successBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Création...';

    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;

    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.msg || data.error_description || 'Erreur d\'inscription');

      // Si confirmation email requise
      if (data.user && !data.session) {
        successBox.textContent = '✓ Compte créé. Vérifiez votre email pour confirmer.';
        successBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Créer mon compte →';
      } else if (data.session) {
        // Auto-login si confirmation pas requise
        localStorage.setItem('frizz_session', JSON.stringify(data));
        window.location.href = 'dashboard.html';
      }
    } catch (err) {
      errBox.textContent = '❌ ' + err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Créer mon compte →';
    }
    return false;
  }

  // Si déjà connecté, rediriger
  const session = localStorage.getItem('frizz_session');
  if (session) {
    try {
      const s = JSON.parse(session);
      if (s.access_token) window.location.href = 'dashboard.html';
    } catch (e) {}
  }
</script>
</body>
</html>
